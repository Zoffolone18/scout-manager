}

const SILHOUETTE_SVG = '<svg viewBox="0 0 64 64" width="100%" height="100%"><circle cx="32" cy="24" r="12" fill="none" stroke="currentColor" stroke-width="3"/><path d="M12 56c2-14 12-20 20-20s18 6 20 20" fill="none" stroke="currentColor" stroke-width="3"/></svg>';

// Testo compatto "squadra (club) + categorie" per le visualizzazioni in
// elenco/scheda: un giocatore ha UNA società (campo squadra, usato per
// ordinamento e filtro squadra dell'Elenco) e può avere PIÙ categorie
// (es. gioca sia in U19 che in U21 della stessa società FC Lugano).
function squadraConCategorie(p) {
  const cat = (p.categorie || []).filter(Boolean);
  if (!cat.length) return esc(p.squadra || "");
  return `${esc(p.squadra || "—")} <span class="muted">· ${cat.map(esc).join(", ")}</span>`;
}

function cardHTML(p, scoutFilter) {
  const media = valutazioneMedia(p, scoutFilter);
  const eta = calcolaEta(p.dataNascita);
  const noteSnippet = (p.note || "").slice(0, 90);
  const etichette = p.etichette || [];
  return `
    <div class="player-card ${isNazionaleU16Corrente(p) ? "player-card-nazionale-u16" : isFCLuganoU15(p) ? "player-card-lugano-u15" : isFOOTURO(p) ? "player-card-footuro" : ""}" data-id="${p.id}">
      <div class="card-badge ${ratingClass(media)}">${media !== null ? media.toFixed(1) : "-"}</div>
      <div class="card-radar-mini">${radarChartSVG(medieTips(p, scoutFilter), { size: 36, showLabels: false })}</div>
      <div class="card-header-row">
        <div class="card-photo">${p.foto ? `<img src="${esc(p.foto)}" alt="">` : SILHOUETTE_SVG}</div>
        <div class="card-header-text">
          <div class="card-name">${esc(p.cognome)} <span class="card-name-nome">${esc(p.nome)}</span></div>
          <div class="card-meta">
            ${p.dataNascita ? `<div class="card-meta-line">${formatDataIt(p.dataNascita)}${eta !== null ? " (" + eta + " anni)" : ""}</div>` : ""}
            <div class="card-meta-line">${p.squadra || (p.categorie && p.categorie.length) ? squadraConCategorie(p) : "Squadra n.d."}</div>
            ${categoriaNazionale(p.dataNascita) ? `<div class="card-meta-line">Categoria ${categoriaNazionale(p.dataNascita)}</div>` : ""}
            ${(p.etaBiologica !== undefined && p.etaBiologica !== null && p.etaBiologica !== "") ? `<div class="card-meta-line">BioAlter ${esc(p.etaBiologica)}</div>` : ""}
            ${ordinamento === "modificati" ? `<div class="card-meta-line">Modificato il ${formatDataIt(p.modificatoIl || p.creatoIl)}</div>` : ""}
            ${ordinamento === "ultimaPartita" ? `<div class="card-meta-line ${(() => { const g = giorniDaOggi(dataUltimaPartita(p)); return g !== null && g >= 0 && g <= 6 ? "ultima-partita-recente" : ""; })()}">${esc(testoUltimaPartita(p))}</div>` : ""}
          </div>
        </div>
      </div>
      <div class="card-ruoli">
        ${p.ruoloPrimario ? `<span class="tag tag-primario">${esc(p.ruoloPrimario)}</span>` : ""}
        ${p.ruoloSecondario ? `<span class="tag tag-secondario">${esc(p.ruoloSecondario)}</span>` : ""}
      </div>
      ${etichette.length ? `<div class="card-etichette">${etichette.map(e => `<span class="etichetta-badge">${esc(e)}</span>`).join("")}</div>` : ""}
      ${noteSnippet ? `<div class="card-note">${esc(noteSnippet)}${(p.note || "").length > 90 ? "…" : ""}</div>` : ""}
    </div>
  `;
}

/* ===================== REPORT ===================== */
const CAMPI_REPORT = [
  { chiave: "foto", label: "Foto", soloScheda: true },
  { chiave: "dataNascita", label: "Data di nascita / età", labelBreve: "Nascita / età" },
  { chiave: "categoria", label: "Categoria (U15, U16...)", labelBreve: "Categoria" },
  { chiave: "squadra", label: "Squadra" },
  { chiave: "ruolo", label: "Ruolo" },
  { chiave: "piede", label: "Piede preferito", labelBreve: "Piede" },
  { chiave: "nazionalita", label: "Nazionalità", labelBreve: "Naz." },
  { chiave: "etichette", label: "Etichette" },
  { chiave: "mediaTips", label: "Media Tips" },
  { chiave: "ultimaValutazione", label: "Ultima valutazione scritta", labelBreve: "Ultima valutazione" },
  { chiave: "datiFisici", label: "Dati fisici (Mirwald)", labelBreve: "Dati fisici" },
  { chiave: "trasferimenti", label: "Storico trasferimenti", labelBreve: "Trasferimenti" },
  { chiave: "partite", label: "Partite recenti" },
  { chiave: "note", label: "Note generali", labelBreve: "Note" },
];
const PESI_COLONNA_REPORT = {
  dataNascita: 1.3, categoria: 0.75, squadra: 1.3, ruolo: 1.5, piede: 0.7,
  nazionalita: 0.6, etichette: 1.5, mediaTips: 1.4, ultimaValutazione: 3.2,
  datiFisici: 1.6, trasferimenti: 2.2, partite: 2.0, note: 2.6
};
const REPORT_PRESET_BASE = ["dataNascita", "categoria", "squadra", "ruolo", "mediaTips"];
const REPORT_PRESET_COMPLETO = CAMPI_REPORT.map(c => c.chiave);

function troncaTesto(str, max) {
  if (!str) return "";
  return str.length > max ? str.slice(0, max).trimEnd() + "…" : str;
}

function valoreCampoReport(p, chiave) {
  switch (chiave) {
    case "dataNascita": {
      const eta = calcolaEta(p.dataNascita);
      return p.dataNascita ? `${formatDataIt(p.dataNascita)}${eta !== null ? " (" + eta + " anni)" : ""}` : "";
    }
    case "categoria": return categoriaNazionale(p.dataNascita) || "";
    case "squadra": return p.squadra || "";
    case "ruolo": return [p.ruoloPrimario, p.ruoloSecondario].filter(Boolean).join(" / ");
    case "piede": return p.piedePreferito || "";
    case "nazionalita": return p.nazionalita || "";
    case "etichette": return (p.etichette || []).join(", ");
    case "mediaTips": {
      const medie = medieTips(p, new Set());
      const media = valutazioneMedia(p, new Set());
      return PARAM_CANONICI_TIPS.map(k => `${RADAR_ABBREV[k]}:${medie[k] !== null ? medie[k].toFixed(1) : "-"}`).join(" ") +
        ` · M:${media !== null ? media.toFixed(1) : "-"}`;
    }
    case "ultimaValutazione": {
      const ultime = (p.valutazioni || []).filter(v => v.parametro === "Commento" && v.notaScritta)
        .sort((a, b) => (b.data || "").localeCompare(a.data || ""));
      return ultime[0] ? `[${formatDataIt(ultime[0].data)}] ${ultime[0].notaScritta}` : "";
    }
    case "datiFisici": {
      const parti = [];
      if (p.etaBiologica) parti.push(`Età biologica ${p.etaBiologica}`);
      if (p.altezza) parti.push(`Altezza ${Math.round(p.altezza)}cm`);
      if (p.peso) parti.push(`Peso ${Math.round(p.peso)}kg`);
      if (p.sviluppoBiologico) parti.push(p.sviluppoBiologico);
      return parti.join(", ");
    }
    case "trasferimenti":
      return (p.trasferimenti || []).map(t => `${formatDataIt(t.data)}: ${t.daSquadra || "?"} → ${t.aSquadra || "?"}`).join(" | ");
    case "partite":
      return (p.partiteUfficiali || []).slice().sort((a, b) => (b.data || "").localeCompare(a.data || "")).slice(0, 3)
        .map(m => `${formatDataIt(m.data)} ${m.avversario ? "vs " + m.avversario : ""} (${m.presenza || "?"})`).join(" | ");
    case "note": return p.note || "";
    default: return "";
  }
}

            <div class="report-campi-grid">
              ${tutteLeEtichette.map(e => `
                <label class="report-campo-check">
                  <input type="checkbox" class="report-etichetta-check" value="${esc(e)}">
                  ${esc(e)}
                </label>`).join("")}
            </div>
          </div>
          <p class="muted" id="report-conteggio" style="margin-top:10px;">Il report includerà <strong>${giocatoriElenco.length}</strong> giocatori.</p>
        </div>

        <div class="import-subsection">
          <h3>Formato</h3>
          <div class="import-controls">

            <label style="display:flex; align-items:center; gap:6px;"><input type="radio" name="report-formato" value="excel"> Excel (.xlsx)</label>
          </div>
        </div>

        <div class="import-subsection" id="report-layout-wrap">
          <h3>Impaginazione (solo per il PDF)</h3>
          <div class="import-controls">
            <label style="display:flex; align-items:center; gap:6px;"><input type="radio" name="report-layout" value="tabella" checked> Tabella compatta — una riga per giocatore</label>
            <label style="display:flex; align-items:center; gap:6px;"><input type="radio" name="report-layout" value="scheda"> Schede dettagliate — più dettagli, con foto</label>
          </div>
          <div id="report-scheda-perpagina-wrap" style="display:none; margin-top:8px; padding-left:24px;">
            <label style="display:flex; align-items:center; gap:6px;"><input type="checkbox" id="report-scheda-perpagina" checked> Una pagina per giocatore</label>
            <p class="muted" style="margin:4px 0 0;">Se disattivato, più schede si susseguono nella stessa pagina separate da una riga, così non sprechi spazio con poche note.</p>
          </div>
        </div>

        <div class="import-subsection">
          <h3>Campi da includere <span class="muted" style="font-weight:400;">(Cognome e Nome sono sempre inclusi)</span></h3>
          <div class="import-controls">
            <button type="button" class="btn btn-ghost btn-sm" id="report-preset-base">Modello: Base</button>
            <button type="button" class="btn btn-ghost btn-sm" id="report-preset-completo">Modello: Completo</button>
          </div>
          <div class="report-campi-grid" id="report-campi-grid">

              <label class="report-campo-check" data-solo-scheda="${c.soloScheda ? "1" : "0"}">
                <input type="checkbox" class="report-campo" value="${c.chiave}" ${REPORT_PRESET_BASE.includes(c.chiave) ? "checked" : ""}>

  function giocatoriSelezionati() {

    if (fonte === "elenco") return giocatoriElenco;
    const etichetteScelte = [...document.querySelectorAll(".report-etichetta-check:checked")].map(el => el.value);
    if (!etichetteScelte.length) return [];
    return players.filter(p => (p.etichette || []).some(e => etichetteScelte.includes(e)));
  }
  function aggiornaConteggio() {
    document.getElementById("report-conteggio").innerHTML = `Il report includerà <strong>${giocatoriSelezionati().length}</strong> giocatori.`;

    if (!fotoOk) checkFoto.checked = false;

  };
  document.getElementById("report-preset-completo").onclick = () => {
    document.querySelectorAll(".report-campo").forEach(el => { if (!el.disabled) el.checked = REPORT_PRESET_COMPLETO.includes(el.value); });
  };

  document.getElementById("report-genera").onclick = () => {
    const formato = document.querySelector('input[name="report-formato"]:checked').value;
    const layout = document.querySelector('input[name="report-layout"]:checked').value;
    const unaPerPagina = document.getElementById("report-scheda-perpagina").checked;
    const campi = [...document.querySelectorAll(".report-campo:checked")].map(el => el.value);

    const nomeBase = (fonte === "etichette" && etichetteScelte.length) ? etichetteScelte.join(" + ") : "Report giocatori";
    if (formato === "excel") generaReportExcel(selezionati, campi, nomeBase);
    else generaReportPDF(selezionati, campi, layout, unaPerPagina, nomeBase);
  };

  document.getElementById("modal-close-report").onclick = () => { root.innerHTML = ""; };
  document.getElementById("modal-overlay-report").onclick = e => { if (e.target.id === "modal-overlay-report") root.innerHTML = ""; };
}

function generaReportExcel(giocatori, campi, nomeBase) {
  const intestazioni = ["Cognome", "Nome", ...campi.map(c => CAMPI_REPORT.find(x => x.chiave === c).label)];
  const righe = giocatori.map(p => [p.cognome, p.nome, ...campi.map(c => valoreCampoReport(p, c))]);
  const ws = XLSX.utils.aoa_to_sheet([intestazioni, ...righe]);
  ws["!cols"] = intestazioni.map(() => ({ wch: 24 }));
  const wb = XLSX.utils.book_new();
  XLSX.utils.book_append_sheet(wb, ws, "Report");
  XLSX.writeFile(wb, `${sanitizeNomeFile(nomeBase)} - ${formatDataFile(dataOggiLocale())}.xlsx`);
}

function generaReportPDF(giocatori, campi, layout, unaPerPagina = true, nomeBase = "Report giocatori") {
  const root = document.getElementById("modal-root");
  if (!root) return;
  const dataEsportazione = formatDataIt(dataOggiLocale());
  const titolo = `${nomeBase} — Data di esportazione: ${dataEsportazione} (${giocatori.length} giocatori)`;

  let corpo;
  if (layout === "tabella") {
    const larghezzaCognomeNome = 9; // % ciascuna colonna
    const pesi = campi.map(c => PESI_COLONNA_REPORT[c] || 1);
    const sommaPesi = pesi.reduce((a, b) => a + b, 0) || 1;
    const larghezzaDisponibile = 100 - larghezzaCognomeNome * 2;
    const colgroup = `<colgroup>
      <col style="width:${larghezzaCognomeNome}%">
      <col style="width:${larghezzaCognomeNome}%">
      ${pesi.map(p => `<col style="width:${(larghezzaDisponibile * p / sommaPesi).toFixed(2)}%">`).join("")}
    </colgroup>`;
    const intestazioni = ["Cognome", "Nome", ...campi.map(c => { const def = CAMPI_REPORT.find(x => x.chiave === c); return def.labelBreve || def.label; })];
    corpo = `<table class="tabella-report-stampa">
      ${colgroup}
      <thead><tr>${intestazioni.map(h => `<th>${esc(h)}</th>`).join("")}</tr></thead>
      <tbody>
        ${giocatori.map(p => `<tr><td>${esc(p.cognome)}</td><td>${esc(p.nome)}</td>${campi.map(c => `<td>${esc(troncaTesto(valoreCampoReport(p, c), 140))}</td>`).join("")}</tr>`).join("")}
      </tbody>
    </table>`;
  } else {
    corpo = giocatori.map((p, idx) => `
      <div class="report-scheda-stampa${unaPerPagina ? "" : " report-scheda-compatta"}">
        ${(campi.includes("foto") && p.foto) ? `<img class="report-foto" src="${esc(p.foto)}" alt="">` : ""}
        <h3>${esc(p.cognome)} ${esc(p.nome)}</h3>
        ${campi.filter(c => c !== "foto").map(c => {

function apriDettaglio(id) {
  const p = players.find(pl => pl.id === id);
  if (!p) return;
  migraSquadraCategorie(p);

  const media = valutazioneMedia(p, filtroScouts);
  const eta = calcolaEta(p.dataNascita);
  const etichette = p.etichette || [];

  function scoutPerVisionatura(v) {
    if (v.scout) return v.scout;
    const match = (p.valutazioni || []).find(x => x.data === v.data && x.scout);
    return match ? match.scout : "";
  }

  const ORDINE_PARAMETRI_VAL = ["Tecnica", "Intelligenza", "Personalità", "Speed", "Media Tips"];
  function ordinaVociGruppo(voci) {
    return voci.slice().sort((a, b) => {
      if (a.parametro === "Commento") return 1;
      if (b.parametro === "Commento") return -1;
      const ia = ORDINE_PARAMETRI_VAL.indexOf(a.parametro);
      const ib = ORDINE_PARAMETRI_VAL.indexOf(b.parametro);
      if (ia === -1 && ib === -1) return 0;
      if (ia === -1) return 1;
      if (ib === -1) return -1;
      return ia - ib;
    });
  }

  const gruppiValutazioni = {};
  const ordineGruppi = [];
  (p.valutazioni || []).forEach(v => {
    const key = (v.data || "") + "|" + (v.scout || "");
    if (!gruppiValutazioni[key]) { gruppiValutazioni[key] = { data: v.data, scout: v.scout, voci: [] }; ordineGruppi.push(key); }

  const chiaviUsate = new Set();
  const visHTML = (p.visionature || []).slice().sort((a, b) => (b.data || "").localeCompare(a.data || ""))
    .map(v => {
      const scoutVis = scoutPerVisionatura(v);
      const chiave = (v.data || "") + "|" + (scoutVis || "");
      const gruppo = gruppiValutazioni[chiave];
      if (gruppo) chiaviUsate.add(chiave);

function costruisciTestoStoricoGiocatore(p) {
  const righe = [];
  righe.push(`Giocatore: ${p.cognome} ${p.nome}`);
  if (p.dataNascita) righe.push(`Data di nascita: ${formatDataIt(p.dataNascita)}`);
  if (p.squadra) righe.push(`Squadra attuale: ${p.squadra}`);
  if (p.ruoloPrimario) righe.push(`Ruolo: ${p.ruoloPrimario}${p.ruoloSecondario ? " / " + p.ruoloSecondario : ""}`);
  righe.push("");
  righe.push("Cronologia valutazioni (dalla più vecchia alla più recente):");
  const gruppi = {};
  const ordine = [];
  (p.valutazioni || []).forEach(v => {
    const key = (v.data || "") + "|" + (v.scout || "");
    if (!gruppi[key]) { gruppi[key] = { data: v.data, scout: v.scout, voci: [] }; ordine.push(key); }
    gruppi[key].voci.push(v);
  });
  ordine.map(k => gruppi[k]).sort((a, b) => (a.data || "").localeCompare(b.data || "")).forEach(g => {
    righe.push(`- ${formatDataIt(g.data)}${g.scout ? " (scout: " + g.scout + ")" : ""}:`);
    g.voci.forEach(v => {
      const voto = v.valoreNumerico !== undefined && v.valoreNumerico !== "" ? ` [${v.valoreNumerico}]` : "";
      righe.push(`  ${v.parametro}${voto}${v.notaScritta ? ": " + v.notaScritta : ""}`);
    });
  });
  return righe.join("\n");
}

async function generaRiassuntoAI(p) {
  if (!geminiApiKey && !anthropicApiKey) {
    alert("Per generare il riassunto AI serve prima inserire una chiave API (Google Gemini, gratuita, o Anthropic) in Strumenti.");
    return null;
  }
  const testoStorico = costruisciTestoStoricoGiocatore(p);
  const prompt = `Sei un assistente di uno scout di calcio giovanile. Di seguito trovi la cronologia completa delle valutazioni scritte su un giocatore, dalla più vecchia alla più recente. Scrivi un riassunto in italiano di massimo 5-6 frasi che descriva chi è questo giocatore come profilo (caratteristiche tecniche, tattiche, fisiche, mentali) e come si è evoluto nel tempo se emergono dei cambiamenti tra le visionature più vecchie e quelle più recenti. Scrivi in prosa scorrevole, senza elenchi puntati, come se stessi presentando il giocatore a un dirigente. Non inventare informazioni che non sono presenti nel testo.\n\n${testoStorico}`;

  // Preferiamo Gemini perché la sua fascia gratuita non richiede carta di
  // credito; Anthropic resta disponibile come alternativa se preferita.
  if (geminiApiKey) return await chiamaGemini(prompt);
  return await chiamaAnthropic(prompt);
}

async function chiamaGemini(prompt) {
  const TENTATIVI_MAX = 3;
  const ATTESE_MS = [2000, 4000, 8000]; // backoff crescente tra un tentativo e l'altro

  for (let tentativo = 0; tentativo < TENTATIVI_MAX; tentativo++) {
    const resp = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-flash-latest:generateContent`, {
      method: "POST",
      headers: {
        "x-goog-api-key": geminiApiKey,
        "content-type": "application/json"
      },
      body: JSON.stringify({ contents: [{ role: "user", parts: [{ text: prompt }] }] })
    });
    if (resp.ok) {
      const data = await resp.json();
      const testo = ((data.candidates || [])[0]?.content?.parts || []).map(pt => pt.text || "").join("").trim();
      return testo || null;
    }
    const errText = await resp.text().catch(() => "");
    const erroreTemporaneo = resp.status === 503 || resp.status === 429;
    const ultimoTentativo = tentativo === TENTATIVI_MAX - 1;
    if (!erroreTemporaneo || ultimoTentativo) {
      throw new Error(`Errore API Gemini (${resp.status}): ${errText.slice(0, 200)}`);
    }
    // Errore temporaneo (server sovraccarico o troppe richieste): aspetta e riprova
    await new Promise(r => setTimeout(r, ATTESE_MS[tentativo]));
  }
}

async function chiamaAnthropic(prompt) {
  const resp = await fetch("https://api.anthropic.com/v1/messages", {
    method: "POST",
    headers: {
      "x-api-key": anthropicApiKey,
      "anthropic-version": "2023-06-01",
      "content-type": "application/json",
      "anthropic-dangerous-direct-browser-access": "true"
    },
    body: JSON.stringify({
      model: "claude-sonnet-4-6",
      max_tokens: 500,
      messages: [{ role: "user", content: prompt }]
    })
  });
  if (!resp.ok) {
    const errText = await resp.text().catch(() => "");
    throw new Error(`Errore API Anthropic (${resp.status}): ${errText.slice(0, 200)}`);
  }
  const data = await resp.json();
  const testo = (data.content || []).map(b => b.text || "").join("").trim();
  return testo || null;
}

function ridimensionaImmagine(file, maxLato, qualita) {
  maxLato = maxLato || 320;
  qualita = qualita || 0.75;
  return new Promise((resolve, reject) => {
    const reader = new FileReader();
    reader.onload = e => {
      const img = new Image();
      img.onload = () => {
        let w = img.width, h = img.height;
        if (w > h) { if (w > maxLato) { h = Math.round(h * maxLato / w); w = maxLato; } }
        else { if (h > maxLato) { w = Math.round(w * maxLato / h); h = maxLato; } }
        const canvas = document.createElement("canvas");
        canvas.width = w; canvas.height = h;
        canvas.getContext("2d").drawImage(img, 0, 0, w, h);
        resolve(canvas.toDataURL("image/jpeg", qualita));
      };
      img.onerror = () => reject(new Error("Immagine non leggibile"));
      img.src = e.target.result;
    };
    reader.onerror = () => reject(new Error("Impossibile leggere il file"));
    reader.readAsDataURL(file);
  });
}

  };

  document.querySelectorAll("#fp-etichette-chips .chip").forEach(chip => {
    chip.onclick = () => chip.classList.toggle("chip-active");
  });
  document.getElementById("btn-add-etichetta").onclick = () => {
    const input = document.getElementById("fp-nuova-etichetta");
    const val = input.value.trim();
    if (!val) return;
    const chipsGroup = document.getElementById("fp-etichette-chips");
    const esistente = [...chipsGroup.querySelectorAll(".chip")].find(c => c.dataset.val.toLowerCase() === val.toLowerCase());
    if (esistente) {
      esistente.classList.add("chip-active");
    } else {
      const chip = document.createElement("button");
      chip.type = "button";
      chip.className = "chip chip-active";
      chip.dataset.val = val;
      chip.textContent = val;
      chip.onclick = () => chip.classList.toggle("chip-active");
      chipsGroup.appendChild(chip);
    }
    input.value = "";
  };

  document.querySelectorAll("#fp-categorie-chips .chip").forEach(chip => {
    chip.onclick = () => chip.classList.toggle("chip-active");
  });

  document.getElementById("player-form").onsubmit = e => {
    e.preventDefault();
    salvaForm(p ? p.id : null, fotoCorrente);
  };
}

// Confronto "grezzo" per valori semplici o array/oggetti di dati form: basta
// per capire se una sezione della scheda è cambiata rispetto a prima, dato che
// gli array vengono sempre ricostruiti con lo stesso ordine di chiavi.
function diversi(a, b) {
  return JSON.stringify(a === undefined ? null : a) !== JSON.stringify(b === undefined ? null : b);
}

function salvaForm(existingId, foto) {
  const cognome = document.getElementById("fp-cognome").value.trim();
  const nome = document.getElementById("fp-nome").value.trim();
  if (!cognome || !nome) {
    alert("Cognome e nome sono obbligatori.");
    return;
  }

  const visionature = [];
  document.querySelectorAll(".visionatura-row").forEach(row => {
    const data = row.querySelector(".v-data").value;
    const luogo = row.querySelector(".v-luogo").value.trim();
    const scout = row.querySelector(".v-scout").value.trim();
    const note = row.querySelector(".v-note").value.trim();
    if (data || luogo || scout || note) visionature.push({ data, luogo, scout, note });
  });

  const valutazioni = [];
  document.querySelectorAll(".valutazione-gruppo-edit").forEach(gruppoEl => {
    const data = gruppoEl.querySelector(".qg-data").value;
    const scout = gruppoEl.querySelector(".qg-scout").value.trim();
    const nota = gruppoEl.querySelector(".qg-nota").value.trim();
    gruppoEl.querySelectorAll(".qg-parametro-row").forEach(riga => {
      const parametro = riga.querySelector(".qg-param-nome").value.trim();
      const valoreNumerico = riga.querySelector(".qg-param-voto").value;
      if (parametro && valoreNumerico !== "") {
        valutazioni.push({ data, parametro, valoreNumerico, scout, notaScritta: "" });
      }
    });
    if (nota) {
      valutazioni.push({ data, parametro: "Commento", valoreNumerico: "", scout, notaScritta: nota });
    }
  });

  const trasferimenti = [];
  document.querySelectorAll(".trasferimento-row").forEach(row => {
    const data = row.querySelector(".t-data").value;
    const daSquadra = row.querySelector(".t-da").value.trim();
    const aSquadra = row.querySelector(".t-a").value.trim();
    const note = row.querySelector(".t-nota").value.trim();
    if (data || daSquadra || aSquadra || note) trasferimenti.push({ data, daSquadra, aSquadra, note });
  });

  const misurazioni = [];
  document.querySelectorAll(".misurazione-row").forEach(row => {
    const data = row.querySelector(".m-data").value;
    const altezza = row.querySelector(".m-altezza").value;
    const peso = row.querySelector(".m-peso").value;
    const etaBiologica = row.querySelector(".m-eta").value;
    const sviluppoBiologico = row.querySelector(".m-sviluppo").value;
    const altezzaAdulto = row.querySelector(".m-altezzaadulto").value;
    if (data || altezza !== "" || peso !== "" || etaBiologica !== "" || sviluppoBiologico || altezzaAdulto !== "") {
      const voce = {
        data,
        altezza: altezza !== "" ? parseFloat(altezza) : null,
        peso: peso !== "" ? parseFloat(peso) : null,
        etaBiologica: etaBiologica !== "" ? parseFloat(etaBiologica) : null,
        sviluppoBiologico: sviluppoBiologico || null,
        altezzaAdulto: altezzaAdulto !== "" ? parseFloat(altezzaAdulto) : null,
      };
      if (row.dataset.fonte) voce.fonte = row.dataset.fonte;
      misurazioni.push(voce);
    }
  });
  // La misurazione più recente alimenta anche i campi "riepilogo" mostrati
  // subito in scheda, senza dover aprire lo storico.
  const misurazioniOrdinate = misurazioni.slice().sort((a, b) => (b.data || "").localeCompare(a.data || ""));
  const ultimaMisurazione = misurazioniOrdinate[0] || {};

  const partiteUfficiali = [];
  document.querySelectorAll(".partita-row-block").forEach(row => {
    const data = row.querySelector(".pu-data").value;
    const competizione = row.querySelector(".pu-competizione").value.trim();
    const squadra = row.querySelector(".pu-squadra").value.trim();
    const avversario = row.querySelector(".pu-avversario").value.trim();
    const risultato = row.querySelector(".pu-risultato").value.trim();
    const presenza = row.querySelector(".pu-presenza").value;
    const minuti = row.querySelector(".pu-minuti").value;
    const gol = row.querySelector(".pu-gol").value;
    const nota = row.querySelector(".pu-nota").value.trim();
    if (data || competizione || squadra || avversario || risultato || presenza || minuti !== "" || gol !== "" || nota) {
      partiteUfficiali.push({
        data, competizione, squadra, avversario, risultato, presenza,
        minutiGiocati: minuti !== "" ? parseInt(minuti, 10) : null,
        gol: gol !== "" ? parseInt(gol, 10) : null,
        note: nota
      });
    }
  });

  const etichette = [...document.querySelectorAll("#fp-etichette-chips .chip.chip-active")].map(c => c.dataset.val);
  const categorie = [...document.querySelectorAll("#fp-categorie-chips .chip.chip-active")].map(c => c.dataset.val);
  const vecchioPlayer = existingId ? players.find(pl => pl.id === existingId) : null;

  // Traccia due date separate: "modificatoIl" scatta ad ogni salvataggio della
  // scheda (qualunque campo), "noteModificateIl" solo quando cambia davvero il
  // testo del campo Note generali — alimentano rispettivamente l'ordinamento
  // "Ultimi modificati" nell'Elenco e la data mostrata accanto alla nota.
  const oraSalvataggio = Date.now();
  const notaTesto = document.getElementById("fp-note").value.trim();
  const notaPrecedente = vecchioPlayer ? (vecchioPlayer.note || "") : "";
  const notaCambiata = notaPrecedente !== notaTesto;

  // Quali sezioni della scheda sono cambiate in QUESTO salvataggio (usato
  // dalla colonna "Modificato" in vista Elenco). Per una scheda nuova non ha
  // senso elencare tutto: basta dire che è appena stata creata.
  let sezioniModificate;
  if (!vecchioPlayer) {
    sezioniModificate = ["Scheda creata"];
  } else {
    sezioniModificate = [];
    const anagraficaNuova = [
      cognome, nome,
      document.getElementById("fp-datanascita").value,
      document.getElementById("fp-squadra").value.trim(),
      document.getElementById("fp-ruoloprimario").value.trim(),
      document.getElementById("fp-ruolosecondario").value.trim(),
      document.getElementById("fp-piedepreferito").value,
      document.getElementById("fp-nazionalita").value.trim().toUpperCase(),
    ];
    const anagraficaVecchia = [
      vecchioPlayer.cognome, vecchioPlayer.nome, vecchioPlayer.dataNascita, vecchioPlayer.squadra,
      vecchioPlayer.ruoloPrimario, vecchioPlayer.ruoloSecondario, vecchioPlayer.piedePreferito, vecchioPlayer.nazionalita,
    ];
    if (diversi(anagraficaNuova, anagraficaVecchia)) sezioniModificate.push("Anagrafica");
    if (notaCambiata) sezioniModificate.push("Note");
    if (diversi(misurazioni, vecchioPlayer.misurazioni || [])) sezioniModificate.push("Dati fisici");
    if (diversi(etichette, vecchioPlayer.etichette || [])) sezioniModificate.push("Etichette");
    if (diversi(categorie, vecchioPlayer.categorie || [])) sezioniModificate.push("Categorie");
    if (diversi(visionature, vecchioPlayer.visionature || [])) sezioniModificate.push("Visionature");
    if (diversi(valutazioni, vecchioPlayer.valutazioni || [])) sezioniModificate.push("Valutazioni");
    if (diversi(trasferimenti, vecchioPlayer.trasferimenti || [])) sezioniModificate.push("Trasferimenti");
    if (diversi(partiteUfficiali, vecchioPlayer.partiteUfficiali || [])) sezioniModificate.push("Partite");
    if ((foto || "") !== (vecchioPlayer.foto || "")) sezioniModificate.push("Foto");
    if (!sezioniModificate.length) sezioniModificate.push("Nessuna modifica rilevata");
  }

  const player = {
    ...(vecchioPlayer || {}),
    id: existingId || uid(),
    creatoIl: vecchioPlayer ? vecchioPlayer.creatoIl : oraSalvataggio,
    modificatoIl: oraSalvataggio,
    ultimeSezioniModificate: sezioniModificate,
    noteModificateIl: notaCambiata ? oraSalvataggio : (vecchioPlayer ? vecchioPlayer.noteModificateIl || null : null),
    cognome,
    nome,
    dataNascita: document.getElementById("fp-datanascita").value,
    squadra: document.getElementById("fp-squadra").value.trim(),
    categorie,
    squadraCategorieMigrata: true,
    ruoloPrimario: document.getElementById("fp-ruoloprimario").value.trim(),
    ruoloSecondario: document.getElementById("fp-ruolosecondario").value.trim(),
    piedePreferito: document.getElementById("fp-piedepreferito").value,
    nazionalita: document.getElementById("fp-nazionalita").value.trim().toUpperCase(),
    note: notaTesto,
    etaBiologica: ultimaMisurazione.etaBiologica !== undefined && ultimaMisurazione.etaBiologica !== null ? Math.round(ultimaMisurazione.etaBiologica * 10) / 10 : "",
    altezza: ultimaMisurazione.altezza !== undefined && ultimaMisurazione.altezza !== null ? ultimaMisurazione.altezza : "",
    peso: ultimaMisurazione.peso !== undefined && ultimaMisurazione.peso !== null ? ultimaMisurazione.peso : "",
    dataMisurazione: ultimaMisurazione.data || "",
    sviluppoBiologico: ultimaMisurazione.sviluppoBiologico || "",
    altezzaAdulto: ultimaMisurazione.altezzaAdulto !== undefined && ultimaMisurazione.altezzaAdulto !== null ? ultimaMisurazione.altezzaAdulto : "",
    misurazioni,
    partiteUfficiali,
    foto: foto || "",
    etichette,
    visionature,
    valutazioni,
    trasferimenti
  };

  if (existingId) {
    const idx = players.findIndex(pl => pl.id === existingId);
    if (idx >= 0) players[idx] = player;
    else players.push(player);
  } else {
    players.push(player);
  }

  savePlayers();
  switchTab("elenco");
}

/* ===================== IMPORT PDF ===================== */
let pdfjsReady = null;

function ensurePdfJs() {
  if (pdfjsReady) return pdfjsReady;
  pdfjsReady = new Promise((resolve, reject) => {
    if (window.pdfjsLib) { resolve(window.pdfjsLib); return; }
    const script = document.createElement("script");
    script.src = "https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js";
    script.onload = () => {
      window.pdfjsLib.GlobalWorkerOptions.workerSrc = "https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js";
      resolve(window.pdfjsLib);
    };
    script.onerror = () => reject(new Error("Impossibile caricare la libreria di lettura PDF."));
    document.head.appendChild(script);
  });
  return pdfjsReady;
}

async function estraiTestoPdf(file) {
  const pdfjsLib = await ensurePdfJs();
  const buf = await file.arrayBuffer();
  const doc = await pdfjsLib.getDocument({ data: buf }).promise;
  const lines = [];
  for (let i = 1; i <= doc.numPages; i++) {
    const page = await doc.getPage(i);
    const content = await page.getTextContent();
    content.items.forEach(it => {
      if (it.str && it.str.trim()) lines.push(it.str.trim());
    });
  }
  return lines.join("\n");
}

/* Formato "Nazionale": osservato nei raduni delle selezioni giovanili,
   dove ogni giocatore ha UN paragrafo con "Nome Cognome, data di nascita,
   squadra, ruolo, T=x, I=x, P=x, S=x. Media: x." (ordine di squadra/data
   non sempre coerente) seguito da un paragrafo "Commento: testo...".
   A differenza degli altri formati Word, qui il nome è nell'ordine
   Nome-Cognome (il cognome è tutto ciò che segue la prima parola). */
function parseCandidatiDocxNazionale(html, scoutDefault, nomeFile) {
  const container = document.createElement("div");
  container.innerHTML = html;
  const paragrafi = [...container.querySelectorAll("p")].map(p => p.textContent.trim()).filter(Boolean);

  const RUOLO_RE = /^(Difensore|Centrocampista|Attaccante|Esterno|Interno|Trequartista|Punta|Terzino|Portiere|Ala|Mediano|Regista)\b/i;
  const DATE_ONLY_RE = /^\d{1,2}[.\/]\d{1,2}[.\/]\d{2,4}$/;

  // Data e contesto dal primo paragrafo (es. "Raduno U16 TYT – FC Luzern
  // U16 - 08.04.2026").
  let dataVisionatura = "", partitaInfo = "";
  if (paragrafi[0]) {
    const dm = paragrafi[0].match(/(\d{1,2})[.\/](\d{1,2})[.\/](\d{2,4})/);
    if (dm) {
      dataVisionatura = normalizzaData(dm[0]);
      partitaInfo = paragrafi[0].replace(dm[0], "").trim().replace(/[-–—]\s*$/, "").trim();
    }
  }
  const contestoFilename = estraiContestoDaFilename(nomeFile || "");
  if (!dataVisionatura) dataVisionatura = contestoFilename.dataVisionatura || "";
  const scoutRisolto = scoutDefault || contestoFilename.scoutDaFilename || "";

  const candidates = [];
  for (let i = 0; i < paragrafi.length; i++) {
    const testa = paragrafi[i];
    if (!/T\s*=\s*[\d.,]+/i.test(testa)) continue; // non è una riga giocatore
    // Il formato "Nazionale" ha sempre una data di nascita completa sulla
    // stessa riga prima dei voti: questo lo distingue in modo affidabile
    // dal formato "elenco numerato", che contiene anch'esso "T=" ma mai
    // una data completa.
    if (!/\d{1,2}[.\/]\d{1,2}[.\/]\d{2,4}/.test(testa.slice(0, testa.search(/T\s*=/i)))) continue;

    const idxT = testa.search(/T\s*=/i);
    const parteAnagrafica = testa.slice(0, idxT);
    const parteVoti = testa.slice(idxT);

    const segmenti = parteAnagrafica.split(",").map(s => s.trim()).filter(Boolean);
    if (!segmenti.length) continue;
    const nomeCompleto = segmenti[0];

    let dataNascita = "", squadra = "", ruolo = "";
    segmenti.forEach((s, idx) => {
      if (idx === 0) return;
      if (DATE_ONLY_RE.test(s)) { dataNascita = normalizzaData(s); return; }
      if (RUOLO_RE.test(s)) { ruolo = s; return; }
      if (!squadra) squadra = s;
    });

    const tm = parteVoti.match(/T\s*=\s*(\d+(?:[.,]\d+)?)/i);
    const im = parteVoti.match(/I\s*=\s*(\d+(?:[.,]\d+)?)/i);
    const pm = parteVoti.match(/P\s*=\s*(\d+(?:[.,]\d+)?)/i);
    const sm = parteVoti.match(/S\s*=\s*(\d+(?:[.,]\d+)?)/i);
    const mediam = parteVoti.match(/Media:?\s*(\d+(?:[.,]\d+)?)/i);
    const parametri = [];
    if (tm) parametri.push({ label: "Tecnica", valore: tm[1].replace(",", ".") });
    if (im) parametri.push({ label: "Intelligenza", valore: im[1].replace(",", ".") });
    if (pm) parametri.push({ label: "Personalità", valore: pm[1].replace(",", ".") });
    if (sm) parametri.push({ label: "Speed", valore: sm[1].replace(",", ".") });
    if (mediam) parametri.push({ label: "Media Tips", valore: mediam[1].replace(",", ".") });

    // Qui il nome è "Nome Cognome" (non "Cognome Nome" come altrove):
    // la prima parola è il nome, il resto il cognome.
    const parole = nomeCompleto.split(/\s+/).filter(Boolean);
    const nome = parole[0] || "";
    const cognome = parole.slice(1).join(" ") || nomeCompleto;

    let notaScritta = "";
    if (paragrafi[i + 1] && /^Commento\s*:/i.test(paragrafi[i + 1])) {
      notaScritta = paragrafi[i + 1].replace(/^Commento\s*:\s*/i, "").trim();
    }

    candidates.push({
      cognome, nome, dataNascita,
      squadra, ruoloPrimario: ruolo,
      dataVisionatura, partitaInfo,
      scoutAutore: scoutRisolto,
      etichetteAuto: etichetteDaFilename(nomeFile),
      parametri, notaScritta,
      _raw: `[${nomeFile}] ${nomeCompleto} (${dataNascita || "data n.d."}) — ${squadra}`
    });
  }
  return candidates;
}

/* Formato "narrativo semplice" (Word): osservato in relazioni senza voti
   Tips, dove ogni giocatore ha solo un paragrafo col nome (ordine non
   coerente: a volte Nome Cognome, a volte Cognome Nome, a seconda di chi
   scrive) seguito da un paragrafo di commento libero, raggruppati sotto
   intestazioni "PARTITA 1", "PARTITA 2" ecc. Nessuna data/squadra/ruolo
   esplicita nel documento: usiamo solo nome del file per scout/etichette. */
function parseCandidatiDocxNarrativo(html, scoutDefault, nomeFile) {
  const container = document.createElement("div");
  container.innerHTML = html;
  const paragrafi = [...container.querySelectorAll("p")]
    .map(p => ({
      bold: p.children.length === 1 && p.children[0].tagName === "STRONG" && p.textContent.trim() === p.children[0].textContent.trim(),
      text: p.textContent.trim()
    }))
    .filter(p => p.text);

  const contestoFilename = estraiContestoDaFilename(nomeFile || "");
  const dataVisionatura = contestoFilename.dataVisionatura || "";
  const scoutRisolto = scoutDefault || contestoFilename.scoutDaFilename || "";
  const etichetteAuto = etichetteDaFilename(nomeFile);

  const candidates = [];
  let partitaCorrente = "";
  let i = 0;
  while (i < paragrafi.length) {
    const p = paragrafi[i];
    if (p.bold) { partitaCorrente = p.text; i++; continue; }

    const nomeCompleto = p.text;
    // Un nome è breve (poche parole, niente punteggiatura da frase):
    // se troppo lungo è probabilmente testo isolato da ignorare.
    if (nomeCompleto.split(/\s+/).length > 4 || nomeCompleto.length > 40 || /[.!?]/.test(nomeCompleto)) {
      i++; continue;
    }
    i++;
    if (i >= paragrafi.length || paragrafi[i].bold) continue; // nessun commento a seguire

    const commento = paragrafi[i].text;
    i++;

    const { cognome, nome } = splitNomeCognome(nomeCompleto);
    candidates.push({
      cognome, nome,
      dataNascita: "",
      squadra: "",
      ruoloPrimario: "",
      dataVisionatura,
      partitaInfo: partitaCorrente,
      scoutAutore: scoutRisolto,
      etichetteAuto,
      parametri: [],
      notaScritta: commento,
      _raw: `[${nomeFile}] ${nomeCompleto} — ${partitaCorrente || "nessuna sezione"} (senza voti Tips né data nel documento)`
    });
  }
  return candidates;
}

/* Formato "elenco numerato" (Word): ogni giocatore è "N. Nome Cognome"
   (a volte con "– T=x, I=x, P=x, S=x" sulla stessa riga, a volte senza
   alcun voto), seguito dal commento — talvolta nello stesso paragrafo
   separato da un a-capo, talvolta in un paragrafo a parte. Per gestire
   entrambi i casi in modo uniforme, trasformiamo ogni paragrafo in una
   sequenza di righe (sostituendo i <br> con veri a-capo) e poi scorriamo
   tutto come un unico flusso di righe. */
function parseCandidatiDocxNumerato(html, scoutDefault, nomeFile) {
  const container = document.createElement("div");
  container.innerHTML = html;
  const lines = [];
  container.querySelectorAll("p").forEach(p => {
    // I nomi in grassetto appartengono al formato "elenco puntato" (gestito
    // da un parser dedicato): li ignoriamo qui per evitare che le due
    // logiche si sovrappongano su documenti che mescolano entrambi gli stili.
    const eBold = p.children.length === 1 && p.children[0].tagName === "STRONG" &&
                  p.textContent.trim() === p.children[0].textContent.trim();
    if (eBold) return;
    const conNewline = p.innerHTML.replace(/<br\s*\/?>/gi, "\n");
    const tmp = document.createElement("div");
    tmp.innerHTML = conNewline;
    tmp.textContent.split("\n").forEach(riga => {
      const t = riga.trim();
      if (t) lines.push(t);
    });
  });

  const RE_CON_VOTI = /^(?:(\d+)\.?\s+)?(.+?)\s*[–\-:]?\s*T\s*=\s*(\d+(?:[.,]\d+)?)\s*,\s*I\s*=\s*(\d+(?:[.,]\d+)?)\s*,\s*P\s*=\s*(\d+(?:[.,]\d+)?)\s*,\s*S\s*=\s*(\d+(?:[.,]\d+)?)\s*,?\s*(?:\(.*\))?\s*$/i;
  const RE_SOLO_NUMERO = /^(\d+)\.?\s+(.+?)\s*(?:\(.*\))?\s*$/i;

  function trovaRigaNome(line) {
    let m = line.match(RE_CON_VOTI);
    if (m) return { nome: m[2].trim(), voti: [m[3], m[4], m[5], m[6]] };
    m = line.match(RE_SOLO_NUMERO);
    if (m) return { nome: m[2].trim(), voti: null };
    return null;
  }

  const contestoFilename = estraiContestoDaFilename(nomeFile || "");
  const dataVisionatura = contestoFilename.dataVisionatura || "";
  const scoutRisolto = scoutDefault || contestoFilename.scoutDaFilename || "";
  const etichetteAuto = etichetteDaFilename(nomeFile);

  const candidates = [];
  let i = 0;
  while (i < lines.length) {
    const trovato = trovaRigaNome(lines[i]);
    if (!trovato) { i++; continue; }
    const nomeCompleto = trovato.nome;
    const parametri = [];
    if (trovato.voti) {
      const [t, in_, p, s] = trovato.voti;
      parametri.push({ label: "Tecnica", valore: t.replace(",", ".") });
      parametri.push({ label: "Intelligenza", valore: in_.replace(",", ".") });
      parametri.push({ label: "Personalità", valore: p.replace(",", ".") });
      parametri.push({ label: "Speed", valore: s.replace(",", ".") });
    }
    i++;

    const paragrafo = [];
    while (i < lines.length && !trovaRigaNome(lines[i])) {
      paragrafo.push(lines[i]); i++;
    }
    const notaScritta = paragrafo.join(" ").trim();
    if (!notaScritta) continue; // niente commento: probabilmente una riga non pertinente

    const { cognome, nome } = splitNomeCognome(nomeCompleto);
    candidates.push({
      cognome, nome,
      dataNascita: "",
      squadra: "",
      ruoloPrimario: "",
      dataVisionatura,
      partitaInfo: "",
      scoutAutore: scoutRisolto,
      etichetteAuto,
      parametri,
      notaScritta,
      _raw: `[${nomeFile}] ${nomeCompleto} (senza data nel documento)`
    });
  }
  return candidates;
}

/* Formato "elenco puntato" (Word): ogni giocatore è un elemento di lista
   numerata con il nome in grassetto (a volte con una nota tra parentesi
   sulla lingua, es. "(tedesco)"), seguito da uno o più paragrafi di
   commento libero. Nessun voto Tips in questo formato. */
function parseCandidatiDocxElenco(html, scoutDefault, nomeFile) {
  const container = document.createElement("div");
  container.innerHTML = html;

  const contestoFilename = estraiContestoDaFilename(nomeFile || "");
  const dataVisionatura = contestoFilename.dataVisionatura || "";
  const scoutRisolto = scoutDefault || contestoFilename.scoutDaFilename || "";
  const etichetteAuto = etichetteDaFilename(nomeFile);

  const candidates = [];
  let corrente = null;

  function chiudiCorrente() {
    if (corrente) {
      const notaScritta = corrente.paragrafi.join(" ").replace(/\s+/g, " ").trim();
      if (notaScritta) {
        const { cognome, nome } = splitNomeCognome(corrente.nomeCompleto);
        candidates.push({
          cognome, nome,
          dataNascita: "",
          squadra: "",
          ruoloPrimario: "",
          dataVisionatura,
          partitaInfo: "",
          scoutAutore: scoutRisolto,
          etichetteAuto,
          parametri: [],
          notaScritta,
          _raw: `[${nomeFile}] ${corrente.nomeCompleto} (senza voti Tips né data nel documento)`
        });
      }
    }
    corrente = null;
  }

  [...container.children].forEach(nodo => {
    if (nodo.tagName === "OL" || nodo.tagName === "UL") {
      const li = nodo.querySelector("li");
      const testoNome = li ? li.textContent.trim() : "";
      if (!testoNome) return;
      chiudiCorrente();
      const nomeCompleto = testoNome.replace(/^\d+\.?\s+/, "").replace(/\s*\([^)]*\)\s*$/, "").trim();
      corrente = { nomeCompleto, paragrafi: [] };
      return;
    }
    if (nodo.tagName !== "P") return;

    const eBold = nodo.children.length === 1 && nodo.children[0].tagName === "STRONG" &&
                  nodo.textContent.trim() === nodo.children[0].textContent.trim();
    const conNewline = nodo.innerHTML.replace(/<br\s*\/?>/gi, " ");
    const tmp = document.createElement("div");
    tmp.innerHTML = conNewline;
    const testo = tmp.textContent.trim();
    if (!testo) return;

    // Un paragrafo interamente in grassetto è un marcatore di nome (con o
    // senza numero davanti), non un commento — anche quando nello stesso
    // documento altri giocatori usano invece un elenco puntato.
    if (eBold) {
      chiudiCorrente();
      const nomeCompleto = testo.replace(/^\d+\.?\s+/, "").replace(/\s*\([^)]*\)\s*$/, "").trim();
      corrente = { nomeCompleto, paragrafi: [] };
      return;
    }

    if (corrente) corrente.paragrafi.push(testo);
  });
  chiudiCorrente();

  return candidates;
}

/* ===================== IMPORT WORD (relazioni libere) ===================== */
let mammothReady = null;

function ensureMammoth() {
  if (mammothReady) return mammothReady;
  mammothReady = new Promise((resolve, reject) => {
    if (window.mammoth) { resolve(window.mammoth); return; }
    const script = document.createElement("script");
    script.src = "https://cdnjs.cloudflare.com/ajax/libs/mammoth/1.11.0/mammoth.browser.min.js";
    script.onload = () => resolve(window.mammoth);
    script.onerror = () => reject(new Error("Impossibile caricare la libreria di lettura Word."));
    document.head.appendChild(script);
  });
  return mammothReady;
}

async function estraiHtmlDocx(file) {
  const mammoth = await ensureMammoth();
  const buf = await file.arrayBuffer();
  const result = await mammoth.convertToHtml({ arrayBuffer: buf });
  return result.value;
}

/* Formato tabellare: il modello "Modello_inserimento_valutazioni.docx"
   fornito allo scout, con una vera tabella Word (intestazione + una riga
   per giocatore): Data visionatura | Nome | Cognome | Data di nascita |
   Squadra | Partita visionata | Nome scout | T | I | P | S | Commento.
   Le colonne T/I/P/S vanno cercate per uguaglianza esatta (non "includes"),
   altrimenti "T" troverebbe anche l'intestazione "Data..." per errore. */
function parseCandidatiDocxTabella(html, scoutDefault, nomeFile) {
  const container = document.createElement("div");
  container.innerHTML = html;
  const tabelle = [...container.querySelectorAll("table")];
  const candidates = [];
  const etichetteAuto = etichetteDaFilename(nomeFile);

  tabelle.forEach(tabella => {
    const righe = [...tabella.querySelectorAll("tr")];
    if (righe.length < 2) return;

    // Una cella con l'intestazione su due righe (es. "Data" + "visionatura" in
    // due <p> separati dentro la stessa <td>) va letta con uno spazio tra i
    // due pezzi: il .textContent grezzo li concatenerebbe senza spazio
    // ("Datavisionatura"), rompendo il riconoscimento della colonna.
    const testoCella = c => {
      const paragrafi = [...c.querySelectorAll("p")];
      return (paragrafi.length ? paragrafi.map(p => p.textContent.trim()).join(" ") : c.textContent).trim();
    };
    const normalizzaHeader = s => s.trim().toLowerCase().replace(/\s+/g, " ");
    const headerCells = [...righe[0].querySelectorAll("th,td")].map(c => normalizzaHeader(testoCella(c)));
    const trovaColonna = (...alias) => headerCells.findIndex(h => alias.some(a => h.includes(a)));
    const trovaColonnaEsatta = lettera => headerCells.findIndex(h => h === lettera);

    const colData = trovaColonna("data visionatura", "data della visionatura");
    const colNome = trovaColonna("nome");
    const colCognome = trovaColonna("cognome");
    const colNascita = trovaColonna("data di nascita", "nascita");
    const colSquadra = trovaColonna("squadra");
    const colPartita = trovaColonna("partita");
    const colScout = trovaColonna("scout", "osservatore");
    const colCommento = trovaColonna("commento", "valutazione scritta", "nota");
    const colT = trovaColonnaEsatta("t");
    const colI = trovaColonnaEsatta("i");
    const colP = trovaColonnaEsatta("p");
    const colS = trovaColonnaEsatta("s");

    // Se non troviamo almeno Nome o Cognome nell'intestazione, questa
    // tabella probabilmente non è nel nostro formato: la saltiamo invece
    // di inventare colonne a caso.
    if (colNome === -1 && colCognome === -1) return;

    righe.slice(1).forEach(riga => {
      const celle = [...riga.querySelectorAll("td,th")].map(testoCella);
      if (!celle.some(Boolean)) return; // riga completamente vuota
      const nome = colNome >= 0 ? (celle[colNome] || "") : "";
      const cognome = colCognome >= 0 ? (celle[colCognome] || "") : "";
      if (!nome && !cognome) return; // riga senza nome, non è un giocatore

      const parametri = [];
      if (colT >= 0 && celle[colT]) parametri.push({ label: "Tecnica", valore: celle[colT].replace(",", ".") });
      if (colI >= 0 && celle[colI]) parametri.push({ label: "Intelligenza", valore: celle[colI].replace(",", ".") });
      if (colP >= 0 && celle[colP]) parametri.push({ label: "Personalità", valore: celle[colP].replace(",", ".") });
      if (colS >= 0 && celle[colS]) parametri.push({ label: "Speed", valore: celle[colS].replace(",", ".") });

      candidates.push({
        cognome, nome,
        dataNascita: colNascita >= 0 ? normalizzaData(celle[colNascita] || "") : "",
        squadra: colSquadra >= 0 ? (celle[colSquadra] || "") : "",
        ruoloPrimario: "",
        dataVisionatura: colData >= 0 ? normalizzaData(celle[colData] || "") : "",
        partitaInfo: colPartita >= 0 ? (celle[colPartita] || "") : "",
        scoutAutore: (colScout >= 0 ? celle[colScout] : "") || scoutDefault || "",
        etichetteAuto,
        parametri,
        notaScritta: colCommento >= 0 ? (celle[colCommento] || "") : "",
        _raw: `[tabella, ${nomeFile}] riga: ${cognome} ${nome}`
      });
    });
  });

  return candidates;
}

/* Formato libero osservato: un paragrafo interamente in grassetto con il
   nome della squadra ("FC Lugano"), seguito per ogni giocatore da un
   paragrafo interamente in grassetto "Cognome [Nome] (AAAA) T=x, I=x,
   P=x, S=x" e poi uno o più paragrafi normali di commento, fino al
   prossimo paragrafo in grassetto. L'anno di nascita è l'unica
   informazione disponibile (non il giorno/mese esatti). */
// La sigla che lo scout usa per firmare i propri nomi file (es. "..._MO.docx")
const SIGLA_SCOUT_PROPRIETARIO = { sigla: "MO", nome: "Olivieri Marco" };

function estraiContestoDaFilename(nomeFile) {
  // Data: cercata ovunque nel nome file (non solo all'inizio), tollerante
  // su separatori diversi (_ . -), per adattarsi a piccole variazioni nella
  // convenzione di nome usata.
  const dm = nomeFile.match(/(\d{2})[_.\-](\d{2})[_.\-](\d{4})/);
  const dataVisionatura = dm ? `${dm[3]}-${dm[2]}-${dm[1]}` : "";

  // Sigla dello scout proprietario: la cerchiamo come token isolato
  // (circondata da _ - o dai bordi del nome file), non come sottostringa
  // qualsiasi, per evitare falsi positivi.
  const siglaRe = new RegExp(`(?:^|[_\\-])${SIGLA_SCOUT_PROPRIETARIO.sigla}(?:[_\\-]|\\.docx?$)`, "i");
  const scoutDaFilename = siglaRe.test(nomeFile) ? SIGLA_SCOUT_PROPRIETARIO.nome : "";

  // Contesto partita: solo se il nome file segue lo schema completo
  // "gg_mm_aaaa_resto.docx" riusciamo a isolare una descrizione pulita;
  // altrimenti resta vuoto e va compilato a mano.
  let partitaInfo = "";
  const m2 = nomeFile.match(/^\d{2}[_.\-]\d{2}[_.\-]\d{4}[_\-](.+?)\.docx?$/i);
  if (m2) {
    partitaInfo = m2[1]
      .replace(new RegExp(`[_\\-]${SIGLA_SCOUT_PROPRIETARIO.sigla}$`, "i"), "")
      .replace(/_/g, " ").replace(/-/g, " - ").trim();
  }
  return { dataVisionatura, partitaInfo, scoutDaFilename };
}

function parseCandidatiDocx(html, scoutDefault, nomeFile) {
  const container = document.createElement("div");
  container.innerHTML = html;
  const paragrafi = [...container.querySelectorAll("p")]
    .map(p => ({
      bold: p.children.length === 1 && p.children[0].tagName === "STRONG" && p.textContent.trim() === p.children[0].textContent.trim(),
      text: p.textContent.trim()
    }))
    .filter(p => p.text);

  const PLAYER_RE = /^(.+?)\s*\((\d{4})\)\s*T\s*=\s*([\d.,]+)\s*,\s*I\s*=\s*([\d.,]+)\s*,\s*P\s*=\s*([\d.,]+)\s*,\s*S\s*=\s*([\d.,]+)/i;
  const { dataVisionatura: dataDaFilename, partitaInfo, scoutDaFilename } = estraiContestoDaFilename(nomeFile);
  const scoutRisolto = scoutDefault || scoutDaFilename || "";

  // Se il documento dichiara esplicitamente la data ("Data visionatura
  // gg.mm.aaaa"), è più affidabile di quella dedotta dal nome del file.
  const DATA_ESPLICITA_RE = /^Data\s+visionatura\s+(\d{1,2}[.\/\-]\d{1,2}[.\/\-]\d{2,4})/i;
  let dataDaDocumento = "";
  for (const p of paragrafi) {
    const dm = p.text.match(DATA_ESPLICITA_RE);
    if (dm) { dataDaDocumento = normalizzaData(dm[1]); break; }
  }
  const dataVisionatura = dataDaDocumento || dataDaFilename;

  let squadraCorrente = "";
  let corrente = null;
  const candidates = [];

  function chiudiCorrente() {
    if (corrente) {
      corrente.notaScritta = corrente._paragrafi.join("\n\n").trim();
      delete corrente._paragrafi;
      if (corrente.notaScritta) candidates.push(corrente);
    }
    corrente = null;
  }

  paragrafi.forEach(p => {
    if (p.bold) {
      if (DATA_ESPLICITA_RE.test(p.text)) return; // già estratta sopra, non è una squadra
      const m = p.text.match(PLAYER_RE);
      if (m) {
        chiudiCorrente();
        const nomeCompleto = m[1].trim();
        const { cognome, nome } = splitNomeCognome(nomeCompleto);
        const anno = m[2];
        corrente = {
          cognome, nome,
          dataNascita: `${anno}-01-01`,
          squadra: squadraCorrente,
          ruoloPrimario: "",
          dataVisionatura,
          partitaInfo,
          scoutAutore: scoutRisolto,
          etichetteAuto: etichetteDaFilename(nomeFile),
          parametri: [
            { label: "Tecnica", valore: m[3].replace(",", ".") },
            { label: "Intelligenza", valore: m[4].replace(",", ".") },
            { label: "Personalità", valore: m[5].replace(",", ".") },
            { label: "Speed", valore: m[6].replace(",", ".") }
          ],
          _paragrafi: [],
          _raw: `[${nomeFile}] ${nomeCompleto} (${anno}, anno di nascita — giorno/mese non specificati nel documento) — ${squadraCorrente}`
        };
      } else {
        chiudiCorrente();
        squadraCorrente = p.text.trim();
      }
    } else if (corrente) {
      corrente._paragrafi.push(p.text);
    }
  });
  chiudiCorrente();
  return candidates;
}

/* Struttura reale di un "Impiego Scouting (Partita)" ClubCorner/ASF:
   - sezioni "Lista dei giocatori <SQUADRA>" seguite da righe giocatore
   - ogni riga giocatore inizia con un N° tessera (5+ cifre), poi nome
     (1+ righe fino alla data di nascita gg.mm.aaaa), poi ruolo (1+ righe
     fino al numero di maglia, 1-2 cifre), poi eventuali voti T/I/P/S/ø/S.V.
     (numeri con un decimale) ed eventualmente un blocco "Commento" con il
     testo esteso. Importiamo solo i giocatori che hanno ALMENO un voto
     numerico E un commento scritto. */
function splitNomeCognome(nomeCompleto) {
  const parole = nomeCompleto.split(/\s+/).filter(Boolean);
  if (parole.length <= 1) return { cognome: parole[0] || "", nome: "" };
  const meta = Math.ceil(parole.length / 2);
  return { cognome: parole.slice(0, meta).join(" "), nome: parole.slice(meta).join(" ") };
}

/* Formato "narrativo a colori": osservato in relazioni scritte a mano
   libera (non generate da ClubCorner), dove ogni giocatore ha un
   paragrafo "Cognome: commento... COLORE" invece di voti numerici Tips.
   Il colore (es. ROSSO/GIALLO/GRIGIO) viene mantenuto come testo, senza
   inventare un voto numerico che il documento non contiene. */
function parseNarrativoColore(text, nomeFile) {
  const lines = (text || "").split("\n").map(l => l.trim()).filter(Boolean);
  if (!lines.length) return [];

  const PLAYER_LINE_RE = /^([A-ZÀ-Ý][a-zà-ÿ'’.\-]+(?:\s[A-ZÀ-Ý][a-zà-ÿ'’.\-]+)?):\s*(.*)$/;
  const SECTION_STOP_RE = /^\d\s*°\s*TEMPO$|^RIASSUNTO|^Legenda/i;
  const COLOR_RE = /\b(ROSSO|GIALLO|GRIGIO|VERDE|NERO)\b/gi;

  // Data e contesto dalla prima riga del documento (es. "20.08.2025
  // Amichevole Svizzera U16 – Team BEJUNE U17"), con il nome del file
  // come riserva.
  const contestoFilename = estraiContestoDaFilename(nomeFile || "");
  let dataVisionatura = "";
  let partitaInfo = "";
  for (let k = 0; k < Math.min(5, lines.length); k++) {
    const dm = lines[k].match(/(\d{1,2})[.\/](\d{1,2})[.\/](\d{2,4})/);
    if (dm) {
      dataVisionatura = normalizzaData(dm[0]);
      const pezzi = [lines[k].replace(dm[0], "").trim().replace(/^[-–—]\s*/, "")];
      let j = k + 1;
      while (j < lines.length && !SECTION_STOP_RE.test(lines[j]) && pezzi.length < 6) {
        pezzi.push(lines[j]); j++;
      }
      partitaInfo = pezzi.join(" ").replace(/\s+/g, " ").trim();
      break;
    }
  }
  if (!dataVisionatura) dataVisionatura = contestoFilename.dataVisionatura || "";
  const scoutAutore = contestoFilename.scoutDaFilename || "";

  const candidates = [];
  let i = 0;
  while (i < lines.length) {
    const m = lines[i].match(PLAYER_LINE_RE);
    if (!m || SECTION_STOP_RE.test(lines[i])) { i++; continue; }

    const cognome = m[1].trim();
    const blocco = [m[2]];
    i++;
    while (i < lines.length && !PLAYER_LINE_RE.test(lines[i]) && !SECTION_STOP_RE.test(lines[i])) {
      blocco.push(lines[i]); i++;
    }
    const testo = blocco.join(" ").replace(/\s+/g, " ").trim();
    if (!testo) continue;

    const coloriTrovati = [...new Set((testo.match(COLOR_RE) || []).map(c => c.toUpperCase()))];
    if (!coloriTrovati.length) continue; // nessun voto colore: non è un blocco di valutazione

    candidates.push({
      cognome, nome: "",
      dataNascita: "",
      squadra: "",
      ruoloPrimario: "",
      dataVisionatura,
      partitaInfo,
      scoutAutore,
      etichetteAuto: etichetteDaFilename(nomeFile),
      parametri: [],
      notaScritta: `[${coloriTrovati.join(" / ")}] ${testo}`,
      _raw: `${cognome} — voto: ${coloriTrovati.join(", ")} (formato narrativo, senza Tips numerici)`
    });
  }
  return candidates;
}

function parseCandidati(text, nomeFile) {
  const idRe = /^\d{5,}$/;
  const jerseyRe = /^\d{1,2}$/;
  const ratingRe = /^\d[.,]\d{1,2}$/;
  const dateRe = /^(\d{1,2})[.\/](\d{1,2})[.\/](\d{2,4})$/;
  const RATING_LABELS = ["Tecnica", "Intelligenza", "Personalità", "Speed", "Media Tips", "Voto extra", "Nota"];

  // Pattern condivisi tra le lingue viste finora nei report ClubCorner/ASF
  // (italiano "Impiego Scouting", francese "Engagement Scouting", tedesco
  // "Scouting-Bericht").
  const TEAM_HEADER_RE = /^(?:Lista dei giocatori|Liste des joueurs|Spielerliste)\s+(.+)$/i;
  const COMMENTO_RE = /^(?:Commento|Commentaire|Kommentar)$/i;

  // Righe "arredo" che si ripetono a ogni pagina (intestazione tabella,
  // piè di pagina): le togliamo subito, altrimenti un giocatore il cui
  // commento comincia sulla pagina successiva verrebbe scartato perché
  // l'intestazione ripetuta si infila tra il voto e la parola "Commento".
  const FURNITURE_EXACT = new Set([
    "N° pass.", "Giocatori", "Posizione sul", "terreno", "N°", "T", "I", "P", "S", "ø", "S.V.", "Nota",
    "Impiego Scouting (Torneo)", "Impiego Scouting (Partita)",
    "N° passe", "Joueur", "Position durant", "le match", "D.B.", "Note",
    "Engagement Scouting (Match)",
    "Pass Nr", "Spieler", "Spielposition", "RN", "B.E.",
    "Scouting-Bericht (Spiel)", "Startformation", "Ersatz"
  ]);
  const lines = (text || "").split("\n").map(l => l.trim())
    .filter(Boolean)
    .filter(l => !FURNITURE_EXACT.has(l) && !/^(?:Pagina|Page|Seite)\s+\d+\/\d+/i.test(l));

  function etichettaConLabel(k, regex) {
    for (let idx = 0; idx < lines.length; idx++) {
      if (TEAM_HEADER_RE.test(lines[idx])) break;
      if (regex.test(lines[idx]) && lines[idx + 1]) return lines[idx + 1].trim();
    }
    return "";
  }

  // Contesto di partita: le prime due squadre trovate + il primo risultato "N:N"
  const squadreSezioni = [];
  lines.forEach(l => {
    const m = l.match(TEAM_HEADER_RE);
    if (m) squadreSezioni.push(m[1].trim());
  });
  const risultatoMatch = lines.find(l => /^\d+:\d+$/.test(l));
  const partitaInfo = squadreSezioni.length >= 2
    ? `${squadreSezioni[0]} - ${squadreSezioni[1]}${risultatoMatch ? " (" + risultatoMatch + ")" : ""}`
    : "";

  // Nome dello scout: dal formato "Cognome Nome, Città - (numero) / ASF"
  // (o "/ SFV" in tedesco) visto ricorrere in tutti i report reali osservati finora.
  let scoutAutore = "";
  for (let k = 0; k < Math.min(15, lines.length); k++) {
    if (TEAM_HEADER_RE.test(lines[k])) break;
    const m = lines[k].match(/^(.+?),\s*.+?-\s*\(\d+\)\s*\/\s*(ASF|SFV|SFA)\s*$/i);
    if (m) { scoutAutore = m[1].trim(); break; }
  }
  const contestoFilename = estraiContestoDaFilename(nomeFile || "");
  if (!scoutAutore) scoutAutore = contestoFilename.scoutDaFilename || "";

  // Descrizione torneo/evento: diventa un'etichetta automatica sulla scheda.
  const descrizioneTorneo = etichettaConLabel(0, /^Descrizione torneo$/i);

  const etichetteAutoCondivise = [
    ...(descrizioneTorneo ? [descrizioneTorneo] : []),
    ...etichetteDaFilename(nomeFile)
  ];

  // Data della visionatura: prova più etichette diverse a seconda della
  // lingua/tipo di report, poi come ultima spiaggia usa la prima data
  // "nuda" vicino all'inizio del documento.
  let dataVisionatura = "";
  const ETICHETTE_DATA = [
    /^Data di stesura del rapporto$/i, // italiano, report partita
    /^Inizio del torneo$/i,            // italiano, report torneo
    /^Horaire$/i,                      // francese
    /^Spielzeit$/i                     // tedesco
  ];
  for (const regex of ETICHETTE_DATA) {
    if (dataVisionatura) break;
    const valore = etichettaConLabel(0, regex);
    if (valore) {
      const dm = valore.match(/(\d{1,2})[.\/](\d{1,2})[.\/](\d{2,4})/);
      if (dm) dataVisionatura = normalizzaData(dm[0]);
    }
  }
  if (!dataVisionatura) {
    for (let k = 0; k < Math.min(10, lines.length); k++) {
      if (TEAM_HEADER_RE.test(lines[k])) break;
      if (dateRe.test(lines[k])) { dataVisionatura = normalizzaData(lines[k]); break; }
    }
  }
  if (!dataVisionatura) dataVisionatura = contestoFilename.dataVisionatura || "";

  let squadraCorrente = "";
  let dentroRoster = false;
  const candidates = [];

  let i = 0;
  while (i < lines.length) {
    const line = lines[i];

    const teamMatch = line.match(TEAM_HEADER_RE);
    if (teamMatch) { squadraCorrente = teamMatch[1].trim(); dentroRoster = true; i++; continue; }

    if (dentroRoster && idRe.test(line)) {
      const passaporto = line;
      i++;
      if (lines[i] === "C") i++; // marcatore capitano

      const nomeParti = [];
      while (i < lines.length && !dateRe.test(lines[i]) && !idRe.test(lines[i])) {
        nomeParti.push(lines[i]); i++;
      }
      let dataNascita = "";
      if (i < lines.length && dateRe.test(lines[i])) { dataNascita = normalizzaData(lines[i]); i++; }

      const ruoloParti = [];
      while (i < lines.length && !jerseyRe.test(lines[i]) && !idRe.test(lines[i])) {
        ruoloParti.push(lines[i]); i++;
      }
      if (i < lines.length && jerseyRe.test(lines[i])) i++; // salta numero di maglia

      const valori = [];
      while (i < lines.length && ratingRe.test(lines[i]) && valori.length < 10) {
        valori.push(lines[i].replace(",", ".")); i++;
      }

      // Voto letterale sul potenziale (es. "B"), ultima colonna della
      // tabella, se presente.
      const GRADE_RE = /^[A-Z][+-]?$/;
      let potenzialeGrade = "";
      if (i < lines.length && GRADE_RE.test(lines[i])) {
        potenzialeGrade = lines[i]; i++;
      }

      // Salta interamente il blocco "Valutazione del potenziale" (lettera
      // ripetuta + domande con casella di spunta): su richiesta, non
      // importiamo le risposte alle domande perché il visto (☐/☒) non
      // sempre viene esportato correttamente da ClubCorner.
      if (i < lines.length && /^Valutazione del potenziale$/i.test(lines[i])) {
        i++;
        if (i < lines.length && GRADE_RE.test(lines[i])) i++;
        while (i < lines.length && !COMMENTO_RE.test(lines[i]) && !idRe.test(lines[i]) && !TEAM_HEADER_RE.test(lines[i])) {
          i++;
        }
      }

      let commento = "";
      if (i < lines.length && COMMENTO_RE.test(lines[i])) {
        i++;
        const paragrafo = [];
        while (i < lines.length && !idRe.test(lines[i]) && !TEAM_HEADER_RE.test(lines[i])) {
          paragrafo.push(lines[i]); i++;
        }
        commento = paragrafo.join(" ").trim();
      }

      if (potenzialeGrade) {
        commento = `Potenziale: ${potenzialeGrade}.${commento ? " " + commento : ""}`;
      }

      if (valori.length > 0 && commento) {
        const nomeCompleto = nomeParti.join(" ").trim();
        const { cognome, nome } = splitNomeCognome(nomeCompleto);
        // Con un solo voto compilato, nei report "a torneo" corrisponde alla
        // colonna "Nota" (giudizio sintetico), non a "Tecnica": posizionalmente
        // non possiamo saperlo con certezza se sono compilate solo alcune
        // colonne intermedie, ma il caso più comune è "solo Nota" oppure
        // "tutte e 4/5 le colonne Tips".
        const parametri = valori.length === 1
          ? [{ label: "Nota", valore: valori[0] }]
          : valori.map((v, idx) => ({ label: RATING_LABELS[idx] || `Voto ${idx + 1}`, valore: v }));
        candidates.push({
          passaporto,
          cognome, nome,
          dataNascita,
          squadra: squadraCorrente,
          ruoloPrimario: ruoloParti.join(" ").trim(),
          dataVisionatura,
          partitaInfo,
          scoutAutore,
          etichetteAuto: etichetteAutoCondivise,
          parametri,
          notaScritta: commento,
          _raw: `${nomeCompleto} (${dataNascita || "data n.d."}) — ${squadraCorrente}${etichetteAutoCondivise.length ? " — Etichette: " + etichetteAutoCondivise.join(", ") : ""}`
        });
      }
      continue;
    }
    i++;
  }
  return candidates;
}

        <div class="import-controls">

          <span id="import-status" class="muted"></span>
        </div>
        <details class="raw-text-details">
          <summary>Incolla testo manualmente (alternativa a un PDF, un documento alla volta)</summary>

          <div class="import-actions">

  function mostraCandidati() {
