  // Conteggio giocatori per stato (Kaderspieler, Pikett-Spieler, ecc.), per
  // avere sempre sott'occhio quanti sono i convocati e quanti i picchetti
  // mentre si lavora sulla rosa — mostrato accanto alla legenda colori e
  // ricalcolato a ogni render, quindi resta aggiornato in tempo reale a ogni
  // clic sullo stato di un giocatore. I giocatori senza stato (quadratino
  // trasparente sul campo) non hanno un conteggio dedicato: è la legenda
  // stessa a spiegare che "trasparente" equivale a nessuno stato assegnato.
  const conteggioPerStato = {};
  RADUNO_LEGENDA.forEach(s => { conteggioPerStato[s.chiave] = 0; });
  (r.rosa || []).forEach(v => {
    if (v.stato && conteggioPerStato.hasOwnProperty(v.stato)) conteggioPerStato[v.stato]++;
  });

  content.innerHTML = `
    <div class="import-box raduno-dettaglio-box">
      <div class="candidato-card-header">
        <h2 style="margin:0;">${esc(r.nome)}</h2>
        <div class="import-actions">
          <button class="btn btn-ghost btn-sm" id="btn-modifica-raduno">Modifica scheda</button>
          <button class="btn btn-ghost btn-sm" id="btn-esporta-raduno-dett">Esporta Excel</button>
          <label class="btn btn-ghost btn-sm" style="cursor:pointer;">
            Importa/aggiungi da Excel
            <input type="file" accept=".xlsx,.xls" id="input-importa-raduno-dett" style="display:none;">
          </label>
          <button class="btn btn-ghost btn-sm" id="btn-torna-lista-raduni">← Torna alla lista</button>
        </div>
      </div>
      <p class="muted">
        ${r.luogo ? esc(r.luogo) + " — " : ""}${r.dataInizio ? formatDataIt(r.dataInizio) : ""}${r.dataFine ? " → " + formatDataIt(r.dataFine) : ""}
        ${r.stagione ? " — Stagione " + esc(r.stagione) : ""}
        ${r.annata ? " — Annata " + esc(r.annata) : ""}
      </p>
      <p class="muted" style="font-size:12.5px;">
        ${[
          r.trainer ? "Trainer: " + esc(r.trainer) : "",
          r.assistente1 ? "Ass.1: " + esc(r.assistente1) : "",
          r.assistente2 ? "Ass.2: " + esc(r.assistente2) : "",
          r.thTrainer ? "TH-Trainer: " + esc(r.thTrainer) : "",
          r.athletik ? "Athletik: " + esc(r.athletik) : "",
          r.analyst ? "Analyst: " + esc(r.analyst) : "",
          r.tom ? "TOM: " + esc(r.tom) : ""
        ].filter(Boolean).join(" · ")}
      </p>

      <div class="import-subsection">
        <label style="display:block;">Annotazioni
          <textarea id="rd-note-raduno" rows="8" style="display:block; width:100%; box-sizing:border-box; margin-top:6px;">${esc(r.note || "")}</textarea>
        </label>
      </div>

      <div class="raduno-sistema-box">
        <label>Sistema di gioco
          <select id="rd-modulo-rapido">
            ${MODULI_RADUNO.map(m => `<option value="${m}" ${r.modulo === m ? "selected" : ""}>${m}</option>`).join("")}
          </select>
        </label>
      </div>

      <div class="raduno-legenda">
        ${RADUNO_LEGENDA.map(s => `<span class="raduno-legenda-voce"><span class="raduno-legenda-pallino" style="background:${s.colore};"></span>${esc(s.nome)} <span class="muted">(${conteggioPerStato[s.chiave]})</span></span>`).join("")}
        <span class="muted" style="font-size:12px;">— clicca il quadratino colorato su un giocatore per scegliere lo stato (un quadratino trasparente significa nessuno stato), trascinalo per spostarlo o riordinarlo</span>
      </div>

      <div class="raduno-zoom-controls">
        <button class="btn btn-ghost btn-sm" id="btn-raduno-zoom-out" title="Riduci zoom">− </button>
        <span class="raduno-zoom-livello mono" id="raduno-zoom-livello">${Math.round(radunoZoomLivello * 100)}%</span>
        <button class="btn btn-ghost btn-sm" id="btn-raduno-zoom-in" title="Aumenta zoom">+</button>
        <button class="btn btn-ghost btn-sm" id="btn-raduno-zoom-reset">Reimposta zoom</button>
        <span class="muted" style="font-size:11.5px;">su telefono/tablet allarga o stringi con due dita, su computer Ctrl/Cmd + rotellina</span>
      </div>

      <div class="raduno-campo-zoom-scroll" id="raduno-campo-zoom-scroll">
        <div class="raduno-campo-zoom-inner" id="raduno-campo-zoom-inner" style="transform: scale(${radunoZoomLivello});">
          ${griglia.map(riga => `
            <div class="raduno-linea-row">
              <div class="raduno-linea-reparti raduno-linea-reparti-fissa${riga.length === 1 ? " raduno-linea-reparti-singola" : ""}">
                ${riga.map(rep => radunoRepartoHTML(r, rep)).join("")}
              </div>
            </div>
          `).join("")}
          ${(r.repartiPersonalizzati && r.repartiPersonalizzati.length) ? `
            <div class="raduno-linea-row">
              <div class="raduno-linea-titolo">Altri reparti</div>
              <div class="raduno-linea-reparti">
                ${r.repartiPersonalizzati.map(nome => radunoRepartoHTML(r, { id: nome, chiave: nome, nome, personalizzato: true })).join("")}
              </div>
            </div>` : ""}
        </div>
      </div>

      <div class="import-subsection">
        <label>+ Aggiungi reparto personalizzato
          <input type="text" id="rad-nuovo-reparto" placeholder="es. Riserve">
        </label>
        <button class="btn btn-ghost btn-sm" id="btn-aggiungi-reparto" style="margin-top:6px;">Aggiungi reparto</button>
      </div>

      <datalist id="rd-players-datalist">
        ${giocatoriSuggeritiRaduno(r).map(p => `<option value="${esc(p.cognome + " " + p.nome)}">`).join("")}
      </datalist>
    </div>
  `;

  document.getElementById("btn-torna-lista-raduni").onclick = () => { raduniSezione = "lista"; render(); };
  document.getElementById("btn-modifica-raduno").onclick = () => { raduniSezione = "form"; render(); };
  document.getElementById("btn-esporta-raduno-dett").onclick = () => esportaRadunoExcel(r);
  document.getElementById("input-importa-raduno-dett").addEventListener("change", (e) => avviaImportRaduno(e, r.id));

  document.getElementById("rd-modulo-rapido").onchange = (e) => {
    r.modulo = e.target.value;
    migraRepartiOrfani(r);
    savePlayers();
    render();
  };

  document.getElementById("btn-raduno-zoom-out").onclick = () => impostaZoomRaduno(radunoZoomLivello - 0.1);
  document.getElementById("btn-raduno-zoom-in").onclick = () => impostaZoomRaduno(radunoZoomLivello + 0.1);
  document.getElementById("btn-raduno-zoom-reset").onclick = () => impostaZoomRaduno(1);
  const zoomScrollEl = document.getElementById("raduno-campo-zoom-scroll");
  if (zoomScrollEl) {
    zoomScrollEl.addEventListener("touchstart", (e) => {
      if (e.touches.length === 2) {
        radunoPinchDistanzaIniziale = distanzaTraTouch(e.touches[0], e.touches[1]);
        radunoPinchZoomIniziale = radunoZoomLivello;
      }
    }, { passive: true });
    zoomScrollEl.addEventListener("touchmove", (e) => {
      if (e.touches.length === 2 && radunoPinchDistanzaIniziale) {
        e.preventDefault();
        const distanzaAttuale = distanzaTraTouch(e.touches[0], e.touches[1]);
        impostaZoomRaduno(radunoPinchZoomIniziale * (distanzaAttuale / radunoPinchDistanzaIniziale));
      }
    }, { passive: false });
    zoomScrollEl.addEventListener("touchend", (e) => {
      if (e.touches.length < 2) { radunoPinchDistanzaIniziale = null; radunoPinchZoomIniziale = null; }
    });
    zoomScrollEl.addEventListener("wheel", (e) => {
      if (!e.ctrlKey && !e.metaKey) return;
      e.preventDefault();
      impostaZoomRaduno(radunoZoomLivello + (e.deltaY < 0 ? 0.1 : -0.1));
    }, { passive: false });
  }

  document.getElementById("rd-note-raduno").onchange = () => {
    r.note = document.getElementById("rd-note-raduno").value.trim();
    savePlayers();
  };

  document.getElementById("btn-aggiungi-reparto").onclick = () => {
    const nome = document.getElementById("rad-nuovo-reparto").value.trim();
    if (!nome) return;
    r.repartiPersonalizzati = r.repartiPersonalizzati || [];
    if (!r.repartiPersonalizzati.includes(nome)) r.repartiPersonalizzati.push(nome);
    savePlayers();
    render();
  };

  content.querySelectorAll("[data-rimuovi-da-reparto]").forEach(btn => {
    btn.onclick = (ev) => {
      ev.stopPropagation(); // altrimenti il click risale al chip genitore e apre la scheda giocatore
      r.rosa = (r.rosa || []).filter(x => x.giocatoreId !== btn.dataset.rimuoviDaReparto);
      savePlayers();
      render();
    };
  });
  content.querySelectorAll("[data-elimina-reparto-personalizzato]").forEach(btn => {
    btn.onclick = () => {
      const nomeReparto = btn.dataset.eliminaRepartoPersonalizzato;
      r.repartiPersonalizzati = (r.repartiPersonalizzati || []).filter(x => x !== nomeReparto);
      r.rosa = (r.rosa || []).filter(x => x.reparto !== nomeReparto);
      savePlayers();
      render();
    };
  });
  content.querySelectorAll(".rd-apri-giocatore").forEach(el => {
    el.ondblclick = () => apriDettaglio(el.dataset.playerId);
  });
  content.querySelectorAll(".rd-add-giocatore-input").forEach(input => {
    input.addEventListener("change", () => {
      const reparto = input.dataset.reparto;
      const testo = input.value.trim().toLowerCase();
      if (!testo) return;
      const match = players.find(p => `${p.cognome} ${p.nome}`.toLowerCase() === testo);
      if (match) {
        aggiungiGiocatoreARaduno(r, match.id, reparto);
        render();
      } else {
        radunoNomeDaCreare = { reparto, testo: input.value.trim() };
        render();
      }
    });
  });
  if (document.getElementById("btn-crea-giocatore-al-volo")) {
    document.getElementById("btn-crea-giocatore-al-volo").onclick = () => {
      const cognomeNome = radunoNomeDaCreare.testo.trim().split(/\s+/);
      const cognome = cognomeNome[0] || "";
      const nome = cognomeNome.slice(1).join(" ") || "";
      const nuovo = { id: uid(), cognome, nome, dataNascita: "", squadra: "", ruoloPrimario: "", ruoloSecondario: "", piedePreferito: "", nazionalita: "", note: "", etichette: [], visionature: [], valutazioni: [], trasferimenti: [], misurazioni: [], partiteUfficiali: [], creatoIl: new Date().toISOString() };
      players.push(nuovo);
      aggiungiGiocatoreARaduno(r, nuovo.id, radunoNomeDaCreare.reparto);
      radunoNomeDaCreare = null;
      render();
    };
    document.getElementById("btn-annulla-crea-giocatore").onclick = () => {
      radunoNomeDaCreare = null;
      render();
    };
  }

  // Quadratino colore: clic apre/chiude il popup con tutti gli swatch della
  // legenda per quel giocatore (invece di ciclare a ogni clic).
  content.querySelectorAll("[data-apri-popup-stato]").forEach(sw => {
    sw.onclick = (ev) => {
      ev.stopPropagation();
      const id = sw.dataset.apriPopupStato;
      radunoPopupStatoGiocatoreId = (radunoPopupStatoGiocatoreId === id) ? null : id;
      render();
    };
  });
  content.querySelectorAll("[data-imposta-stato]").forEach(btn => {
    btn.onclick = (ev) => {
      ev.stopPropagation();
      const [giocatoreId, chiaveStato] = btn.dataset.impostaStato.split("|");
      const voce = (r.rosa || []).find(x => x.giocatoreId === giocatoreId);
      if (voce) voce.stato = chiaveStato === "_nessuno" ? null : chiaveStato;
      radunoPopupStatoGiocatoreId = null;
      savePlayers();
      render();
    };
  });
  content.querySelectorAll("[data-chiudi-popup-stato]").forEach(btn => {
    btn.onclick = (ev) => {
      ev.stopPropagation();
      radunoPopupStatoGiocatoreId = null;
      render();
    };
  });

  // Drag & drop: trascinare un chip giocatore lo sposta in un altro reparto,
  // oppure lo riordina all'interno dello stesso reparto se rilasciato sopra
  // un altro giocatore.
  content.querySelectorAll(".rd-chip-giocatore").forEach(chip => {
    chip.addEventListener("dragstart", (ev) => {
      radunoDragGiocatoreId = chip.dataset.playerId;
      ev.dataTransfer.effectAllowed = "move";
      try { ev.dataTransfer.setData("text/plain", chip.dataset.playerId); } catch (err) {}
      chip.classList.add("dragging");
    });
    chip.addEventListener("dragend", () => {
      chip.classList.remove("dragging");
      radunoDragGiocatoreId = null;
    });
    chip.addEventListener("dragover", (ev) => { ev.preventDefault(); ev.dataTransfer.dropEffect = "move"; });
    chip.addEventListener("drop", (ev) => {
      ev.preventDefault();
      ev.stopPropagation();
      if (!radunoDragGiocatoreId || radunoDragGiocatoreId === chip.dataset.playerId) return;
      spostaGiocatoreInRosa(r, radunoDragGiocatoreId, chip.dataset.reparto, chip.dataset.playerId);
      savePlayers();
      render();
    });
  });
  content.querySelectorAll(".raduno-reparto-lista").forEach(lista => {
    lista.addEventListener("dragover", (ev) => { ev.preventDefault(); ev.dataTransfer.dropEffect = "move"; });
    lista.addEventListener("drop", (ev) => {
      ev.preventDefault();
      if (!radunoDragGiocatoreId) return;
      // Rilasciato nello spazio vuoto della lista (non su un chip specifico): va in fondo a quel reparto.
      spostaGiocatoreInRosa(r, radunoDragGiocatoreId, lista.dataset.reparto, null);
      savePlayers();
      render();
    });
  });
}

// Popup inline con tutti gli swatch della legenda per un giocatore, mostrato
// subito sotto la sua riga nella tabella (niente posizionamento assoluto: più
// semplice e robusto, e funziona anche su schermi stretti).
function radunoPopupStatoHTML(giocatoreId) {
  const opzioni = [{ chiave: "_nessuno", nome: "Nessuno", colore: "var(--gold)", testo: "#1a1408" }, ...RADUNO_LEGENDA];
  return `
    <div class="raduno-riga raduno-popup-stato">
      ${opzioni.map(o => `
        <button type="button" class="raduno-popup-swatch" data-imposta-stato="${giocatoreId}|${o.chiave}" style="background:${o.colore}; color:${o.testo};" title="${esc(o.nome)}">${esc(o.nome)}</button>
      `).join("")}
      <button type="button" class="raduno-popup-chiudi" data-chiudi-popup-stato="1" title="Chiudi">✕</button>
    </div>
  `;
}

function radunoRepartoHTML(r, rep) {
  const giocatoriReparto = (r.rosa || [])
    .filter(x => x.reparto === rep.id)
    .map(x => ({ ...x, player: players.find(p => p.id === x.giocatoreId) }))
    .filter(x => x.player);

  const mostraCreaGiocatore = radunoNomeDaCreare && radunoNomeDaCreare.reparto === rep.id;

  return `
    <div class="candidato-card raduno-reparto-box">
      <h3>
        ${esc(rep.nome)}
        <span class="chip" style="margin-left:auto;">${giocatoriReparto.length}</span>
        ${rep.personalizzato ? `<span data-elimina-reparto-personalizzato="${esc(rep.id)}" style="cursor:pointer; opacity:0.7;" title="Elimina reparto">✕</span>` : ""}
      </h3>
      <div class="raduno-reparto-lista raduno-tabella" data-reparto="${esc(rep.id)}">
        ${giocatoriReparto.length ? `
          <div class="raduno-riga raduno-riga-header">
            <span class="rrg-nome">Nome</span><span class="rrg-squadra">Squadra</span><span class="rrg-stato"></span><span class="rrg-azioni"></span>
          </div>` : ""}
        ${giocatoriReparto.length
          ? giocatoriReparto.map(x => {
              const stato = statoLegenda(x.stato);
              const sigla = siglaSquadra(x.player.squadra);
              // Coloriamo l'intera cella/riga del giocatore (non solo il
              // quadratino) in base allo stato, come nell'Excel originale.
              const styleRiga = stato ? `background:${stato.colore}; color:${stato.testo}; border-bottom-color:${stato.colore};` : "";
              const classeMuted = stato ? "" : " muted";
              const rigaHTML = `
            <div class="raduno-riga rd-apri-giocatore rd-chip-giocatore" draggable="true" data-player-id="${x.player.id}" data-reparto="${esc(rep.id)}" style="${styleRiga}" title="Doppio click per aprire la scheda del giocatore">
              <span class="rrg-nome" title="${esc(x.player.cognome + ' ' + x.player.nome)}">${esc(x.player.cognome)} ${esc(x.player.nome)}</span>
              <span class="rrg-squadra${classeMuted}" title="${esc(x.player.squadra || '')}">${esc(sigla)}</span>
              <span class="rrg-stato">
                <button type="button" class="rrg-stato-swatch" data-apri-popup-stato="${x.giocatoreId}" title="Clicca per impostare lo stato" style="background:${stato ? stato.colore : "transparent"}; border-color:${stato ? "rgba(0,0,0,0.35)" : "var(--line)"};"></button>
              </span>
              <span class="rrg-azioni" data-rimuovi-da-reparto="${x.giocatoreId}" title="Rimuovi dal reparto">✕</span>
            </div>`;
              return rigaHTML + (radunoPopupStatoGiocatoreId === x.giocatoreId ? radunoPopupStatoHTML(x.giocatoreId) : "");
            }).join("")
          : `<span class="muted" style="font-size:12.5px;">Nessun giocatore</span>`}
      </div>
      <input type="text" class="rd-add-giocatore-input" data-reparto="${esc(rep.id)}" list="rd-players-datalist" placeholder="+ Aggiungi giocatore" style="margin-top:8px; width:100%;">
      ${mostraCreaGiocatore ? `
        <div class="raduno-crea-giocatore">
          <p class="muted" style="font-size:12.5px; margin:0 0 6px;">Nessun giocatore trovato in Elenco con il nome "${esc(radunoNomeDaCreare.testo)}". Vuoi crearne una scheda minima?</p>
          <div class="import-actions">
            <button class="btn btn-primary btn-sm" id="btn-crea-giocatore-al-volo">Crea scheda</button>
            <button class="btn btn-ghost btn-sm" id="btn-annulla-crea-giocatore">Annulla</button>
          </div>
        </div>` : ""}
    </div>
  `;
}

/* ---- Import da Excel Kaderliste ---- */
function normalizzaNomeRaduno(s) {
  return String(s || "").toLowerCase().normalize("NFD").replace(/[̀-ͯ]/g, "").replace(/\s+/g, " ").trim();
}

function trovaGiocatoreCorrispondente(nomeGrezzo) {
  const norm = normalizzaNomeRaduno(nomeGrezzo);
  if (!norm) return null;
  return players.find(p => {
    const cn = normalizzaNomeRaduno(`${p.cognome} ${p.nome}`);
    const nc = normalizzaNomeRaduno(`${p.nome} ${p.cognome}`);
    return cn === norm || nc === norm;
  }) || null;
}

const RADUNO_LABEL_REGEX = {
  team: /^team\s*:?\s*/i,
  saison: /^saison\s*:?\s*/i,
  trainer: /^trainer\s*:?\s*/i,
  assistent: /^assistent\s*:?\s*/i,
  athletik: /^athletik\s*:?\s*/i,
  analyst: /^analyst\s*:?\s*/i,
  thTrainer: /^th[\s-]?trainer\s*:?\s*/i,
  tom: /^tom\s*:?\s*/i,
  spielsysteme: /^spielsysteme\s*:?\s*/i
};

const RADUNO_REPARTO_HEADER_REGEX = /\(([A-Z0-9]{2,6})\)\s*$/;

// Testo che compare spesso vicino ai reparti ma non è un nome di giocatore:
// intestazioni di sotto-colonna (Vorname/Klub/JG/Fuss/Zinfo), legenda e note
// a piè di pagina (Aktualisiert = "Aggiornato al").
const RADUNO_TESTO_NON_NOME = /^(vorname\b|nachname\b|klub$|jg$|fuss$|zinfo$|legende\b|aktualisiert\b|kaderspieler\b|pikett|verletzt|abgesagt|nachnominiert|sichtung|zusatzinfos\b|klubempfehlung\b|tyt$)/i;

function primoValoreNonVuoto(row, startCol, maxScan) {
  for (let c = startCol; c < startCol + (maxScan || 6) && c < row.length; c++) {
    const v = row[c];
    if (v !== undefined && v !== null && String(v).trim() !== "") return String(v).trim();
  }
  return "";
}

function rilevaModuloDaTesto(testo) {
  if (!testo) return null;
  const t = testo.replace(/\s+/g, "");
  return MODULI_RADUNO.find(m => t.includes(m.replace(/\s+/g, ""))) || null;
}

// Il titolo/team del foglio riporta di solito l'annata dei giocatori come
// "Jg. 2011" (Jahrgang = anno di nascita). La cerchiamo lì prima, e solo
// come ripiego un generico anno a 4 cifre nel testo.
function rilevaAnnataDaTesto(testo) {
  if (!testo) return null;
  let m = String(testo).match(/Jg\.?\s*(\d{4})/i);
  if (m) return m[1];
  m = String(testo).match(/\b((?:19|20)\d{2})\b/);
  return m ? m[1] : null;
}

// Nel file reale (scheda "09_U-16TYT"), a destra del nome di ogni giocatore
// compaiono, con un offset abbastanza costante, club/anno di nascita (JG,
// 2 cifre)/piede preferito (R/L). Non fidandoci ciecamente di una colonna
// fissa (l'offset può variare leggermente da blocco a blocco), scansioniamo
// una finestra di colonne a destra del nome e riconosciamo i valori dal loro
// formato piuttosto che dalla posizione esatta.
function estraiMetaGiocatore(row, colonnaNome) {
  let klub = "", jg = "", fuss = "";
  for (let c = colonnaNome + 1; c <= colonnaNome + 10 && c < row.length; c++) {
    const v = row[c];
    if (v === undefined || v === null) continue;
    const t = String(v).trim();
    if (!t) continue;
    if (!jg && /^\d{2}$/.test(t)) { jg = t; continue; }
    if (!fuss && /^[rl]$/i.test(t)) { fuss = t.toUpperCase(); continue; }
    if (!klub && /^[A-ZÄÖÜ]{2,4}$/.test(t)) { klub = t; continue; }
  }
  return { klub, jg, fuss };
}

function parseFoglioKaderliste(aoa) {
  const scheda = {
    nome: "", luogo: "", stagione: "", trainer: "", assistente1: "", assistente2: "",
    thTrainer: "", athletik: "", analyst: "", tom: "", modulo: null, annata: null,
    reparti: []
  };
  // Nel file reale ci sono più reparti affiancati sulla stessa riga di
  // intestazione (uno per blocco di colonne). Teniamo quindi un reparto
  // "attivo" per ciascuna colonna esatta in cui è comparsa un'intestazione,
  // invece di un'unica variabile globale: altrimenti l'intestazione più a
  // destra sovrascriverebbe quelle precedenti sulla stessa riga.
  const repartoPerColonna = {};
  let assistentiTrovati = 0;

  for (let ri = 0; ri < aoa.length; ri++) {
    const row = aoa[ri] || [];
    for (let ci = 0; ci < row.length; ci++) {
      const cell = row[ci];
      if (cell === undefined || cell === null) continue;
      const testo = String(cell).trim();
      if (!testo) continue;

      // La prima riga del foglio contiene di solito il titolo leggibile
      // ("Kaderliste U16 | Jg. 2011 (Kader TYT)"): se presente lo usiamo come
      // nome del raduno invece del nome tecnico del foglio Excel.
      if (ri === 0 && !scheda.nome && testo.length > 5 && testo.length < 100 && /kaderliste/i.test(testo)) {
        scheda.nome = testo;
        continue;
      }

      const headerMatch = testo.match(RADUNO_REPARTO_HEADER_REGEX);
      if (headerMatch && testo.length < 60) {
        const nuovoReparto = { chiave: headerMatch[1], nomeOriginale: testo, giocatori: [], colonna: ci, riga: ri };
        repartoPerColonna[ci] = nuovoReparto;
        scheda.reparti.push(nuovoReparto);
        continue;
      }

      if (RADUNO_LABEL_REGEX.team.test(testo)) { scheda.luogo = scheda.luogo || primoValoreNonVuoto(row, ci + 1, 6); continue; }
      if (RADUNO_LABEL_REGEX.saison.test(testo)) { scheda.stagione = scheda.stagione || primoValoreNonVuoto(row, ci + 1, 6); continue; }
      if (RADUNO_LABEL_REGEX.trainer.test(testo) && !RADUNO_LABEL_REGEX.assistent.test(testo) && !RADUNO_LABEL_REGEX.thTrainer.test(testo)) {
        scheda.trainer = scheda.trainer || primoValoreNonVuoto(row, ci + 1, 6); continue;
      }
      if (RADUNO_LABEL_REGEX.thTrainer.test(testo)) { scheda.thTrainer = scheda.thTrainer || primoValoreNonVuoto(row, ci + 1, 6); continue; }
      if (RADUNO_LABEL_REGEX.assistent.test(testo)) {
        const val = primoValoreNonVuoto(row, ci + 1, 6);
        if (val) { assistentiTrovati++; if (assistentiTrovati === 1) scheda.assistente1 = val; else scheda.assistente2 = val; }
        continue;
      }
      if (RADUNO_LABEL_REGEX.athletik.test(testo)) { scheda.athletik = scheda.athletik || primoValoreNonVuoto(row, ci + 1, 6); continue; }
      if (RADUNO_LABEL_REGEX.analyst.test(testo)) { scheda.analyst = scheda.analyst || primoValoreNonVuoto(row, ci + 1, 6); continue; }
      if (RADUNO_LABEL_REGEX.tom.test(testo)) { scheda.tom = scheda.tom || primoValoreNonVuoto(row, ci + 1, 6); continue; }
      if (RADUNO_LABEL_REGEX.spielsysteme.test(testo)) {
        // Nel file reale il valore di "Spielsysteme:" a volte non è sulla
        // stessa riga dell'etichetta ma nella riga subito sotto, stessa
        // colonna — proviamo entrambe le posizioni.
        let val = primoValoreNonVuoto(row, ci + 1, 6);
        if (!val && aoa[ri + 1]) val = primoValoreNonVuoto(aoa[ri + 1], ci, 3);
        scheda.modulo = rilevaModuloDaTesto(val) || rilevaModuloDaTesto(testo);
        continue;
      }
      if (/^torh[üu]ter/i.test(testo)) {
        const nuovoReparto = { chiave: "TH", nomeOriginale: testo, giocatori: [], colonna: ci, riga: ri };
        repartoPerColonna[ci] = nuovoReparto;
        scheda.reparti.push(nuovoReparto);
        continue;
      }

      // Se la cella non è un'etichetta nota ed è nella stessa colonna esatta
      // di un reparto già individuato più in alto, la trattiamo come
      // possibile nome giocatore di quel reparto.
      const repartoAttivo = repartoPerColonna[ci];
      if (repartoAttivo && ri > repartoAttivo.riga && ri <= repartoAttivo.riga + 30) {
        if (/^\d+$/.test(testo)) continue; // numeri di maglia isolati, ignorati
        if (testo.length < 3) continue;
        if (RADUNO_TESTO_NON_NOME.test(testo)) continue; // intestazioni colonna, note a piè di pagina, ecc.
        const meta = estraiMetaGiocatore(row, ci);
        repartoAttivo.giocatori.push({ grezzo: testo, riga: ri, klub: meta.klub, jg: meta.jg, fuss: meta.fuss });
      }
    }

    // A fine riga, se una colonna con reparto attivo è rimasta vuota (dopo
    // aver già trovato almeno un giocatore), consideriamo chiusa quella
    // lista: evita di risalire fino a un'eventuale nota finale del foglio
    // (es. "Aktualisiert:") molte righe più sotto nella stessa colonna.
    Object.keys(repartoPerColonna).forEach(ciKey => {
      const ciNum = Number(ciKey);
      const rep = repartoPerColonna[ciNum];
      if (ri <= rep.riga || !rep.giocatori.length) return;
      const cell = row[ciNum];
      const testoCella = (cell === undefined || cell === null) ? "" : String(cell).trim();
      if (!testoCella) delete repartoPerColonna[ciNum];
    });
  }

  scheda.reparti = scheda.reparti.filter(r => r.giocatori.length > 0);
  scheda.annata = rilevaAnnataDaTesto(scheda.nome) || rilevaAnnataDaTesto(scheda.luogo);
  return scheda;
}

// Nel file reale più blocchi-colonna condividono la stessa chiave (es. tre
// blocchi "INNENVERTEIDIGER (IVE)" affiancati): nella Kaderliste servono di
// solito solo a spezzare su più colonne un elenco più lungo di quanto entri
// in una sola, non indicano davvero "destra/sinistra". L'unica ambiguità
// tattica vera è "10er Zentral" vs "Stossstürmer Zentral" (entrambi chiave
// STZ ma ruoli diversi): qui la risolviamo leggendo il testo originale
// dell'intestazione, quando è inequivocabile.
function indizioSlotDaTesto(nomeOriginale, slotsChiave) {
  const t = normalizzaNomeRaduno(nomeOriginale);
  const unicoMatch = (regex) => {
    const trovati = slotsChiave.filter(s => regex.test(s.nome));
    return trovati.length === 1 ? trovati[0].id : null;
  };
  if (/10er/.test(t)) {
    const id = unicoMatch(/10er/i);
    if (id) return id;
  }
  if (/stossst[uü]rmer/.test(t)) {
    const id = unicoMatch(/st[uü]rmer/i);
    if (id) return id;
  }
  return null;
}

// Assegna a ciascun blocco-colonna individuato nel file uno slot di
// destinazione di default nella griglia tattica del modulo rilevato. I
// blocchi con la stessa chiave ma nessun indizio testuale vengono distribuiti
// in ordine sugli slot disponibili con quella chiave (round-robin); se la
// chiave non esiste affatto nella griglia del modulo (es. una variante
// regionale tipo "MFA"), resta la chiave grezza: diventerà un reparto
// personalizzato al momento della conferma, così nessun giocatore va perso.
function assegnaSlotDefaultImport(scheda) {
  const griglia = REPARTI_GRID_PER_MODULO[scheda.modulo] || REPARTI_GRID_PER_MODULO[MODULI_RADUNO[0]];
  const slotsPiatti = griglia.flat();
  const usoContatore = {};
  scheda.reparti.forEach(rep => {
    const slotsChiave = slotsPiatti.filter(s => s.chiave === rep.chiave);
    let slotId = slotsChiave.length ? indizioSlotDaTesto(rep.nomeOriginale, slotsChiave) : null;
    if (!slotId && slotsChiave.length) {
      const i = usoContatore[rep.chiave] || 0;
      slotId = slotsChiave[i % slotsChiave.length].id;
      usoContatore[rep.chiave] = i + 1;
    }
    rep.slotIdDefault = slotId || rep.chiave;
  });
}

async function avviaImportRaduno(e, targetId) {
  const file = e.target.files[0];
  if (!file) return;
  const buf = await file.arrayBuffer();
  const wb = XLSX.read(buf, { type: "array" });

  const schede = [];
  wb.SheetNames.forEach(nomeFoglio => {
    if (/^turnier/i.test(nomeFoglio) || /^blatt/i.test(nomeFoglio)) return; // fogli non pertinenti noti
    const ws = wb.Sheets[nomeFoglio];
    const aoa = XLSX.utils.sheet_to_json(ws, { header: 1, blankrows: false, defval: "" });
    const scheda = parseFoglioKaderliste(aoa);
    if (scheda.reparti.length) {
      scheda.nomeFoglio = nomeFoglio;
      scheda.nome = scheda.nome || nomeFoglio;
      schede.push(scheda);
    }
  });

  if (!schede.length) {
    alert("Non ho trovato nessun reparto/giocatore riconoscibile in questo file. Verifica che sia un file Kaderliste TYT nel formato consueto.");
    e.target.value = "";
    return;
  }

  // Costruiamo i candidati per ciascuna scheda, provando il match con l'Elenco
  // esistente e proponendo per ciascuno lo slot di destinazione di default
  // nella griglia tattica (vedi assegnaSlotDefaultImport).
  schede.forEach(scheda => {
    assegnaSlotDefaultImport(scheda);
    scheda.reparti.forEach(rep => {
      rep.candidati = rep.giocatori.map(g => {
        const match = trovaGiocatoreCorrispondente(g.grezzo);
        return { grezzo: g.grezzo, match, slotId: rep.slotIdDefault, includi: true, klub: g.klub || "", jg: g.jg || "", fuss: g.fuss || "" };
      });
    });
  });

  radunoImportBozza = { schede, targetId, fileName: file.name };
  raduniSezione = "importa";
  render();
  e.target.value = "";
}

function renderRadunoImporta(content) {
  const bozza = radunoImportBozza;
  if (!bozza) { raduniSezione = "lista"; render(); return; }
  const targetRaduno = bozza.targetId ? raduni.find(x => x.id === bozza.targetId) : null;

  content.innerHTML = `
    <div class="import-box">
      <h2>Verifica import — ${esc(bozza.fileName)}</h2>
      <p class="muted">Ho trovato ${bozza.schede.length} ros${bozza.schede.length === 1 ? "a" : "e"} riconoscibil${bozza.schede.length === 1 ? "e" : "i"} nel file (un foglio Excel può contenere più rose diverse, es. convocazioni per un torneo o per un'amichevole oltre alla rosa TYT ufficiale). Controlla i giocatori individuati per ciascun reparto, deseleziona le righe che non vuoi importare e correggi il reparto proposto, poi conferma solo le schede che ti interessano — le altre puoi ignorarle.</p>
      ${bozza.schede.map((s, si) => radunoSchedaImportHTML(s, si, targetRaduno)).join("")}
      <div class="import-actions">
        <button class="btn btn-ghost" id="btn-annulla-import-raduno">Annulla import</button>
      </div>
    </div>
  `;

  document.getElementById("btn-annulla-import-raduno").onclick = () => {
    radunoImportBozza = null;
    raduniSezione = bozza.targetId ? "dettaglio" : "lista";
    render();
  };

  bozza.schede.forEach((s, si) => {
    const btn = document.getElementById(`btn-conferma-import-${si}`);
    if (btn) btn.onclick = () => confermaImportScheda(si);
    const btnIgnora = document.getElementById(`btn-ignora-import-${si}`);
    if (btnIgnora) btnIgnora.onclick = () => {
      bozza.schede.splice(si, 1);
      if (bozza.schede.length) { render(); }
      else { radunoImportBozza = null; raduniSezione = bozza.targetId ? "dettaglio" : "lista"; render(); }
    };
  });

  content.querySelectorAll("[data-toggle-candidato]").forEach(chk => {
    chk.addEventListener("change", () => {
      const [si, repI, cIdx] = chk.dataset.toggleCandidato.split("|").map(Number);
      bozza.schede[si].reparti[repI].candidati[cIdx].includi = chk.checked;
    });
  });
  content.querySelectorAll("[data-cambia-reparto-candidato]").forEach(sel => {
    sel.addEventListener("change", () => {
      const [si, repI, cIdx] = sel.dataset.cambiaRepartoCandidato.split("|").map(Number);
      bozza.schede[si].reparti[repI].candidati[cIdx].slotId = sel.value;
    });
  });
}

function radunoSchedaImportHTML(s, si, targetRaduno) {
  const griglia = REPARTI_GRID_PER_MODULO[s.modulo] || REPARTI_GRID_PER_MODULO[MODULI_RADUNO[0]];
  const slotsBase = griglia.flat();
  // Il file reale può contenere gruppi di posizione non previsti dal modulo
  // rilevato (es. varianti regionali). Li aggiungiamo come opzioni extra così
  // da non perdere nessun giocatore durante la revisione.
  const chiaviBase = new Set(slotsBase.map(r => r.chiave));
  const chiaviExtra = [...new Set(s.reparti.map(r => r.chiave).filter(k => !chiaviBase.has(k)))];
  const repartiOptions = [...slotsBase, ...chiaviExtra.map(k => ({ id: k, chiave: k, nome: k, personalizzato: true }))];
  const totCandidati = s.reparti.reduce((n, rep) => n + rep.candidati.length, 0);
  const totMatch = s.reparti.reduce((n, rep) => n + rep.candidati.filter(c => c.match).length, 0);
  return `
    <div class="import-subsection">
      <h3>${esc(s.nome)} ${s.modulo ? `<span class="chip" style="margin-left:8px;">${esc(s.modulo)}</span>` : ""}</h3>
      <p class="muted" style="font-size:12.5px;">
        ${s.luogo ? esc(s.luogo) + " · " : ""}${s.stagione ? "Stagione " + esc(s.stagione) + " · " : ""}
        ${s.trainer ? "Trainer: " + esc(s.trainer) + " · " : ""}
        ${totMatch}/${totCandidati} giocatori già presenti in Elenco
        ${targetRaduno ? ` · Verranno aggiunti al raduno "${esc(targetRaduno.nome)}"` : " · Verrà creato un nuovo raduno"}
      </p>
      ${s.reparti.map((rep, repI) => `
        <div style="margin-bottom:10px;">
          <strong>${esc(rep.nomeOriginale)}</strong>
          ${rep.candidati.map((c, cIdx) => radunoCandidatoRigaHTML(c, si, repI, cIdx, repartiOptions)).join("")}
        </div>
      `).join("")}
      <div class="import-actions">
        <button class="btn btn-primary btn-sm" id="btn-conferma-import-${si}">Conferma import di questa scheda</button>
        <button class="btn btn-ghost btn-sm" id="btn-ignora-import-${si}">Ignora questa scheda</button>
      </div>
    </div>
  `;
}

function radunoCandidatoRigaHTML(c, si, repI, cIdx, repartiOptions) {
  const key = `${si}|${repI}|${cIdx}`;
  const metaBits = [c.klub, c.jg ? "'" + c.jg : "", c.fuss].filter(Boolean).join(" · ");
  return `
    <div class="raduno-candidato-riga">
      <span>${esc(c.grezzo)}${metaBits ? ` <span class="muted" style="font-size:11.5px;">(${esc(metaBits)})</span>` : ""}</span>
      <span class="chip ${c.match ? "chip-active" : ""}" style="font-size:11.5px;">${c.match ? "In Elenco: " + esc(c.match.cognome + " " + c.match.nome) : "Nuovo giocatore"}</span>
      <select data-cambia-reparto-candidato="${key}">
        ${repartiOptions.map(r => `<option value="${esc(r.id)}" ${r.id === c.slotId ? "selected" : ""}>${esc(r.nome)}</option>`).join("")}
      </select>
      <label class="report-campo-check">
        <input type="checkbox" data-toggle-candidato="${key}" ${c.includi ? "checked" : ""}> includi
      </label>
    </div>
  `;
}

function confermaImportScheda(si) {
  const bozza = radunoImportBozza;
  const s = bozza.schede[si];

  let raduno = bozza.targetId ? raduni.find(x => x.id === bozza.targetId) : null;
  if (!raduno) {
    raduno = {
      id: uid(), nome: s.nome, luogo: s.luogo || "", dataInizio: "", dataFine: "",
      stagione: s.stagione || "", annata: s.annata || "", modulo: s.modulo || MODULI_RADUNO[0],
      trainer: s.trainer || "", assistente1: s.assistente1 || "", assistente2: s.assistente2 || "",
      thTrainer: s.thTrainer || "", athletik: s.athletik || "", analyst: s.analyst || "", tom: s.tom || "",
      eventoCalendarioId: null, rosa: [], repartiPersonalizzati: []
    };
    raduni.push(raduno);
  }

  let nuoviGiocatori = 0, aggiunti = 0;
  s.reparti.forEach(rep => {
    rep.candidati.forEach(c => {
      if (!c.includi) return;
      // Se lo slot scelto non fa parte della griglia fissa del modulo,
      // registriamolo come reparto personalizzato del raduno così da non
      // perdere il gruppo (es. varianti regionali tipo "MFA").
      const fissi = (REPARTI_GRID_PER_MODULO[raduno.modulo] || []).flat();
      if (!fissi.some(f => f.id === c.slotId)) {
        raduno.repartiPersonalizzati = raduno.repartiPersonalizzati || [];
        if (!raduno.repartiPersonalizzati.includes(c.slotId)) raduno.repartiPersonalizzati.push(c.slotId);
      }
      let giocatoreId;
      if (c.match) {
        giocatoreId = c.match.id;
      } else {
        // Nome grezzo spesso "Cognome Nome" o "Nome Cognome" — non essendo certi
        // dell'ordine, lo mettiamo tutto in cognome e l'utente potrà sistemarlo
        // dalla scheda giocatore. Quando il file riporta club/anno di
        // nascita/piede li usiamo per precompilare la scheda; l'anno (JG, a 2
        // cifre) dà solo un'approssimazione della data di nascita (1° gennaio),
        // da correggere manualmente.
        const nuovo = {
          id: uid(), cognome: c.grezzo, nome: "",
          dataNascita: c.jg ? `20${c.jg}-01-01` : "",
          squadra: c.klub || "",
          ruoloPrimario: "", ruoloSecondario: "",
          piedePreferito: c.fuss === "R" ? "Destro" : (c.fuss === "L" ? "Sinistro" : ""),
          nazionalita: "",
          note: "", etichette: [], visionature: [], valutazioni: [], trasferimenti: [],
          misurazioni: [], partiteUfficiali: [], creatoIl: new Date().toISOString()
        };
        players.push(nuovo);
        giocatoreId = nuovo.id;
        nuoviGiocatori++;
      }
      if (!raduno.rosa.some(x => x.giocatoreId === giocatoreId)) {
        raduno.rosa.push({ giocatoreId, reparto: c.slotId });
        aggiunti++;
      }
    });
  });

  bozza.schede.splice(si, 1);
  savePlayers();
  alert(`Importato: ${aggiunti} giocatori aggiunti al raduno "${raduno.nome}" (${nuoviGiocatori} nuove schede create in Elenco — ricordati di completarle con data di nascita e gli altri dati mancanti).`);

  if (bozza.schede.length) {
    render();
  } else {
    radunoImportBozza = null;
    radunoCorrenteId = raduno.id;
    raduniSezione = "dettaglio";
    render();
  }
}

function esportaRadunoExcel(r) {
  const reparti = repartiRaduno(r);
  const aoa = [];
  aoa.push([r.nome || ""]);
  aoa.push(["Luogo", r.luogo || "", "Stagione", r.stagione || ""]);
  aoa.push(["Dal", r.dataInizio || "", "Al", r.dataFine || ""]);
  aoa.push(["Modulo", r.modulo || ""]);
  aoa.push(["Trainer", r.trainer || "", "Assistente 1", r.assistente1 || "", "Assistente 2", r.assistente2 || ""]);
  aoa.push(["TH-Trainer", r.thTrainer || "", "Athletik", r.athletik || "", "Analyst", r.analyst || "", "TOM", r.tom || ""]);
  aoa.push([]);

  reparti.forEach(rep => {
    const giocatori = (r.rosa || []).filter(x => x.reparto === rep.id).map(x => players.find(p => p.id === x.giocatoreId)).filter(Boolean);
    aoa.push([rep.nome]);
    aoa.push(["Cognome", "Nome", "Anno nascita", "Squadra"]);
    giocatori.forEach(p => {
      aoa.push([p.cognome || "", p.nome || "", p.dataNascita ? new Date(p.dataNascita).getFullYear() : "", p.squadra || ""]);
    });
    aoa.push([]);
  });

  const ws = XLSX.utils.aoa_to_sheet(aoa);
  const wbOut = XLSX.utils.book_new();
  XLSX.utils.book_append_sheet(wbOut, ws, "Raduno");
  const slug = (r.nome || "raduno").toLowerCase().replace(/[^a-z0-9]+/g, "-").replace(/(^-|-$)/g, "");
  XLSX.writeFile(wbOut, `raduno-${slug || "tyt"}.xlsx`);
}

/* ===================== BACKUP ===================== */
function esportaBackup() {
  const blob = new Blob([JSON.stringify({ players, eventi, raduni }, null, 2)], { type: "application/json" });
  const url = URL.createObjectURL(blob);
  const a = document.createElement("a");
  const oggi = dataOggiLocale();
  a.href = url;
  a.download = `scout-backup-${oggi}.json`;
  document.body.appendChild(a);
  a.click();
  a.remove();
  URL.revokeObjectURL(url);
}

function importaBackup(e) {
  const file = e.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = async () => {
    try {
      const dati = parseDatabaseJSON(reader.result);
      const nGiocatori = dati.players.length;
      const nEventi = dati.eventi.length;
      const nRaduni = (dati.raduni || []).length;
      if (confirm(`Il backup contiene ${nGiocatori} giocatori, ${nEventi} eventi di calendario e ${nRaduni} raduni U16. Sostituire tutti i dati attuali (${players.length} giocatori, ${eventi.length} eventi, ${raduni.length} raduni)? Premi Annulla per non fare nulla.`)) {
        players = dati.players;
        eventi = dati.eventi;
        raduni = dati.raduni || [];
        await savePlayers();
        render();
        alert("Backup ripristinato correttamente.");
      }
    } catch (err) {
      alert("File di backup non valido: " + err.message);
    }
    e.target.value = "";
  };
  reader.readAsText(file);
}

window.addEventListener("DOMContentLoaded", boot);
