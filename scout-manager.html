    if (!candidatiAccumulati.length) {
      wrapper.innerHTML = `<div class="empty-state">
        <p>Nessun giocatore con voto e commento scritto rilevato finora.</p>
        <p class="empty-sub">Carica uno o più file qui sopra (PDF, Word o Excel Mirwald), oppure incolla un testo: i giocatori individuati compariranno in questa lista.</p>
      </div>`;
      return;
    }
    wrapper.innerHTML = `
      <h3>${candidatiAccumulati.length} giocator${candidatiAccumulati.length === 1 ? "e trovato" : "i trovati"} — controlla e correggi prima di importare</h3>
      <div id="candidati-list"></div>
      <div class="import-actions">
        <button class="btn btn-primary" id="btn-importa-selezionati" type="button">Importa selezionati</button>
      </div>
    `;
    const list = document.getElementById("candidati-list");
    candidatiAccumulati.forEach((c, idx) => {
      list.insertAdjacentHTML("beforeend", candidatoCardHTML(c, idx));
      const card = list.lastElementChild;
      const paramContainer = card.querySelector(".c-param-container");
      c.parametri.forEach(p => paramContainer.appendChild(creaRigaParametro(p)));
      card.querySelector(".c-btn-add-param").onclick = () => paramContainer.appendChild(creaRigaParametro());
    });
    document.getElementById("btn-importa-selezionati").onclick = importaSelezionati;
  }

  document.getElementById("import-unificato-input").onchange = async e => {
    const files = Array.from(e.target.files || []);
    if (!files.length) return;
    const scoutDefault = document.getElementById("import-scout-default").value.trim();
    const status = document.getElementById("import-status");
    const erroriContainer = document.getElementById("import-errori");
    let trovatiTotali = 0;
    const messaggi = [];

    for (let i = 0; i < files.length; i++) {
      const file = files[i];
      status.textContent = `Lettura file ${i + 1} di ${files.length}: ${file.name}...`;
      const estensione = (file.name.split(".").pop() || "").toLowerCase();
      try {
        if (estensione === "pdf") {
          const text = await estraiTestoPdf(file);
          const esitoGPS = elaboraTestoPrestazioniGPS(text, file.name);
          if (esitoGPS.riconosciuto) {
            messaggi.push({
              tipo: "ok",
              testo: `${file.name} — prestazioni GPS (${esitoGPS.tipo === "gk" ? "portieri" : "giocatori di movimento"}): ${esitoGPS.aggiornati} giocatori aggiornati` +
                (esitoGPS.nonTrovati.length ? `, ${esitoGPS.nonTrovati.length} non trovati in anagrafica (${esitoGPS.nonTrovati.join(", ")})` : ".")
            });
            continue;
          }
          let trovati = parseCandidati(text, file.name);
          if (!trovati.length) trovati = parseNarrativoColore(text, file.name);
          trovati.forEach(c => { c._raw = `[${file.name}] ${c._raw}`; });
          if (!trovati.length) { messaggi.push({ tipo: "warn", testo: `${file.name} — nessun giocatore con voto Tips e commento riconosciuto in questo PDF.` }); continue; }
          candidatiAccumulati = candidatiAccumulati.concat(trovati);
          trovatiTotali += trovati.length;

        } else if (estensione === "docx") {
          const html = await estraiHtmlDocx(file);
          let trovati = parseCandidatiDocxTabella(html, scoutDefault, file.name);
          if (!trovati.length) trovati = parseCandidatiDocx(html, scoutDefault, file.name);
          if (!trovati.length) trovati = parseCandidatiDocxNazionale(html, scoutDefault, file.name);
          if (!trovati.length) trovati = parseCandidatiDocxNarrativo(html, scoutDefault, file.name);
          if (!trovati.length) trovati = parseCandidatiDocxNumerato(html, scoutDefault, file.name);
          if (!trovati.length) trovati = parseCandidatiDocxElenco(html, scoutDefault, file.name);
          if (!trovati.length) { messaggi.push({ tipo: "warn", testo: `${file.name} — formato non riconosciuto: non trovo giocatori né in forma tabellare né a paragrafi in questo documento Word.` }); continue; }
          candidatiAccumulati = candidatiAccumulati.concat(trovati);
          trovatiTotali += trovati.length;

        } else if (estensione === "xlsx") {
          const esitoPresenze = await elaboraFilePresenzePartite(file);
          if (esitoPresenze.riconosciuto) {
            messaggi.push({
              tipo: "ok",
              testo: `${file.name} — presenze partite: ${esitoPresenze.aggiornati} nuove registrate` +
                (esitoPresenze.giaPresenti ? `, ${esitoPresenze.giaPresenti} già presenti (saltate)` : "") +
                (esitoPresenze.nonTrovati.length ? `, ${esitoPresenze.nonTrovati.length} non trovati in anagrafica (${esitoPresenze.nonTrovati.join(", ")})` : ".")
            });
            continue;
          }
          const esito = await elaboraFileMirwald(file);
          if (!esito.riconosciuto) {
            messaggi.push({ tipo: "warn", testo: `${file.name} — formato Excel non riconosciuto: mi aspetto il file del test Mirwald (foglio "Eingabe_Input") o il file "Presenze partite" (colonne Cognome/Nome/Data/Avversario/Presenza).` });
            continue;
          }
          messaggi.push({
            tipo: "ok",
            testo: `${file.name} — dati fisici Mirwald: ${esito.aggiornati} giocatori aggiornati` +
              (esito.nonTrovati.length ? `, ${esito.nonTrovati.length} non trovati in anagrafica (${esito.nonTrovati.join(", ")})` : ".")
          });

        } else {
          messaggi.push({ tipo: "warn", testo: `${file.name} — formato non compatibile: uso solo file .pdf, .docx o .xlsx.` });
        }
      } catch (err) {
        console.error(err);
        messaggi.push({ tipo: "warn", testo: `${file.name} — errore durante la lettura: ${err.message}` });
      }
    }

    status.textContent = `${files.length} file letti, ${trovatiTotali} giocatori individuati per la revisione.`;
    erroriContainer.innerHTML = messaggi.map(m => `<div class="import-result${m.tipo === "warn" ? " import-result-warn" : ""}">${esc(m.testo)}</div>`).join("");
    mostraCandidati();
    e.target.value = "";
  };

  document.getElementById("btn-rileva").onclick = () => {
    const text = document.getElementById("pdf-raw-text").value;
    let trovati = parseCandidati(text, "");
    if (!trovati.length) trovati = parseNarrativoColore(text, "");
    candidatiAccumulati = candidatiAccumulati.concat(trovati);
    mostraCandidati();
  };

  mostraCandidati();
}

// Come trovaGiocatorePerNomeFile, ma con una riserva tollerante a piccole
// varianti di spelling tra il nome nel report del preparatore e quello in
// anagrafica (es. "Thimothy"/"Timothy", "Mohamed"/"Mohamadou") — capita
// spesso perché il nome arriva da un sistema esterno (SFV/ASF), non da noi.
// Il confronto esatto resta il primo tentativo; quello approssimato scatta
// solo se il primo non trova nulla, e solo se la somiglianza è alta E netta.
function trovaGiocatoreGPSFuzzy(nomeCompleto) {
  const esatto = trovaGiocatorePerNomeFile(nomeCompleto);
  if (esatto.match) return esatto;
  const targetTok = normalizzaTokenNome(nomeCompleto).slice().sort().join("");
  if (!targetTok) return esatto;
  let migliore = null, punteggio = 0;
  for (const p of players) {
    const tokP = normalizzaTokenNome(`${p.cognome} ${p.nome}`).slice().sort().join("");
    const s = similaritaTesto(targetTok, tokP);
    if (s > punteggio) { punteggio = s; migliore = p; }
  }
  if (migliore && punteggio >= 0.7) return { match: migliore, motivo: "" };
  return esatto;
}

function parseNumeroEuropeo(str) {
  if (!str) return null;
  const n = parseFloat(str.replace(/\./g, "").replace(",", "."));
  return isNaN(n) ? null : n;
}

function formatNumeroGPS(n, decimali = 0) {
  if (n === null || n === undefined || isNaN(n)) return "-";
  return n.toLocaleString("it-IT", { minimumFractionDigits: decimali, maximumFractionDigits: decimali });
}

// Contesto della partita dedotto dal report GPS: la data la cerchiamo nel
// testo (campo "Date" del dashboard, formato gg/mm/aaaa) perché è quella
// vera della partita; il nome file (es. "..._20260304_...vs_U16Ticino...")
// serve solo da riserva per la data e per un'etichetta avversario di cortesia.
function estraiContestoPartitaGPS(text, nomeFile) {
  let data = "";
  const dm = text.match(/\b(\d{2})\/(\d{2})\/(\d{4})\b/);
  if (dm) data = `${dm[3]}-${dm[2]}-${dm[1]}`;
  if (!data) {
    const fm = (nomeFile || "").match(/(\d{4})(\d{2})(\d{2})/);
    if (fm) data = `${fm[1]}-${fm[2]}-${fm[3]}`;
  }
  let avversario = "";
  const vm = (nomeFile || "").replace(/\.pdf$/i, "").match(/vs[_\-]?(.+)$/i);
  if (vm) avversario = vm[1].replace(/_GK$/i, "").replace(/_/g, " ").replace(/(\d)([A-Za-z])/g, "$1 $2").trim();
  return { data, avversario };
}

const NOMI_RIGA_MEDIA_GPS = new Set(["promedio", "media", "average", "totale", "total", "mean", "team average"]);

// Riconosce ed importa i report "prestazioni GPS" (dashboard Power BI del
// preparatore atletico per i giocatori di movimento, oppure il report
// Catapult per i portieri) — solo per i giocatori della Nazionale U16 che
// hanno accesso a questo tipo di dato. Come per Mirwald, aggiorna SOLO
// giocatori già esistenti in anagrafica (niente creazione automatica):
// chi non viene trovato va aggiunto a mano e poi reimportato.
function elaboraTestoPrestazioniGPS(text, nomeFile) {
  const isGK = /DAYLY GK REPORT|DAILY GK REPORT|Tot Dive/i.test(text);
  const isOutfield = !isGK && /Total Distance/i.test(text) && /HMLD/i.test(text);
  if (!isGK && !isOutfield) return { riconosciuto: false };

  const { data, avversario } = estraiContestoPartitaGPS(text, nomeFile);
  let aggiornati = 0;
  const nonTrovati = [];
  const NOME_RE = "[A-ZÀ-ÖØ-Þ][a-zà-öø-ÿ'’.-]+(?:\\s+[A-ZÀ-ÖØ-Þ][a-zà-öø-ÿ'’.-]+)*";

  if (isOutfield) {
    const RIGA_RE = new RegExp(`^(${NOME_RE})\\s+((?:[\\d]{1,3}(?:\\.\\d{3})*,\\d{2}\\s+){11}[\\d]{1,3}(?:\\.\\d{3})*,\\d{2})`, "gm");
    let m;
    while ((m = RIGA_RE.exec(text))) {
      const nomeCompleto = m[1].trim();
      if (NOMI_RIGA_MEDIA_GPS.has(nomeCompleto.toLowerCase())) continue;
      const numeri = m[2].trim().split(/\s+/).map(parseNumeroEuropeo);
      if (numeri.length !== 12 || numeri.some(n => n === null)) continue;

      const { match: p } = trovaGiocatoreGPSFuzzy(nomeCompleto);
      if (!p) { nonTrovati.push(nomeCompleto); continue; }

      if (!p.prestazioniPartita) p.prestazioniPartita = [];
      if (!p.prestazioniPartita.some(e => e.data === data)) {
        p.prestazioniPartita.push({
          id: uid(), data, avversario,
          minuti: numeri[0], distanzaTotale: numeri[2], hsr: numeri[5],
          sprintDistance: numeri[6], nSprint: numeri[7], velocitaMax: numeri[8], hmld: numeri[11]
        });
        aggiornati++;
      }
    }
  } else {
    const RIGA_RE = new RegExp(`^(${NOME_RE})\\s+(\\d{2}):(\\d{2}):(\\d{2})\\s+(\\d+)\\s+(\\d+)\\s+(\\d+)\\s+(\\d+)\\s+(\\d+)\\s+(\\d+)\\s+(\\d+)`, "gm");
    let m;
    while ((m = RIGA_RE.exec(text))) {
      const nomeCompleto = m[1].trim();
      if (NOMI_RIGA_MEDIA_GPS.has(nomeCompleto.toLowerCase())) continue;
      const minuti = Math.round((parseInt(m[2], 10) * 60 + parseInt(m[3], 10) + parseInt(m[4], 10) / 60) * 10) / 10;

      const { match: p } = trovaGiocatoreGPSFuzzy(nomeCompleto);
      if (!p) { nonTrovati.push(nomeCompleto); continue; }

      if (!p.prestazioniPartitaGK) p.prestazioniPartitaGK = [];
      if (!p.prestazioniPartitaGK.some(e => e.data === data)) {
        p.prestazioniPartitaGK.push({
          id: uid(), data, avversario, minuti,
          distanzaTotale: parseInt(m[6], 10), caricoTuffi: parseInt(m[7], 10),
          salti: parseInt(m[8], 10), tuffi: parseInt(m[9], 10)
        });
        aggiornati++;
      }
    }
  }

  if (aggiornati > 0) savePlayers();
  return { riconosciuto: true, tipo: isGK ? "gk" : "outfield", aggiornati, nonTrovati };
}

async function elaboraFilePresenzePartite(file) {
  const buf = await file.arrayBuffer();
  const wb = XLSX.read(buf, { type: "array", cellDates: true });
  const nomeFoglio = wb.SheetNames[0];
  const sheet = wb.Sheets[nomeFoglio];
  const righe = XLSX.utils.sheet_to_json(sheet, { header: 1, raw: true });
  if (!righe.length) return { riconosciuto: false };

  // Firma del formato: queste intestazioni devono esserci tutte, altrimenti
  // non è il file "Presenze partite" che ci aspettiamo (potrebbe essere un
  // qualsiasi altro Excel).
  const intestazioni = (righe[0] || []).map(h => (h || "").toString().trim().toLowerCase());
  const richieste = ["cognome", "nome", "data", "avversario", "presenza"];
  if (!richieste.every(r => intestazioni.includes(r))) return { riconosciuto: false };

  const idx = nome => intestazioni.indexOf(nome);
  const iCognome = idx("cognome"), iNome = idx("nome"), iData = idx("data"),
    iCompetizione = idx("competizione"), iSquadra = idx("squadra"), iAvversario = idx("avversario"),
    iRisultato = idx("risultato"), iPresenza = idx("presenza"), iMinuti = idx("minuti"),
    iGol = idx("gol"), iNote = idx("note");

  const testo = v => (v === undefined || v === null) ? "" : v.toString().trim();
  const toISO = d => {
    if (!d) return "";
    if (d instanceof Date) return d.toISOString().slice(0, 10);
    if (typeof d === "string") {
      const s = d.trim();
      // Formato AAAA-MM-GG (ISO) già pronto così com'è — va riconosciuto ESPLICITAMENTE
      // prima di provare il formato svizzero GG.MM.AAAA, altrimenti normalizzaData lo
      // interpreta come giorno/mese/anno sbagliando data in modo silenzioso.
      if (/^\d{4}-\d{2}-\d{2}$/.test(s)) return s;
      return normalizzaData(s) || s;
    }
    return "";
  };
  const numOrNull = v => (v === undefined || v === null || v === "") ? null : parseFloat(v);

  let aggiornati = 0, giaPresenti = 0;
  const nonTrovati = [];
  for (let i = 1; i < righe.length; i++) {
    const r = righe[i] || [];
    const cognome = testo(r[iCognome]);
    if (!cognome) continue;
    const nome = testo(r[iNome]);
    const data = toISO(r[iData]);
    const avversario = iAvversario >= 0 ? testo(r[iAvversario]) : "";

    const p = trovaGiocatoreEsistente(cognome, nome, null);
    if (!p) { nonTrovati.push(`${cognome} ${nome}`); continue; }

    if (!p.partiteUfficiali) p.partiteUfficiali = [];
    const esiste = p.partiteUfficiali.some(m => m.data === data && (m.avversario || "") === avversario);
    if (esiste) { giaPresenti++; continue; }

    p.partiteUfficiali.push({
      data,
      competizione: iCompetizione >= 0 ? testo(r[iCompetizione]) : "",
      squadra: iSquadra >= 0 ? testo(r[iSquadra]) : "",
      avversario,
      risultato: iRisultato >= 0 ? testo(r[iRisultato]) : "",
      presenza: iPresenza >= 0 ? testo(r[iPresenza]) : "",
      minutiGiocati: iMinuti >= 0 ? numOrNull(r[iMinuti]) : null,
      gol: iGol >= 0 ? numOrNull(r[iGol]) : null,
      note: iNote >= 0 && testo(r[iNote]) ? testo(r[iNote]) : "Fonte: MatchCenter SFL",
    });
    aggiornati++;
  }
  if (aggiornati > 0) savePlayers();
  return { riconosciuto: true, aggiornati, nonTrovati, giaPresenti };
}

async function elaboraFileMirwald(file) {
  const buf = await file.arrayBuffer();
  const wb = XLSX.read(buf, { type: "array", cellDates: true });
  const nomeFoglio = wb.SheetNames.find(n => /eingabe/i.test(n));
  if (!nomeFoglio) {
    // Nessun foglio "Eingabe_Input": non è il formato del test Mirwald che conosciamo.
    return { riconosciuto: false, aggiornati: 0, nonTrovati: [] };
  }
  const sheet = wb.Sheets[nomeFoglio];
  const righe = XLSX.utils.sheet_to_json(sheet, { header: 1, raw: true });

  const TRAD_SVILUPPO = { 1: "Precoce", 2: "Possibilmente precoce", 3: "Normale", 4: "Possibilmente tardivo", 5: "Tardivo" };
  const toISO = d => {
    if (!d) return "";
    if (d instanceof Date) return d.toISOString().slice(0, 10);
    return "";
  };
  const numOrNull = v => (v === undefined || v === null || v === "" || (typeof v === "string" && !v.trim())) ? null : parseFloat(v);

  let aggiornati = 0, nonTrovati = [];
  for (let i = 2; i < righe.length; i++) {
    const r = righe[i] || [];
    const cognome = (r[1] || "").toString().trim();
    if (!cognome) continue;
    const nome = (r[2] || "").toString().trim();
    const dataNascita = toISO(r[4]);
    const dataMisura = toISO(r[5]);
    const peso = numOrNull(r[7]);
    const altezza = numOrNull(r[8]);
    const etaBiologica = numOrNull(r[11]);
    const sviluppoNum = numOrNull(r[12]);
    const altezzaAdulto = numOrNull(r[14]);
    const sviluppoBiologico = sviluppoNum ? (TRAD_SVILUPPO[Math.round(sviluppoNum)] || null) : null;

    const p = trovaGiocatoreEsistente(cognome, nome, dataNascita);
    if (!p) { nonTrovati.push(`${cognome} ${nome}`); continue; }

    if (!p.misurazioni) p.misurazioni = [];
    const giaPresente = p.misurazioni.some(m => m.data === dataMisura && m.fonte === "Mirwald");
    if (!giaPresente) {
      p.misurazioni.push({ data: dataMisura, altezza, peso, etaBiologica, sviluppoBiologico, altezzaAdulto, fonte: "Mirwald" });
    }
    p.dataMisurazione = dataMisura;
    if (altezza !== null) p.altezza = altezza;
    if (peso !== null) p.peso = peso;
    if (etaBiologica !== null) p.etaBiologica = Math.round(etaBiologica * 100) / 100;
    if (sviluppoBiologico) p.sviluppoBiologico = sviluppoBiologico;
    if (altezzaAdulto !== null) p.altezzaAdulto = altezzaAdulto;
    aggiornati++;
  }
  if (aggiornati > 0) savePlayers();
  return { riconosciuto: true, aggiornati, nonTrovati };
}

function trovaGiocatoreEsistente(cognome, nome, dataNascita) {
  const cognomeNorm = cognome.toLowerCase();
  // Priorità 1: cognome + data di nascita, l'identificatore più affidabile
  // (il nome può essere suddiviso diversamente da un'importazione all'altra,
  // specialmente sui nomi composti).
  if (dataNascita) {
    const m = players.find(p => p.cognome.toLowerCase() === cognomeNorm && p.dataNascita === dataNascita);
    if (m) return m;
  }
  // Priorità 2: cognome + nome esatti, utile quando la data manca
  return players.find(p =>
    p.cognome.toLowerCase() === cognomeNorm &&
    p.nome.toLowerCase() === nome.toLowerCase() &&
    (!dataNascita || !p.dataNascita || p.dataNascita === dataNascita)
  );
}

function valutazioneGiaPresente(lista, nuova) {
  return (lista || []).some(v =>
    (v.data || "") === (nuova.data || "") &&
    (v.parametro || "") === (nuova.parametro || "") &&
    String(v.valoreNumerico ?? "") === String(nuova.valoreNumerico ?? "") &&
    (v.scout || "") === (nuova.scout || "") &&
    (v.notaScritta || "") === (nuova.notaScritta || "")
  );
}

function visionaturaGiaPresente(lista, nuova) {
  return (lista || []).some(v =>
    (v.data || "") === (nuova.data || "") &&
    (v.luogo || "") === (nuova.luogo || "") &&
    (v.note || "") === (nuova.note || "")
  );
}

function importaSelezionati() {
  const cards = document.querySelectorAll(".candidato-card");
  let importati = 0, aggiornati = 0, duplicatiIgnorati = 0;

  cards.forEach(card => {
    if (!card.querySelector(".c-include").checked) return;
    const cognome = card.querySelector(".c-cognome").value.trim();
    const nome = card.querySelector(".c-nome").value.trim();
    if (!cognome || !nome) return;
    const dataNascita = card.querySelector(".c-data").value;
    const squadra = card.querySelector(".c-squadra").value.trim();
    const ruoloPrimario = card.querySelector(".c-ruolo").value.trim();
    const dataVisionatura = card.querySelector(".c-datavis").value;
    const partitaInfo = card.querySelector(".c-partita").value.trim();
    const scout = card.querySelector(".c-scout").value.trim();
    const notaScritta = card.querySelector(".c-nota").value.trim();
    let etichetteAuto = [];
    try { etichetteAuto = JSON.parse(card.dataset.etichette || "[]"); } catch (e) { etichetteAuto = []; }

    const nuoveValutazioni = [];
    card.querySelectorAll(".param-row").forEach(row => {
      const label = row.querySelector(".p-label").value.trim();
      const valore = row.querySelector(".p-valore").value;
      if (!label || valore === "") return;
      nuoveValutazioni.push({ data: dataVisionatura, parametro: label, valoreNumerico: valore, scout, notaScritta: "" });
    });
    // La valutazione scritta viene agganciata come voce a sé, così resta
    // sempre visibile nella scheda anche se i singoli parametri cambiano.
    if (notaScritta) {
      nuoveValutazioni.push({ data: dataVisionatura, parametro: "Commento", valoreNumerico: "", scout, notaScritta });
    }

    const nuovaVisionatura = { data: dataVisionatura, luogo: partitaInfo, note: "Importato da PDF ClubCorner", scout };

    const esistente = trovaGiocatoreEsistente(cognome, nome, dataNascita);

    if (esistente) {
      esistente.valutazioni = esistente.valutazioni || [];
      let almenoUnaNuova = false;
      nuoveValutazioni.forEach(v => {
        if (!valutazioneGiaPresente(esistente.valutazioni, v)) {
          esistente.valutazioni.push(v);
          almenoUnaNuova = true;
        }
      });
      esistente.visionature = esistente.visionature || [];
      if (!visionaturaGiaPresente(esistente.visionature, nuovaVisionatura)) {
        esistente.visionature.push(nuovaVisionatura);
        almenoUnaNuova = true;
      }
      esistente.etichette = esistente.etichette || [];
      etichetteAuto.forEach(e => { if (!esistente.etichette.includes(e)) esistente.etichette.push(e); });
      if (!esistente.squadra && squadra) esistente.squadra = squadra;
      if (!esistente.ruoloPrimario && ruoloPrimario) esistente.ruoloPrimario = ruoloPrimario;
      if (!esistente.dataNascita && dataNascita) esistente.dataNascita = dataNascita;
      if (almenoUnaNuova) aggiornati++; else duplicatiIgnorati++;
    } else {
      players.push({
        id: uid(),
        creatoIl: Date.now(),
        cognome, nome, dataNascita, squadra,
        ruoloPrimario, ruoloSecondario: "", note: "",
        foto: "",
        trasferimenti: [],
        etichette: etichetteAuto.slice(),
        visionature: [nuovaVisionatura],
        valutazioni: nuoveValutazioni
      });
      importati++;
    }
  });

  savePlayers();
  const wrapper = document.getElementById("candidati-wrapper");
  wrapper.innerHTML = `<div class="import-result">Importazione completata: ${importati} nuovi giocatori, ${aggiornati} aggiornati con nuove valutazioni${duplicatiIgnorati > 0 ? `, ${duplicatiIgnorati} già presenti (ignorati come duplicati)` : ""}.</div>`;
}

/* ===================== STRUMENTI (manutenzione dati) ===================== */
function dedupeArray(arr, keyFn) {
  const visti = new Set();
  const risultato = [];
  (arr || []).forEach(item => {
    const key = keyFn(item);
    if (!visti.has(key)) { visti.add(key); risultato.push(item); }
  });
  return risultato;
}

function pulisciDuplicati() {
  let rimosseValutazioni = 0, rimosseVisionature = 0;
  players.forEach(p => {
    const valPrima = (p.valutazioni || []).length;
    p.valutazioni = dedupeArray(p.valutazioni, v => [v.data, v.parametro, v.valoreNumerico, v.scout, v.notaScritta].join("|"));
    rimosseValutazioni += valPrima - p.valutazioni.length;
    const visPrima = (p.visionature || []).length;
    p.visionature = dedupeArray(p.visionature, v => [v.data, v.luogo, v.note].join("|"));
    rimosseVisionature += visPrima - p.visionature.length;
  });
  savePlayers();
  return { rimosseValutazioni, rimosseVisionature };
}

function rinominaEtichetta(vecchia, nuova) {
  if (!vecchia || !nuova || vecchia === nuova) return 0;
  let conteggio = 0;
  players.forEach(p => {
    if (!p.etichette) return;
    const idx = p.etichette.indexOf(vecchia);
    if (idx === -1) return;
    p.etichette.splice(idx, 1);
    if (!p.etichette.includes(nuova)) p.etichette.push(nuova);
    conteggio++;
  });
  return conteggio;
}

function rimuoviEtichetta(etichetta) {
  if (!etichetta) return 0;
  let conteggio = 0;
  players.forEach(p => {
    if (!p.etichette) return;
    const idx = p.etichette.indexOf(etichetta);
    if (idx === -1) return;
    p.etichette.splice(idx, 1);
    conteggio++;
  });
  return conteggio;
}

function rinominaScout(vecchio, nuovo) {
  if (!vecchio || !nuovo || vecchio === nuovo) return 0;
  let conteggio = 0;
  players.forEach(p => {
    (p.valutazioni || []).forEach(v => {
      if (v.scout === vecchio) { v.scout = nuovo; conteggio++; }
    });
  });
  return conteggio;
}

function firmaGruppoValutazioni(voci) {
  return voci.slice()
    .sort((a, b) => (a.parametro || "").localeCompare(b.parametro || ""))
    .map(v => `${v.parametro || ""}|${v.valoreNumerico ?? ""}|${v.scout || ""}|${(v.notaScritta || "").trim()}`)
    .join("§§");
}

function trovaQuasiDuplicatiData() {
  const risultati = [];
  players.forEach(p => {
    const gruppi = {};
    (p.valutazioni || []).forEach(v => {
      const key = v.data || "";
      if (!key) return;
      (gruppi[key] = gruppi[key] || []).push(v);
    });
    const date = Object.keys(gruppi);
    for (let i = 0; i < date.length; i++) {
      for (let j = i + 1; j < date.length; j++) {
        const d1 = date[i], d2 = date[j];
        const firma1 = firmaGruppoValutazioni(gruppi[d1]);
        if (firma1.length < 25) continue; // evita falsi positivi su gruppi troppo piccoli/vuoti
        if (firma1 === firmaGruppoValutazioni(gruppi[d2])) {
          risultati.push({ playerId: p.id, nome: `${p.cognome} ${p.nome}`, data1: d1, data2: d2 });
        }
      }
    }
  });
  return risultati;
}

function rimuoviVocePerData(playerId, data) {
  const p = players.find(pl => pl.id === playerId);
  if (!p) return;
  p.valutazioni = (p.valutazioni || []).filter(v => v.data !== data);
  p.visionature = (p.visionature || []).filter(v => v.data !== data);
  savePlayers();
}

function normalizzaTokenNome(str) {
  return str
    // separa il "CamelCase" tipico dei nomi file senza spazi (es. "AiroloNicolas" -> "Airolo Nicolas"),
    // va fatto PRIMA di mettere tutto in minuscolo, altrimenti si perde il confine tra le parole
    .replace(/([a-zà-ÿ])([A-ZÀ-Ý])/g, "$1 $2")
    .toLowerCase()
    .normalize("NFD").replace(/[\u0300-\u036f]/g, "")
    .replace(/[^a-z0-9]+/g, " ")
    .trim()
    .split(/\s+/)
    .filter(Boolean);
}

function trovaGiocatorePerNomeFile(nomeBase) {
  const tokenFile = normalizzaTokenNome(nomeBase.replace(/_/g, " "));
  if (!tokenFile.length) return { match: null, motivo: "nome file non leggibile" };
  const corrispondenze = players.filter(p => {
    const tokenPlayer = normalizzaTokenNome(`${p.cognome} ${p.nome}`);
    if (!tokenPlayer.length) return false;
    return tokenFile.every(t => tokenPlayer.includes(t));
  });
  if (corrispondenze.length === 1) return { match: corrispondenze[0], motivo: "" };
  if (corrispondenze.length === 0) return { match: null, motivo: "nessun giocatore corrispondente trovato in Elenco" };
  return {
    match: null,
    motivo: `corrisponde a più giocatori (${corrispondenze.map(p => p.cognome + " " + p.nome).join("; ")}) — rinomina il file in modo più preciso`
  };
}

function tokenNomeGiocatore(p) {
  // I token puramente numerici sono quasi sempre residui di un'importazione
  // andata storta (es. "Magnin Timeo – 2."), non fanno parte del nome vero:
  // li ignoriamo per non perdere il confronto con la scheda pulita.
  return new Set(normalizzaTokenNome(`${p.cognome} ${p.nome}`).filter(t => !/^\d+$/.test(t)));
}

function stessiToken(setA, setB) {
  if (!setA.size || setA.size !== setB.size) return false;
  for (const t of setA) if (!setB.has(t)) return false;
  return true;
}

// Rileva un possibile duplicato anche quando i nomi non sono scritti in
// modo identico — capita spesso tra un'importazione ClubCorner e una
// relazione scritta a mano dallo scout, dove un secondo nome/cognome può
// comparire in una scheda e non nell'altra (es. "Chateloin Mendoza Tristan"
// vs "Chateloin Tristan").
// Similarità tra due stringhe (coefficiente di Dice sui bigrammi) — serve a
// riconoscere nomi scritti quasi uguali ma non identici, tipo "Aron"/"Aaron"
// o piccoli refusi di battitura tra un'importazione e l'altra.
function bigrammi(str) {
  const s = str.toLowerCase();
  const grams = [];
  for (let i = 0; i < s.length - 1; i++) grams.push(s.slice(i, i + 2));
  return grams;
}
function similaritaTesto(a, b) {
  const bgA = bigrammi(a), bgB = bigrammi(b);
  if (!bgA.length || !bgB.length) return a === b ? 1 : 0;
  const disponibili = bgB.slice();
  let intersezione = 0;
  for (const g of bgA) {
    const idx = disponibili.indexOf(g);
    if (idx !== -1) { intersezione++; disponibili.splice(idx, 1); }
  }
  return (2 * intersezione) / (bgA.length + bgB.length);
}

function possibileDuplicato(p, q) {
  const tokenP = tokenNomeGiocatore(p);
  const tokenQ = tokenNomeGiocatore(q);
  if (!tokenP.size || !tokenQ.size) return false;

  // Stessi identici token: sempre un duplicato.
  if (stessiToken(tokenP, tokenQ)) return true;

  const condivisi = [...tokenP].filter(t => tokenQ.has(t));

  // Stessa data di nascita + almeno un token in comune (es. il cognome):
  // difficile che siano davvero due persone diverse.
  if (p.dataNascita && q.dataNascita && p.dataNascita === q.dataNascita && condivisi.length >= 1) return true;

  const piccolo = tokenP.size <= tokenQ.size ? tokenP : tokenQ;
  const grande = tokenP.size <= tokenQ.size ? tokenQ : tokenP;

  // Se entrambe le schede hanno una data di nascita e sono DIVERSE, è un
  // segnale forte che siano due persone diverse — i controlli "per
  // somiglianza" qui sotto si basano solo sul testo del nome e potrebbero
  // scambiare per errore un cognome con un nome che gli somiglia per caso
  // (es. "Simoni" cognome vs "Simon" nome di un'altra persona). In quel
  // caso li saltiamo, e restano valide solo l'uguaglianza esatta dei token
  // (sopra) e il contenimento esatto (sotto).
  const dateInConflitto = p.dataNascita && q.dataNascita && p.dataNascita !== q.dataNascita;

  // Un nome è interamente "contenuto" nell'altro (tutti i suoi token
  // compaiono anche nell'altro) — richiediamo almeno 2 token condivisi per
  // evitare falsi positivi con nomi molto corti/comuni.
  const tuttiContenuti = [...piccolo].every(t => grande.has(t));
  if (tuttiContenuti && piccolo.size >= 2) return true;

  if (dateInConflitto) return false;

  // Variante della regola sopra, ma tollerante ai refusi: ogni token del
  // nome più corto deve avere un corrispondente MOLTO simile (non per forza
  // identico) nell'altro nome — serve per casi come "Christofer Anez" vs
  // "Anez Arauz Christopher", dove manca un pezzo del nome E l'altro è
  // scritto con un refuso, quindi né il confronto esatto né quello sulla
  // stringa intera bastano da soli.
  if (piccolo.size >= 2) {
    const tuttiSimili = [...piccolo].every(tp => {
      let migliore = 0;
      for (const tg of grande) migliore = Math.max(migliore, similaritaTesto(tp, tg));
      return migliore >= 0.7;
    });
    if (tuttiSimili) return true;
  }

  // Nomi scritti quasi uguali (refuso/variante di trascrizione, es.
  // "Aron"/"Aaron"): confrontiamo la stringa completa "cognome+nome"
  // ordinata alfabeticamente per token, così l'ordine con cui sono scritti
  // cognome/nome non conta ai fini del confronto.
  const nomeOrdinato = set => [...set].sort().join(" ");
  const somiglianza = similaritaTesto(nomeOrdinato(tokenP), nomeOrdinato(tokenQ));
  if (somiglianza >= 0.82) return true;

  return false;
}

function trovaGruppiDuplicati() {
  const gruppi = [];
  const usati = new Set();
  players.forEach((p, idx) => {
    if (usati.has(p.id)) return;
    const tokenP = tokenNomeGiocatore(p);
    if (!tokenP.size) return;
    const gruppo = [p];
    players.forEach((q, idx2) => {
      if (idx2 <= idx || usati.has(q.id)) return;
      if (possibileDuplicato(p, q)) gruppo.push(q);
    });
    if (gruppo.length > 1) {
      gruppo.forEach(g => usati.add(g.id));
      gruppi.push(gruppo);
    }
  });
  return gruppi;
}

function dedupeArray(arr, chiaveFn) {
  const viste = new Set();
  return arr.filter(v => {
    const k = chiaveFn(v);
    if (viste.has(k)) return false;
    viste.add(k);
    return true;
  });
}

function unisciGiocatori(idPrincipale, idsSecondari) {
  const principale = players.find(p => p.id === idPrincipale);
  if (!principale) return;
  principale.visionature = principale.visionature || [];
  principale.valutazioni = principale.valutazioni || [];
  principale.etichette = principale.etichette || [];
  principale.trasferimenti = principale.trasferimenti || [];

  idsSecondari.forEach(id => {
    if (id === idPrincipale) return;
    const secondario = players.find(p => p.id === id);
    if (!secondario) return;
    principale.visionature = principale.visionature.concat(secondario.visionature || []);
    principale.valutazioni = principale.valutazioni.concat(secondario.valutazioni || []);
    (secondario.etichette || []).forEach(e => { if (!principale.etichette.includes(e)) principale.etichette.push(e); });
    principale.trasferimenti = principale.trasferimenti.concat(secondario.trasferimenti || []);
    if (!principale.foto && secondario.foto) principale.foto = secondario.foto;
    if (!principale.dataNascita && secondario.dataNascita) principale.dataNascita = secondario.dataNascita;
    if (!principale.squadra && secondario.squadra) principale.squadra = secondario.squadra;
    if (!principale.ruoloPrimario && secondario.ruoloPrimario) principale.ruoloPrimario = secondario.ruoloPrimario;
    if (!principale.ruoloSecondario && secondario.ruoloSecondario) principale.ruoloSecondario = secondario.ruoloSecondario;
    if (!principale.note && secondario.note) {
      principale.note = secondario.note;
      principale.noteModificateIl = secondario.noteModificateIl || principale.noteModificateIl;
    }
    if (!principale.creatoIl || (secondario.creatoIl && secondario.creatoIl < principale.creatoIl)) {
      principale.creatoIl = secondario.creatoIl || principale.creatoIl;
    }
    if ((secondario.modificatoIl || 0) > (principale.modificatoIl || 0)) {
      principale.modificatoIl = secondario.modificatoIl;
    }
    if ((secondario.noteModificateIl || 0) > (principale.noteModificateIl || 0) && principale.note === secondario.note) {
      principale.noteModificateIl = secondario.noteModificateIl;
    }
  });

  // Dopo l'unione può capitare che la stessa valutazione/visionatura fosse
  // già presente su entrambe le schede: ripuliamo subito.
  principale.valutazioni = dedupeArray(principale.valutazioni,
    v => [v.data, v.parametro, v.valoreNumerico, v.scout, (v.notaScritta || "").trim()].join("§"));
  principale.visionature = dedupeArray(principale.visionature,
    v => [v.data, v.luogo, v.scout || "", (v.note || "").trim()].join("§"));

  players = players.filter(p => p.id === idPrincipale || !idsSecondari.includes(p.id));
  savePlayers();
}

function renderStrumenti(content) {
  const etichetteTutte = [...new Set(players.flatMap(p => p.etichette || []))].sort();
  const scoutTutti = [...new Set(players.flatMap(p => (p.valutazioni || []).map(v => v.scout)).filter(Boolean))].sort();

  content.innerHTML = `
    <div class="import-box">
      <h2>Strumenti</h2>

      <div class="import-subsection">
        <h3>Backup automatico</h3>
        <p class="muted">Ogni volta che apri l'app o salvi una modifica, se sono passati almeno ${BACKUP_INTERVALLO_GIORNI} giorni dall'ultimo backup automatico, l'app ne carica uno nuovo nella cartella <span class="mono">${esc(cartellaBackup())}</span> su Dropbox — indipendentemente da chi (tu o Mattia) fa la modifica.</p>
        <p class="muted" style="color: var(--mid);">Non essendoci un vero processo in background, questo controllo scatta solo quando l'app è effettivamente aperta — non è un backup a orologio "ogni 2 giorni esatti" a prescindere dall'uso.</p>

  function renderGiocatoriDuplicati() {
    const lista = document.getElementById("mnt-giocatori-duplicati");
    const gruppi = trovaGruppiDuplicati();
    if (!gruppi.length) {
      lista.innerHTML = `<p class="muted">Nessun caso trovato.</p>`;
      return;
    }
    lista.innerHTML = gruppi.map((gruppo, gIdx) => {
      // Pre-selezioniamo come "da tenere" la scheda con più dati (visionature + valutazioni).
      const conRicchezza = gruppo.map(p => ({ p, ricchezza: (p.visionature || []).length + (p.valutazioni || []).length }));
      conRicchezza.sort((a, b) => b.ricchezza - a.ricchezza);
      const consigliatoId = conRicchezza[0].p.id;
      return `
        <div class="candidato-card">
          <div class="candidato-card-header"><strong>Possibile duplicato — ${gruppo.length} schede</strong></div>
          ${gruppo.map(p => `
            <label class="c-check">
              <input type="radio" name="dup-group-${gIdx}" value="${p.id}" ${p.id === consigliatoId ? "checked" : ""}>
              ${esc(p.cognome)} ${esc(p.nome)} — ${esc(p.squadra || "squadra n.d.")} — ${(p.visionature || []).length} visionature, ${(p.valutazioni || []).length} valutazioni
            </label>
          `).join("")}
          <div class="import-actions">
            <button class="btn btn-primary btn-sm" data-gidx="${gIdx}">Unisci in una scheda</button>
          </div>
        </div>
      `;
    }).join("");
    lista.querySelectorAll("button[data-gidx]").forEach(btn => {
      btn.onclick = () => {
        const gruppo = gruppi[parseInt(btn.dataset.gidx, 10)];
        const scelto = lista.querySelector(`input[name="dup-group-${btn.dataset.gidx}"]:checked`);
        if (!scelto) return;
        const idPrincipale = scelto.value;
        const idsSecondari = gruppo.map(p => p.id).filter(id => id !== idPrincipale);
        unisciGiocatori(idPrincipale, idsSecondari);
        renderGiocatoriDuplicati();
      };
    });
  }
  renderGiocatoriDuplicati();

  function wireApiKeySave(cfg) {
    document.getElementById(cfg.btnId).onclick = async () => {
      const valore = document.getElementById(cfg.inputId).value.trim();
      const risultato = document.getElementById(cfg.resultId);
      if (!valore) {
        risultato.innerHTML = `<div class="import-result import-result-warn">Il campo è vuoto: incolla prima la chiave, poi premi "Salva".</div>`;
        return;
      }
      cfg.setGlobal(valore);
      try {
        await idbSet(cfg.idbKey, valore);
        risultato.innerHTML = `<div class="import-result">Chiave ${cfg.nomeChiave} salvata su questo dispositivo.</div>`;
      } catch (e) {
        console.error(e);
        risultato.innerHTML = `<div class="import-result import-result-warn">La chiave funziona per questa sessione, ma il salvataggio permanente su questo browser non è riuscito (${esc(e.message)}). Dovrai reinserirla se ricarichi la pagina.</div>`;
      }
      // Non ricarichiamo l'intera scheda Strumenti qui: sovrascriverebbe
      // subito questo messaggio di conferma prima che si veda. Aggiorniamo
      // solo il pulsante "Rimuovi", se non è già presente.
      if (!document.getElementById(cfg.rimuoviId)) {
        const btn = document.createElement("button");
        btn.className = "btn btn-ghost btn-sm";
        btn.id = cfg.rimuoviId;
        btn.type = "button";
        btn.textContent = "Rimuovi";
        document.getElementById(cfg.btnId).insertAdjacentElement("afterend", btn);
        btn.onclick = async () => {
          cfg.setGlobal("");
          await idbDelete(cfg.idbKey);
          renderStrumenti(content);
        };
      }
    };
    if (document.getElementById(cfg.rimuoviId)) {
      document.getElementById(cfg.rimuoviId).onclick = async () => {
        cfg.setGlobal("");
        await idbDelete(cfg.idbKey);
        renderStrumenti(content);
      };
    }
  }

  document.getElementById("mnt-btn-vista-pubblica").onclick = () => {
    const etichetta = document.getElementById("mnt-vista-etichetta").value;
    const collega = document.getElementById("mnt-vista-collega").value.trim();
    const risultato = document.getElementById("mnt-vista-pubblica-result");
    if (!etichetta) { alert("Scegli prima un'etichetta."); return; }
    const filtrati = players.filter(p => (p.etichette || []).includes(etichetta));
    if (!filtrati.length) {
      risultato.innerHTML = `<div class="import-result import-result-warn">Nessun giocatore ha l'etichetta "${esc(etichetta)}".</div>`;
      return;
    }
    const blob = new Blob([JSON.stringify({ players: filtrati }, null, 2)], { type: "application/json" });
    const url = URL.createObjectURL(blob);
    const a = document.createElement("a");
    const slug = s => (s || "").toLowerCase().replace(/[^a-z0-9]+/g, "-").replace(/(^-|-$)/g, "");
    a.href = url;
    a.download = `vista-pubblica-${slug(etichetta)}${collega ? "-" + slug(collega) : ""}.json`;
    document.body.appendChild(a);
    a.click();
    a.remove();
    URL.revokeObjectURL(url);
    risultato.innerHTML = `<div class="import-result">Fatto: ${filtrati.length} giocatori esportati (${esc(etichetta)}). Carica questo file nell'account Dropbox dedicato del collega${collega ? " (" + esc(collega) + ")" : ""}, rinominandolo esattamente <span class="mono">vista-pubblica.json</span>, poi dagli il file <span class="mono">scout-viewer.html</span> e le credenziali di quell'account.</div>`;
  };

// Calcola il prossimo weekend (venerdì-domenica) a partire da oggi: se
// oggi è già venerdì/sabato/domenica usa il weekend in corso, altrimenti
// il venerdì successivo. Stessa logica di date "in locale" usata altrove
// nell'app (mai toISOString, vedi sommaGiorniISO) per non rischiare lo
// stesso bug di un giorno visto nella sincronizzazione Google Calendar.
function calcolaWeekendProssimo() {
  const oggi = dataOggiLocale();
  const [y, m, d] = oggi.split("-").map(Number);
  const dow = new Date(y, m - 1, d).getDay(); // 0=Dom..6=Sab
  let giorniAVenerdi;
  if (dow === 5) giorniAVenerdi = 0;
  else if (dow === 6) giorniAVenerdi = -1;
  else if (dow === 0) giorniAVenerdi = -2;
  else giorniAVenerdi = 5 - dow;
  const venerdi = sommaGiorniISO(oggi, giorniAVenerdi);
  const domenica = sommaGiorniISO(venerdi, 2);
  return { da: venerdi, a: domenica };
}

async function cercaPartiteWeekend(content, da, a) {
  if (!weekendWorkerUrl) { alert("Prima inserisci l'indirizzo del Worker Cloudflare qui sotto."); return; }
  weekendRicerca = { inCorso: true, errore: null, diagnostica: null, risultati: null, da, a };
  renderCalendario(content);
  try {
    const risposta = await fetch(`${weekendWorkerUrl.replace(/\/$/, "")}/?from=${da}&to=${a}`);
    if (!risposta.ok) throw new Error(`Il Worker ha risposto con errore HTTP ${risposta.status}`);
    const dati = await risposta.json();
    const risultati = (dati.partite || []).map(partita => {
      const infoCompetizione = COMPETIZIONI_MATCHCENTER.find(c => c.nome === partita.competizione);
      const categoria = infoCompetizione ? infoCompetizione.categoria : (partita.categoria || null);
      const giocatoriCasa = trovaGiocatoriPerSquadraECategoria(partita.casa, categoria);
      const giocatoriOspite = trovaGiocatoriPerSquadraECategoria(partita.ospite, categoria);
      return { ...partita, giocatoriCasa, giocatoriOspite };
    });
    weekendRicerca = { inCorso: false, errore: null, diagnostica: dati.diagnostica || null, risultati, da, a };
  } catch (e) {
    console.error(e);
    weekendRicerca = { inCorso: false, errore: e.message, diagnostica: null, risultati: null, da, a };
  }
  renderCalendario(content);
}

      renderCalendario(content);

    weekendRicerca = { inCorso: false, errore: null, diagnostica: null, risultati: null, da: null, a: null };

      btn.onclick = () => {
        const p = weekendRicerca.risultati.filter(r => r.giocatoriCasa.length || r.giocatoriOspite.length)[Number(btn.dataset.weekendAggiungi)];

        calEventoInModifica = null;

  content.innerHTML = `

            </select>

          <label>Avversario / luogo

          <label style="display:flex; align-items:center; gap:8px; flex-direction:row;">

    const categoria = document.getElementById("cal-categoria").value;

    let eventoSalvato;
    if (ev) {

    renderCalendario(content);
    pushEventoAGoogleSeConnesso(eventoSalvato);
  };

    document.getElementById("btn-annulla-modifica-evento").onclick = () => {
      calEventoInModifica = null;
      renderCalendario(content);

      const evento = eventi.find(e => e.id === btn.dataset.eliminaEvento);
      eventi = eventi.filter(e => e.id !== btn.dataset.eliminaEvento);

      if (evento && evento.googleEventId) eliminaEventoDaGoogleSeConnesso(evento.googleEventId);
    };
  });
  content.querySelectorAll("[data-rimuovi-giocatore-evento]").forEach(btn => {
    btn.onclick = (ev) => {
      ev.stopPropagation();
      const eventoId = btn.dataset.eventoId;
      const giocatoreId = btn.dataset.rimuoviGiocatoreEvento;
      const evento = eventi.find(e => e.id === eventoId);
      if (evento) evento.giocatoriIds = (evento.giocatoriIds || []).filter(id => id !== giocatoreId);
      savePlayers();
      renderCalendario(content);
    };
  });
  content.querySelectorAll(".cal-apri-giocatore").forEach(el => {
    el.onclick = () => apriDettaglio(el.dataset.playerId);
  });
  content.querySelectorAll(".cal-add-giocatore-input").forEach(input => {
    input.addEventListener("change", () => {
      const eventoId = input.dataset.eventoId;
      const testo = input.value.trim().toLowerCase();
      const match = players.find(p => `${p.cognome} ${p.nome}`.toLowerCase() === testo);
      if (match) {
        const evento = eventi.find(e => e.id === eventoId);
        if (evento) {
          evento.giocatoriIds = evento.giocatoriIds || [];
          if (!evento.giocatoriIds.includes(match.id)) evento.giocatoriIds.push(match.id);
        }
        savePlayers();
        renderCalendario(content);
      }
      input.value = "";
    });
  });
  content.querySelectorAll(".cal-suggerito-giocatore").forEach(chip => {
    chip.onclick = () => {
      const eventoId = chip.dataset.eventoId;
      const giocatoreId = chip.dataset.playerId;
      const evento = eventi.find(e => e.id === eventoId);
      if (evento) {
        evento.giocatoriIds = evento.giocatoriIds || [];
        if (!evento.giocatoriIds.includes(giocatoreId)) evento.giocatoriIds.push(giocatoreId);
      }
      savePlayers();
      renderCalendario(content);
    };
  });
  wireRicercaWeekendHTML(content);
}

// Parole generiche che non identificano il club (prefissi societari, sigle
// federative) — vengono tolte prima di confrontare i nomi squadra tra il
// campo "luogo" di un evento e il campo "squadra" dei giocatori, perché i
// due posti scrivono gli stessi club in modo diverso ("BSC Young Boys" vs
// "Young Boys U21", "FC Basel 1893 U-21" vs "fc Basel u21", ecc.).
const SQUADRA_STOP_WORDS = new Set(["fc", "sc", "bsc", "ac", "cs", "fco", "club", "calcio", "football", "fca", "fcs", "team"]);

// Scompone un nome squadra in un "nucleo" (le parole che identificano il
// club, es. "lugano", "young boys", "st gallen") e, se presente, la
// categoria d'età come solo numero (es. "21" per U-21 o M-21, "15" per
// U15/U-15) — la lettera U/M viene ignorata perché indica lo stesso livello
// di categoria in tedesco/francese, cambia solo la lingua dell'etichetta.
function analizzaNomeSquadra(raw) {
  let t = String(raw || "").toLowerCase().normalize("NFD").replace(/[̀-ͯ]/g, "");
  t = t.replace(/[-–—]/g, " ");
  t = t.replace(/[^\p{L}\p{N}\s]/gu, " ");
  let categoria = null;
  t = t.replace(/\b[um]\s*(\d{2})\b/g, (m, num) => { categoria = num; return " "; });
  t = t.replace(/\b(18|19|20)\d{2}\b/g, " ");
  const parole = t.split(/\s+/).map(w => w.trim()).filter(Boolean).filter(w => !SQUADRA_STOP_WORDS.has(w));
  return { core: parole.join(" "), categoria };
}

// Due "nuclei" squadra sono considerati la stessa squadra se l'insieme di
// parole più corto è interamente contenuto in quello più lungo (gestisce
// "young boys" dentro "bsc young boys", "st gallen" dentro "fc st gallen
// 1879", ecc.) senza richiedere una corrispondenza esatta della stringa.
// ECCEZIONE: se il nucleo più corto è di UNA sola parola, deve
// corrispondere esattamente (stessa unica parola su entrambi i lati),
// altrimenti un club dal nome breve verrebbe scambiato per un club
// diverso che contiene per caso la stessa parola dentro un nome più
// lungo — es. "FC Zürich" (nucleo "zürich") non deve risultare coerente
// con "Grasshopper Club Zürich" (nucleo "grasshopper zürich") solo
// perché condividono la città nel nome societario.
function squadreCoerenti(coreA, coreB) {
  if (!coreA || !coreB) return false;
  if (coreA === coreB) return true;
  const wa = new Set(coreA.split(" ").filter(Boolean));
  const wb = new Set(coreB.split(" ").filter(Boolean));
  const [piccolo, grande] = wa.size <= wb.size ? [wa, wb] : [wb, wa];
  if (!piccolo.size) return false;
  if (piccolo.size === 1) return coreA === coreB;
  return [...piccolo].every(w => grande.has(w));
}

// Cerca tra tutti i giocatori quelli la cui squadra (societè) corrisponde al
// testo passato (tipicamente una delle due metà del campo "luogo" di un
// evento), incrociando anche le Categorie assegnate al giocatore: se il
// testo indica una categoria (U21, M-21, ecc.) vengono presi solo i
// giocatori che hanno quella categoria tra le proprie; se non la indica,
// vengono presi tutti i giocatori del club a prescindere dalla categoria —
// così un giocatore con più categorie (es. sia U19 che U21) compare in
// entrambi i casi. Un "core" troppo corto (meno di 3 caratteri, es. testo
// vuoto o solo sigle) viene considerato non riconosciuto per evitare falsi
// positivi.
function trovaGiocatoriPerSquadra(testoRicerca) {
  const ric = analizzaNomeSquadra(testoRicerca);
  if (!ric.core || ric.core.length < 3) return { riconosciuta: false, giocatori: [] };
  const categoriaRichiesta = ric.categoria ? CATEGORIA_NUMERO_A_LABEL[ric.categoria] : null;
  // "riconosciuta" indica che il testo corrisponde a un club presente nel
  // database (a prescindere dalla categoria): serve a distinguere un vero
  // nome di squadra senza giocatori scoutati di quella categoria (mostra
  // comunque "Nessun giocatore trovato") da un testo qualunque che non è
  // affatto un nome di club, es. una nota personale (non mostra la colonna).
  let clubTrovato = false;
  const trovati = players.filter(p => {
    if (!p.squadra) return false;
    const ps = analizzaNomeSquadra(p.squadra);
    if (!ps.core || !squadreCoerenti(ric.core, ps.core)) return false;
    clubTrovato = true;
    if (!categoriaRichiesta) return true;
    return (p.categorie || []).includes(categoriaRichiesta);
  });
  trovati.sort((a, b) => `${a.cognome} ${a.nome}`.localeCompare(`${b.cognome} ${b.nome}`, "it"));
  return { riconosciuta: clubTrovato, giocatori: trovati };
}

// Variante usata dalla ricerca "Cerca partite del weekend": qui la
// categoria da applicare arriva dalla COMPETIZIONE trovata sul
// matchcenter (es. "U-15"), non da un eventuale numero scritto nel nome
// della squadra — perché lì il nome è sempre e solo il club (es. "FC
// Lugano" gioca sia in Super League sia con l'U15/U19/U21: è la
// competizione a dire quale). Se categoria è null (campionati assoluti)
// vengono presi i giocatori senza categorie giovanili assegnate o
// esplicitamente "Prima Squadra", per non riempire la partita di Super
// League con i ragazzini U15 dello stesso club.
function trovaGiocatoriPerSquadraECategoria(nomeSquadra, categoria) {
  const ric = analizzaNomeSquadra(nomeSquadra);
  if (!ric.core || ric.core.length < 3) return [];
  const trovati = players.filter(p => {
    if (!p.squadra) return false;
    const ps = analizzaNomeSquadra(p.squadra);
    if (!ps.core || !squadreCoerenti(ric.core, ps.core)) return false;
    const cats = p.categorie || [];
    if (categoria) return cats.includes(categoria);
    return cats.length === 0 || cats.includes("Prima Squadra");
  });
  trovati.sort((a, b) => `${a.cognome} ${a.nome}`.localeCompare(`${b.cognome} ${b.nome}`, "it"));
  return trovati;
}

// Calcola le colonne "probabili giocatori" da mostrare sotto un evento,
// per QUALSIASI tipo di evento (Partita, Raduno, Torneo, Allenamento,
// Altro) — non solo le Partite: nei dati reali capita spesso di scrivere
// un confronto tra due squadre nel campo luogo anche su eventi di tipo
// "Altro" (es. "Lugano u21 - Luzern U21"). Se il campo luogo è nel formato
// "Squadra A - Squadra B" le due colonne vengono mostrate sempre, anche
// quando una squadra non viene riconosciuta nel database (mostrando
// "Nessun giocatore trovato"), perché il trattino nel titolo indica comunque
// l'intenzione di indicare due squadre. Se invece il luogo è un testo unico
// (nessun trattino), la colonna compare solo se il testo corrisponde
// davvero a un club presente nel database, per non riempire di colonne
// vuote eventi che non c'entrano con nessuna squadra (es. note personali
// come "Lavoro tutto il giorno"). I giocatori già presenti tra i
// "convocati" dell'evento non vengono ripetuti qui sotto.
function calcolaColonneProbabiliGiocatori(e) {
  const luogo = (e.luogo || "").trim();
  if (!luogo) return [];
  const giaConvocatiIds = new Set(e.giocatoriIds || []);
  const parti = luogo.split(/\s+[-–—]\s+/).map(s => s.trim()).filter(Boolean);
  const colonne = [];
  if (parti.length === 2) {
    parti.forEach(parte => {
      const ris = trovaGiocatoriPerSquadra(parte);
      colonne.push({ label: parte, giocatori: ris.giocatori.filter(p => !giaConvocatiIds.has(p.id)) });
    });
  } else {
    const ris = trovaGiocatoriPerSquadra(luogo);
    if (ris.riconosciuta) {
      colonne.push({ label: luogo, giocatori: ris.giocatori.filter(p => !giaConvocatiIds.has(p.id)) });
    }
  }
  return colonne;
}

// Righe della griglia tattica per il modulo del raduno (senza i reparti
// personalizzati, che vengono mostrati a parte in una riga finale).
function grigliaRaduno(raduno) {
  return REPARTI_GRID_PER_MODULO[raduno.modulo] || REPARTI_GRID_PER_MODULO[MODULI_RADUNO[0]];
}
// Elenco piatto di tutti gli slot fissi del modulo (usato per validazioni e migrazioni).
function slotFissiRaduno(raduno) {
  return grigliaRaduno(raduno).flat();
}

function repartiRaduno(raduno) {
  const base = slotFissiRaduno(raduno);
  const extra = (raduno.repartiPersonalizzati || []).map(nome => ({ id: nome, chiave: nome, nome, personalizzato: true }));
  return [...base, ...extra];
}

// Legenda colori per lo stato dei giocatori in rosa (stile Kaderliste). Le
// chiavi/colori sono quelli confermati; altre categorie potranno essere
// aggiunte qui in futuro senza toccare il resto del codice.
const RADUNO_LEGENDA = [
  { chiave: "kadera", nome: "Kader A", colore: "#d6389e", testo: "#fff" },
  { chiave: "kaderspieler", nome: "Kaderspieler", colore: "#b3382c", testo: "#fff" },
  { chiave: "pikett", nome: "Pikett-Spieler", colore: "#d4a017", testo: "#1a1a1a" },
  { chiave: "nachnominiert", nome: "Nachnominiert", colore: "#c8701f", testo: "#fff" },
  { chiave: "verletzt", nome: "Verletzt", colore: "#8a8a8a", testo: "#fff" },
  { chiave: "sonstiges", nome: "Sonstiges", colore: "#4a4a4a", testo: "#fff" }
];
function statoLegenda(chiave) {
  return RADUNO_LEGENDA.find(s => s.chiave === chiave) || null;
}
// Cicla nessuno -> kaderspieler -> pikett -> ... -> sonstiges -> nessuno,
// usato dal pallino colorato sul chip del giocatore.
function prossimoStatoLegenda(statoAttuale) {
  if (!statoAttuale) return RADUNO_LEGENDA[0].chiave;
  const idx = RADUNO_LEGENDA.findIndex(s => s.chiave === statoAttuale);
  if (idx === -1 || idx === RADUNO_LEGENDA.length - 1) return null;
  return RADUNO_LEGENDA[idx + 1].chiave;
}

// Se un giocatore era assegnato a uno slot che non fa più parte della
// griglia fissa del modulo attuale (es. cambio modulo, o vecchi dati salvati
// prima di questa griglia con solo la chiave bare tipo "AVE" invece di
// "AVE_dx"), proviamo prima a "recuperarlo" distribuendolo sugli slot dello
// stesso reparto (stessa chiave) nell'ordine in cui compare in rosa — utile
// soprattutto per i dati importati dall'Excel dove più giocatori erano
// raggruppati sotto un'unica chiave. Se non troviamo nessuno slot con quella
// chiave lo promuoviamo a reparto personalizzato così resta visibile invece
// di sparire silenziosamente dalla schermata. Condivisa tra il form di
// modifica scheda e il selettore rapido di modulo nella vista dettaglio.
function migraRepartiOrfani(r) {
  const slots = slotFissiRaduno(r);
  const idFissi = new Set(slots.map(x => x.id));
  const personalizzati = new Set(r.repartiPersonalizzati || []);
  const nonMappate = {};
  (r.rosa || []).forEach(voce => {
    if (idFissi.has(voce.reparto) || personalizzati.has(voce.reparto)) return;
    nonMappate[voce.reparto] = nonMappate[voce.reparto] || [];
    nonMappate[voce.reparto].push(voce);
  });
  Object.keys(nonMappate).forEach(vecchioValore => {
    const voci = nonMappate[vecchioValore];
    const slotCompatibili = slots.filter(s => s.chiave === vecchioValore);
    if (slotCompatibili.length) {
      voci.forEach((voce, i) => { voce.reparto = slotCompatibili[i % slotCompatibili.length].id; });
    } else {
      r.repartiPersonalizzati = r.repartiPersonalizzati || [];
      if (!r.repartiPersonalizzati.includes(vecchioValore)) r.repartiPersonalizzati.push(vecchioValore);
    }
  });
}

// Sposta (o riordina) un giocatore nella rosa: rimuove la voce esistente e
// la reinserisce nel reparto di destinazione, subito prima di
// primaGiocatoreDopoId se indicato (altrimenti in fondo, cioè in fondo a
// quel reparto perché il filtro per reparto preserva l'ordine relativo).
function spostaGiocatoreInRosa(r, giocatoreId, repartoDestinazione, primaGiocatoreDopoId) {
  r.rosa = r.rosa || [];
  const idx = r.rosa.findIndex(x => x.giocatoreId === giocatoreId);
  if (idx === -1) return;
  const [voce] = r.rosa.splice(idx, 1);
  voce.reparto = repartoDestinazione;
  if (primaGiocatoreDopoId && primaGiocatoreDopoId !== giocatoreId) {
    const insertIdx = r.rosa.findIndex(x => x.giocatoreId === primaGiocatoreDopoId);
    if (insertIdx === -1) r.rosa.push(voce);
    else r.rosa.splice(insertIdx, 0, voce);
  } else {
    r.rosa.push(voce);
  }
}

function distanzaTraTouch(t0, t1) {
  const dx = t0.clientX - t1.clientX;
  const dy = t0.clientY - t1.clientY;
  return Math.sqrt(dx * dx + dy * dy);
}

// futuro) ma un'abbreviazione ragionevole basata sul nome squadra che già
// abbiamo in banca dati. Alcune coincidono con quelle federali note.
const SQUADRA_SIGLE_NOTE = {
  "fc lausanne-sport": "LS", "bsc young boys": "YB", "grasshopper club zürich": "GC",
  "fc basel 1893": "BS", "fc st. gallen 1879": "SG", "fc zürich": "ZH", "fc luzern": "LZ",
  "fc aarau": "AA", "fc winterthur": "WI", "fc sion": "SI", "servette fc": "SFC",
  "neuchâtel xamax fcs": "NX", "ac bellinzona": "ACB", "fc thun": "THU",
  "team aff-ffv": "AFF", "fc black stars": "BLS", "fc bauma": "BAU"
};
function siglaSquadra(nomeSquadra) {
  if (!nomeSquadra) return "";
  const norm = nomeSquadra.trim().toLowerCase();
  if (SQUADRA_SIGLE_NOTE[norm]) return SQUADRA_SIGLE_NOTE[norm];
  const parole = nomeSquadra.replace(/^(fc|bsc|ac|as|sc|team|1\.)\s+/i, "").split(/[\s-]+/).filter(Boolean);
  if (parole.length >= 2) return (parole[0][0] + parole[1][0]).toUpperCase();
  return nomeSquadra.replace(/[^a-zA-ZÀ-ÿ]/g, "").slice(0, 3).toUpperCase();
}

// Aggiunge un giocatore al reparto scelto. Se il giocatore è già in rosa in
// un altro reparto (es. lo cerchi per assegnarlo a un ruolo diverso da
// quello attuale), lo spostiamo lì invece di ignorare la richiesta: non deve
// mai comparire due volte nello stesso raduno.
function aggiungiGiocatoreARaduno(r, giocatoreId, reparto) {
  r.rosa = r.rosa || [];
  const esistente = r.rosa.find(x => x.giocatoreId === giocatoreId);
  if (esistente) {
    esistente.reparto = reparto;
  } else {
    r.rosa.push({ giocatoreId, reparto });
  }
  savePlayers();
}

// Giocatore attualmente trascinato (drag & drop tra/dentro i reparti).
let radunoDragGiocatoreId = null;

// Elenco dei giocatori da proporre nel campo "+ Aggiungi giocatore" di un
// raduno: se il raduno ha un'annata impostata (anno di nascita, es. "2011")
// mostriamo solo i giocatori nati in quell'anno invece di tutto l'Elenco —
// altrimenti diventa impossibile trovare il giocatore giusto in mezzo a
// centinaia di schede di annate diverse. L'elenco è ordinato per ruolo
// primario e poi alfabeticamente, per raggrupparli visivamente.
function giocatoriSuggeritiRaduno(r) {
  let elenco = players;
  if (r.annata) {
    // In un raduno TYT/Kader di una certa annata (es. 2011) capita, in casi
    // eccezionali, di convocare anche qualche giocatore nato l'anno dopo
    // (2012) perché già pronto per giocare "in su": li includiamo entrambi,
    // altrimenti bisognerebbe scorrere l'intera banca dati per trovarli.
    const annataBase = parseInt(r.annata, 10);
    const annateValide = new Set([String(annataBase), String(annataBase + 1)]);
    elenco = elenco.filter(p => p.dataNascita && annateValide.has(String(new Date(p.dataNascita).getFullYear())));
  }
  return elenco.slice().sort((a, b) =>
    a.cognome.localeCompare(b.cognome) || a.nome.localeCompare(b.nome)
  );
}

function renderRadunoDettaglio(content) {
  const r = raduni.find(x => x.id === radunoCorrenteId);
  if (!r) { raduniSezione = "lista"; render(); return; }
