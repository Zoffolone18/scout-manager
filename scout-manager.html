<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Scout Manager — Schede Giocatori</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<style>
@import url('https://fonts.googleapis.com/css2?family=Bebas+Neue&family=IBM+Plex+Sans:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500&display=swap');

:root{
  --bg: #0d1712;
  --bg-pitch: #0f1c15;
  --surface: #16241c;
  --surface-2: #1c2f24;
  --line: #2b4536;
  --line-soft: #223a2c;
  --chalk: #f2efe6;
  --muted: #8fa396;
  --gold: #e0a739;
  --gold-dim: #a6802f;
  --good: #6fbe8c;
  --mid: #e0a739;
  --low: #c1554a;
  --info: #6fb3d9;
  --radius: 10px;
  --font-display: 'Bebas Neue', sans-serif;
  --font-body: 'IBM Plex Sans', sans-serif;
  --font-mono: 'IBM Plex Mono', monospace;
}

input[type="checkbox"]{
  width: 18px;
  height: 18px;
  accent-color: var(--gold);
}

*{ box-sizing: border-box; }

html, body{
  margin: 0;
  padding: 0;
  background: var(--bg);
  color: var(--chalk);
  font-family: var(--font-body);
  min-height: 100%;
}

body{
  background-image:
    radial-gradient(circle at 50% 0%, rgba(224,167,57,0.05), transparent 55%),
    repeating-linear-gradient(0deg, rgba(242,239,230,0.015) 0px, rgba(242,239,230,0.015) 1px, transparent 1px, transparent 64px);
}

.app-shell{
  max-width: 1180px;
  margin: 0 auto;
  padding: 28px 24px 80px;
}

/* ---------- Header ---------- */
.app-header{
  display: flex;
  align-items: flex-end;
  justify-content: space-between;
  gap: 16px;
  border-bottom: 2px solid var(--line);
  padding-bottom: 16px;
  margin-bottom: 8px;
  flex-wrap: wrap;
}
.app-header-main{ display: flex; align-items: center; gap: 14px; }
.app-logo{ flex: 0 0 auto; opacity: 0.92; cursor: pointer; position: relative; }
.app-logo:hover{ opacity: 1; }
.app-logo:hover::after{
  content: "Cambia logo";
  position: absolute;
  top: 100%; left: 0;
  font-family: var(--font-mono);
  font-size: 9.5px;
  color: var(--gold);
  white-space: nowrap;
  margin-top: 2px;
}
.logo-custom-img{ max-width: 48px; max-height: 52px; border-radius: 4px; display: block; }
.btn-rimuovi-logo{
  background: none; border: none; color: var(--muted);
  font-family: var(--font-mono); font-size: 9.5px;
  cursor: pointer; text-decoration: underline;
  margin-left: 4px; padding: 0;
  display: none;
}

.app-title{
  font-family: var(--font-display);
  letter-spacing: 0.04em;
  font-size: 42px;
  line-height: 1;
  color: var(--chalk);
  margin: 0;
}
.app-title .accent{ color: var(--gold); }

.app-subtitle{
  font-size: 13px;
  color: var(--muted);
  margin-top: 4px;
  font-family: var(--font-mono);
}

.header-actions{
  display: flex;
  gap: 8px;
  align-items: center;
}

.file-label{
  display: inline-flex;
  align-items: center;
  gap: 6px;
  cursor: pointer;
}
.file-label input[type="file"]{ display: none; }

/* ---------- Foto giocatore ---------- */
.foto-upload{ display: flex; align-items: center; gap: 14px; margin-bottom: 16px; }
.foto-preview-wrap{
  width: 64px; height: 64px;
  border-radius: 50%;
  border: 2px solid var(--gold-dim);
  overflow: hidden;
  display: flex; align-items: center; justify-content: center;
  background: var(--bg-pitch);
  color: var(--muted);
  flex: 0 0 auto;
}
.foto-preview{ width: 100%; height: 100%; object-fit: cover; }
.foto-preview.foto-vuota{ display: none; }
.foto-upload-actions{ display: flex; gap: 8px; align-items: center; }

.card-header-row{ display: flex; align-items: center; gap: 10px; padding-right: 86px; }
.card-header-text{ flex: 1; min-width: 0; }
.card-photo{
  width: 40px; height: 40px;
  border-radius: 50%;
  border: 1px solid var(--gold-dim);
  overflow: hidden;
  display: flex; align-items: center; justify-content: center;
  color: var(--muted);
  flex: 0 0 auto;
  background: var(--bg-pitch);
}
.card-photo img{ width: 100%; height: 100%; object-fit: cover; }
.card-header-row .card-name{ padding-right: 0; }

.modal-photo{
  width: 64px; height: 64px;
  border-radius: 50%;
  border: 2px solid var(--gold-dim);
  overflow: hidden;
  display: flex; align-items: center; justify-content: center;
  color: var(--muted);
  flex: 0 0 auto;
  background: var(--bg-pitch);
}
.modal-photo img{ width: 100%; height: 100%; object-fit: cover; }
.modal-photo-clickable{ cursor: zoom-in; transition: border-color 0.15s, transform 0.15s; }
.modal-photo-clickable:hover{ border-color: var(--gold); transform: scale(1.05); }
.modal-header .card-badge.large{
  position: absolute;
  top: 56px;
  right: 26px;
  margin: 0;
}

.lightbox-overlay{
  position: fixed;
  inset: 0;
  background: rgba(6,14,10,0.9);
  display: flex;
  align-items: center;
  justify-content: center;
  z-index: 200;
  cursor: zoom-out;
  padding: 40px;
}
.lightbox-overlay img{
  max-width: 100%;
  max-height: 100%;
  border-radius: 8px;
  box-shadow: 0 10px 40px rgba(0,0,0,0.6);
}
.lightbox-close{
  position: fixed;
  top: 18px; right: 22px;
  background: none;
  border: 1px solid var(--line);
  color: var(--chalk);
  font-size: 18px;
  width: 36px; height: 36px;
  border-radius: 50%;
  cursor: pointer;
}
.lightbox-close:hover{ border-color: var(--gold); color: var(--gold); }

.trasferimento-row{ grid-template-columns: 130px 1fr 1fr 1fr 32px; }
.filtri-dropdown-row{ display: flex; gap: 10px; flex-wrap: wrap; margin-bottom: 10px; }
.filtro-dropdown{
  border: 1px solid var(--line);
  border-radius: 8px;
  background: var(--surface);
  padding: 0;
}
.filtro-dropdown summary{
  cursor: pointer;
  list-style: none;
  font-family: var(--font-mono);
  font-size: 12px;
  color: var(--chalk);
  padding: 8px 14px;
  user-select: none;
}
.filtro-dropdown summary::-webkit-details-marker{ display: none; }
.filtro-dropdown summary::before{ content: "▾ "; color: var(--gold); }
.filtro-dropdown[open] summary::before{ content: "▴ "; }
.filtro-dropdown .chips-group{
  padding: 4px 12px 12px;
  border-top: 1px dashed var(--line);
  max-height: 220px;
  overflow-y: auto;
}
.filtri-chips-row{
  display: flex;
  align-items: center;
  gap: 10px;
  flex-wrap: wrap;
  margin-bottom: 10px;
}
.chips-label{
  font-family: var(--font-mono);
  font-size: 11.5px;
  color: var(--muted);
  flex: 0 0 auto;
}
.chips-group{ display: flex; gap: 6px; flex-wrap: wrap; }
.chips-empty{ font-size: 12px; }
.chip{
  font-family: var(--font-mono);
  font-size: 11.5px;
  padding: 5px 11px;
  border-radius: 20px;
  border: 1px solid var(--line);
  background: var(--surface);
  color: var(--muted);
  cursor: pointer;
  transition: border-color .15s ease, color .15s ease, background .15s ease;
}
.chip:hover{ border-color: var(--gold-dim); color: var(--chalk); }
.chip.chip-active{
  background: var(--gold);
  border-color: var(--gold);
  color: #1a1408;
  font-weight: 600;
}
.card-etichette{ margin-top: 8px; display: flex; gap: 5px; flex-wrap: wrap; }
.etichetta-badge{
  font-family: var(--font-mono);
  font-size: 10.5px;
  padding: 3px 8px;
  border-radius: 20px;
  background: var(--surface-2);
  color: var(--gold);
  border: 1px solid var(--gold-dim);
}
.scout-tag{
  font-family: var(--font-mono);
  font-size: 11px;
  padding: 1px 8px;
  border-radius: 20px;
  border: 1px dashed var(--line);
  color: var(--muted);
}
.etichetta-add-row{ display: flex; gap: 8px; margin-top: 10px; }
.etichetta-add-row input{
  flex: 1 1 240px;
  font-family: var(--font-body);
  background: var(--bg-pitch);
  border: 1px solid var(--line);
  color: var(--chalk);
  padding: 8px 10px;
  border-radius: 6px;
  font-size: 13px;
}

/* ---------- File status bar ---------- */
.file-status-bar{
  display: flex;
  align-items: center;
  gap: 10px;
  flex-wrap: wrap;
  background: var(--surface);
  border: 1px solid var(--line);
  border-radius: var(--radius);
  padding: 10px 14px;
  margin-top: 14px;
  margin-bottom: 6px;
  font-size: 13px;
}
.file-status-bar.fs-ok{ border-color: rgba(111,190,140,0.4); }
.file-status-bar.fs-warn{ border-color: rgba(224,167,57,0.5); }
.file-status-bar.fs-none{ border-color: rgba(193,85,74,0.4); }
.fs-dot{ font-size: 14px; }
.fs-text{ color: var(--chalk); flex: 1 1 260px; }
.fs-text strong{ font-family: var(--font-mono); color: var(--gold); }
.fs-actions{ display: flex; gap: 8px; margin-left: auto; flex-wrap: wrap; }
.btn-sm{ padding: 6px 12px; font-size: 12.5px; }

.dropbox-setup{ display: flex; flex-direction: column; gap: 10px; width: 100%; }
.dropbox-step{ display: flex; gap: 8px; flex-wrap: wrap; }
.dropbox-step input{
  flex: 1 1 240px;
  font-family: var(--font-mono);
  background: var(--bg-pitch);
  border: 1px solid var(--line);
  color: var(--chalk);
  padding: 8px 10px;
  border-radius: 6px;
  font-size: 13px;
}
.dropbox-help{ font-size: 12px; color: var(--muted); }
.dropbox-help summary{ cursor: pointer; color: var(--gold); margin-bottom: 6px; }
.dropbox-help ol{ margin: 6px 0 0 18px; padding: 0; }
.dropbox-help li{ margin-bottom: 5px; }

/* ---------- Nav ---------- */
.nav-tabs{
  display: flex;
  gap: 4px;
  margin: 22px 0 24px;
  border-bottom: 1px dashed var(--line);
}

.navtab{
  font-family: var(--font-display);
  letter-spacing: 0.06em;
  font-size: 18px;
  background: none;
  border: none;
  color: var(--muted);
  padding: 10px 18px;
  cursor: pointer;
  border-bottom: 3px solid transparent;
  transform: translateY(1px);
}
.navtab:hover{ color: var(--chalk); }
.navtab.active{
  color: var(--chalk);
  border-bottom: 3px solid var(--gold);
}

/* ---------- Buttons ---------- */
.btn{
  font-family: var(--font-body);
  font-weight: 600;
  font-size: 13.5px;
  padding: 9px 16px;
  border-radius: 7px;
  border: 1px solid var(--line);
  background: var(--surface-2);
  color: var(--chalk);
  cursor: pointer;
  transition: border-color .15s ease, background .15s ease;
}
.btn:hover{ border-color: var(--gold-dim); }
.btn-primary{
  background: var(--gold);
  color: #1a1408;
  border-color: var(--gold);
}
.btn-primary:hover{ background: #eab654; }
.btn-ghost{
  background: transparent;
}
.btn-danger{
  background: transparent;
  border-color: var(--low);
  color: var(--low);
}
.btn-danger:hover{ background: rgba(193,85,74,0.12); }

/* ---------- Filtri ---------- */
.filtri-bar{
  display: flex;
  flex-wrap: wrap;
  gap: 8px;
  background: var(--surface);
  border: 1px solid var(--line);
  border-radius: var(--radius);
  padding: 14px;
  margin-bottom: 10px;
}
.f-input{
  font-family: var(--font-body);
  background: var(--bg-pitch);
  border: 1px solid var(--line);
  color: var(--chalk);
  padding: 8px 10px;
  border-radius: 6px;
  font-size: 13.5px;
}
.f-testo{ flex: 1 1 220px; min-width: 180px; }
.f-small{ width: 100px; flex: 0 0 100px; }

.risultati-meta{
  font-family: var(--font-mono);
  font-size: 12px;
  color: var(--muted);
  margin: 4px 2px 14px;
}

.vista-toggle-row{ display: flex; gap: 6px; margin-bottom: 12px; align-items: center; justify-content: space-between; flex-wrap: wrap; }
.vista-toggle-btn{
  font-family: var(--font-mono);
  font-size: 12px;
  padding: 6px 14px;
  border-radius: 20px;
  border: 1px solid var(--line);
  background: var(--surface);
  color: var(--muted);
  cursor: pointer;
}
.vista-toggle-btn:hover{ border-color: var(--gold-dim); color: var(--chalk); }
.vista-toggle-btn.vista-attiva{
  background: var(--gold);
  border-color: var(--gold);
  color: #1a1408;
  font-weight: 600;
}
.risultati-tabella-wrap{ display: block; overflow-x: auto; }
.tabella-giocatori{
  width: 100%;
  border-collapse: collapse;
  font-size: 13px;
}
.tabella-giocatori th{
  text-align: left;
  font-family: var(--font-mono);
  font-size: 11px;
  text-transform: uppercase;
  letter-spacing: 0.04em;
  color: var(--muted);
  padding: 8px 10px;
  border-bottom: 2px solid var(--line);
  white-space: nowrap;
}
.tabella-giocatori td{
  padding: 9px 10px;
  border-bottom: 1px solid var(--line-soft);
  vertical-align: top;
}
.tabella-giocatori tr[data-id]{ cursor: pointer; }
.tabella-giocatori tr[data-id]:hover td{ background: var(--surface-2); }
.tabella-giocatori .etichetta-badge{ margin: 2px 3px 2px 0; display: inline-block; }
.tabella-foto{
  width: 36px; height: 36px;
  border-radius: 50%;
  overflow: hidden;
  border: 1px solid var(--gold-dim);
  display: flex; align-items: center; justify-content: center;
  color: var(--muted);
  background: var(--bg-pitch);
  cursor: zoom-in;
}
.tabella-foto img{ width: 100%; height: 100%; object-fit: cover; }
.tabella-foto-placeholder{ width: 65%; height: 65%; display: block; }
.foto-ingrandita-box{
  max-width: min(90vw, 560px);
  max-height: 90vh;
  cursor: zoom-out;
}
.foto-ingrandita-box img{
  width: 100%; height: 100%;
  object-fit: contain;
  border-radius: var(--radius);
  border: 1px solid var(--line);
}

/* ---------- Cards ---------- */
.risultati-container{
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(340px, 1fr));
  gap: 14px;
}

.player-card{
  position: relative;
  background: var(--surface);
  border: 1px solid var(--line);
  border-radius: var(--radius);
  padding: 16px 16px 14px;
  cursor: pointer;
  transition: border-color .15s ease, transform .1s ease;
}
.player-card:hover{
  border-color: var(--gold-dim);
  transform: translateY(-1px);
}
.player-card-nazionale-u16{
  border-color: var(--low);
  box-shadow: 0 0 0 1px var(--low), 0 0 16px rgba(193,85,74,0.4);
}
.player-card-nazionale-u16:hover{
  border-color: var(--low);
}
.player-card-lugano-u15{
  border-color: var(--info);
  box-shadow: 0 0 0 1px var(--info), 0 0 16px rgba(111,179,217,0.4);
}
.player-card-lugano-u15:hover{
  border-color: var(--info);
}
.player-card-footuro{
  border-color: var(--chalk);
  box-shadow: 0 0 0 1px var(--chalk), 0 0 16px rgba(242,239,230,0.35);
}
.player-card-footuro:hover{
  border-color: var(--chalk);
}

.card-badge{
  position: absolute;
  top: 12px;
  right: 12px;
  font-family: var(--font-mono);
  font-weight: 600;
  font-size: 13px;
  width: 34px;
  height: 34px;
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  border: 1px dashed var(--line);
}
.card-badge.large{ width: 54px; height: 54px; font-size: 18px; }
.card-radar-mini{
  position: absolute;
  top: 10px;
  right: 48px;
  opacity: 0.95;
}
.radar-chart{ display: block; }
.tabella-badge{
  position: static;
  width: 30px;
  height: 30px;
  font-size: 12px;
  display: inline-flex;
}
.rating-good{ color: var(--good); border-color: var(--good); }
.rating-mid{ color: var(--mid); border-color: var(--mid); }
.rating-low{ color: var(--low); border-color: var(--low); }
.rating-na{ color: var(--muted); }

.card-name{
  font-family: var(--font-display);
  font-size: 22px;
  letter-spacing: 0.02em;
  padding-right: 40px;
}
.card-name-nome{ color: var(--muted); font-family: var(--font-body); font-size: 15px; font-weight: 500; letter-spacing: 0; }

.card-meta{ font-size: 12.5px; color: var(--muted); margin-top: 2px; font-family: var(--font-mono); }
.card-meta-line{ line-height: 1.5; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.card-meta-line.ultima-partita-recente{ color: var(--good); font-weight: 600; }

.card-ruoli{ margin-top: 8px; display: flex; gap: 6px; flex-wrap: wrap; }
.tag{
  font-size: 11px;
  padding: 3px 8px;
  border-radius: 20px;
  border: 1px solid var(--line);
  font-family: var(--font-mono);
}
.tag-primario{ color: var(--chalk); border-color: var(--gold-dim); }
.tag-secondario{ color: var(--muted); }

.card-footer{ margin-top: 10px; font-size: 11.5px; color: var(--muted); font-family: var(--font-mono); }
.card-note{ margin-top: 8px; font-size: 12.5px; color: var(--muted); border-top: 1px dashed var(--line); padding-top: 8px; }

.empty-state{
  grid-column: 1 / -1;
  text-align: center;
  padding: 48px 20px;
  color: var(--muted);
  border: 1px dashed var(--line);
  border-radius: var(--radius);
}
.empty-sub{ font-size: 12.5px; margin-top: 6px; }

/* ---------- Modale ---------- */
.modal-overlay{
  position: fixed; inset: 0;
  background: rgba(5,10,7,0.94);
  display: flex; align-items: flex-start; justify-content: center;
  padding: 40px 16px;
  z-index: 100;
  overflow-y: auto;
}
.modal-box{
  background: var(--surface);
  border: 1px solid var(--line);
  border-radius: var(--radius);
  max-width: 640px;
  width: 100%;
  padding: 26px;
  position: relative;
}
.modal-box-wide{ max-width: 920px; }
.report-campi-grid{
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
  gap: 8px 16px;
  margin-top: 10px;
}
.report-campo-check{ display: flex; align-items: center; gap: 8px; font-size: 13.5px; cursor: pointer; }
.report-campo-check input[type="checkbox"]{ width: 16px; height: 16px; accent-color: var(--gold); }
.report-campo-check.disattivato{ opacity: 0.4; cursor: not-allowed; }
.raduno-reparti-grid{
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
  gap: 12px;
  margin-bottom: 16px;
}
.raduno-reparto-box h3{ display: flex; align-items: center; gap: 8px; }
.raduno-crea-giocatore{ background: rgba(0,0,0,0.03); border-radius: 8px; padding: 8px; margin-top: 6px; }
.raduno-sistema-box{ margin: 4px 0 14px; }
.raduno-sistema-box select{ font-weight: 600; }
.raduno-legenda{ display: flex; flex-wrap: wrap; align-items: center; gap: 12px; margin-bottom: 18px; padding: 8px 10px; background: rgba(0,0,0,0.03); border-radius: 8px; }
.raduno-legenda-voce{ display: flex; align-items: center; gap: 6px; font-size: 12.5px; }
.raduno-legenda-pallino{ width: 12px; height: 12px; border-radius: 50%; display: inline-block; border: 1px solid rgba(0,0,0,0.25); }
.raduno-linea-row{ margin-bottom: 20px; }
.raduno-linea-titolo{ font-family: var(--font-mono); font-size: 12px; text-transform: uppercase; letter-spacing: 0.06em; color: var(--muted); margin-bottom: 8px; }
.raduno-linea-reparti{ display: flex; flex-wrap: wrap; gap: 12px; }
.raduno-linea-reparti .raduno-reparto-box{ flex: 1 1 260px; min-width: 240px; }
/* Righe della griglia tattica fissa (per modulo): restano sempre su un'unica
   fila, come le colonne dell'Excel, con scroll orizzontale come ultima
   risorsa se proprio non entrano. */
.raduno-linea-reparti-fissa{ flex-wrap: nowrap; overflow-x: auto; padding-bottom: 4px; }
.raduno-linea-reparti-fissa .raduno-reparto-box{ flex: 1 1 260px; min-width: 250px; }
/* Righe con un solo reparto (Portiere, 10er Zentral, Stürmer, ecc.): non ha
   senso farle allargare a tutta la riga come le righe con più caselle
   affiancate (terzini/centrali, ecc.) — restano alla stessa larghezza
   "naturale" di una singola casella e vengono centrate. */
.raduno-linea-reparti-singola{ justify-content: center; }
.raduno-linea-reparti-singola .raduno-reparto-box{ flex: 0 1 260px; }

/* Zoom del campo tattico (pulsanti +/− oppure pinch a due dita su
   telefono/tablet, o Ctrl/Cmd+rotellina su desktop): il contenitore
   scrolla, il blocco interno viene scalato mantenendo il layout invariato. */
.raduno-zoom-controls{ display: flex; align-items: center; gap: 8px; margin-bottom: 12px; flex-wrap: wrap; }
.raduno-zoom-livello{ min-width: 44px; text-align: center; font-size: 12.5px; }

<script>
/* ===================== Costanti ===================== */
const RUOLI = [
  "Portiere","Difensore centrale","Terzino destro","Terzino sinistro",
  "Esterno basso destro","Esterno basso sinistro","Mediano","Centrocampista centrale",
  "Mezzala destra","Mezzala sinistra","Trequartista","Esterno alto destro",
  "Esterno alto sinistro","Ala destra","Ala sinistra","Seconda punta","Attaccante"
];

// Raggruppa un ruolo (anche scritto in modo libero, non solo le voci esatte
// di RUOLI) in una delle 5 macro-categorie per l'ordinamento "Per ruolo":
// 0 Portiere, 1 Difensori, 2 Centrocampisti, 3 Ali/trequartisti, 4 Attaccanti,
// 5 sconosciuto/non specificato (in fondo).
function gruppoRuolo(ruolo) {
  if (!ruolo) return 5;
  const r = ruolo.toLowerCase();
  if (/portiere|torwart|gardien/.test(r)) return 0;
  if (/punta|attacc|centravanti|spitze|sturm/.test(r)) return 4;
  if (/\bala\b|trequartista|esterno alto|esterno offensiv|flügel|rechtsaussen|linksaussen|\baile\b/.test(r)) return 3;
  if (/centrocamp|median|mezzala|regista|interno medio|esterno medio|\bdemi\b|mittelfeld/.test(r)) return 2;
  if (/difes|difensor|terzino|esterno|verteidig|défense/.test(r)) return 1;
  return 5;
}
const NOMI_GRUPPO_RUOLO = ["Portieri", "Difensori", "Centrocampisti", "Ali e trequartisti", "Attaccanti", "Ruolo non specificato"];
const PARAMETRI_DEFAULT = ["Tecnica","Intelligenza","Personalità","Speed","Media Tips","Tattica","Fisico","Mentale","Potenziale"];

// Anno di riferimento per calcolare la categoria Nazionale dall'anno di
// nascita (es. stagione 2026/2027: 2027 - 2010 = U17). Da aggiornare di
// un'unità a ogni nuova stagione.
const ANNO_RIFERIMENTO_STAGIONE = 2027;

// Ordine curato a mano (non per frequenza d'uso): le categorie Nazionale
// più rilevanti per il lavoro quotidiano vengono prima, poi a scendere le
// altre annate. Gli anni tra parentesi sono scritti a mano e NON si
// aggiornano da soli: a ogni nuova stagione vanno aggiornati qui a mano
// (aggiungendo le nuove voci, non sostituendo quelle vecchie), così restano
// visibili come storico anche le annate passate.
const ETICHETTE_DEFAULT = [
  "Nazionale U16 TYT (2011)",
  "Nazionale U16 A (2011)",
  "FOOTURO",
  "Candidato FOOTURO",
  "FC Lugano U15",
  "FC Giubiasco U15",
  "Nazionale U15 TYT",
  "Nazionale U15 (2011)",
  "Nazionale U17",
  "Nazionale U18",
  "Nazionale U19",
  "Nazionale U20",
  "Nazionale U21",
  "Nazionale A"
];

// Riconosce sigle nel nome del file (es. "...U16TYT2010...",
// "...FOOTURO...") e le traduce nelle etichette corrispondenti. "Candidato
// FOOTURO" è indipendente dalla categoria Nazionale (un giocatore può
// essere entrambe le cose), mentre tra le categorie Nazionale l'ordine
// conta: le sigle più specifiche vanno controllate prima di quelle
// generiche (U16TYT prima di U16).
const MAPPA_ETICHETTE_FILENAME = [
  { re: /U16[\s_-]*TYT/i, etichetta: "Nazionale U16 TYT" },
  { re: /U16(?![\s_-]*TYT)/i, etichetta: "Nazionale U16" },
  { re: /U17/i, etichetta: "Nazionale U17" },
  { re: /U18/i, etichetta: "Nazionale U18" },
  { re: /U19/i, etichetta: "Nazionale U19" },
  { re: /U20/i, etichetta: "Nazionale U20" },
  { re: /U21/i, etichetta: "Nazionale U21" }
];
function etichetteDaFilename(nomeFile) {
  const nome = nomeFile || "";
  const trovate = [];
  if (/FOOTURO/i.test(nome)) trovate.push("Candidato FOOTURO");
  for (const m of MAPPA_ETICHETTE_FILENAME) {
    if (m.re.test(nome)) { trovate.push(m.etichetta); break; }
  }
  return trovate;
}

/* ===================== Stato ===================== */
let players = [];
let eventi = [];
let raduni = [];

// Il file su Dropbox era storicamente un array nudo di giocatori. Poi è
// diventato {players, eventi}, e ora contiene anche i raduni TYT, quindi il
// formato è {players, eventi, raduni}. Questa funzione legge correttamente
// tutti e tre i formati, così i file esistenti continuano a funzionare senza
// bisogno di modifiche manuali.
function parseDatabaseJSON(text) {
  const parsed = text && text.trim() ? JSON.parse(text) : [];
  const risultato = Array.isArray(parsed)
    ? { players: parsed, eventi: [], raduni: [] }
    : { players: parsed.players || [], eventi: parsed.eventi || [], raduni: parsed.raduni || [] };
  migraTuttiSquadraCategorie(risultato.players);
  return risultato;
}

// Elenco fisso delle categorie selezionabili per un giocatore (chips nella
// scheda, come le Etichette). "categoria" nel resto del codice, quando si
// parla del campo libero digitato nel Calendario, resta invece il NUMERO
// estratto dal testo (es. "21"): questa mappa converte quel numero
// nell'etichetta fissa corrispondente (es. "U21").
const CATEGORIE_FISSE = ["U14", "U15", "U16", "U17", "U18", "U19", "U21", "Prima Squadra"];
const CATEGORIA_NUMERO_A_LABEL = { "14": "U14", "15": "U15", "16": "U16", "17": "U17", "18": "U18", "19": "U19", "21": "U21" };

// Rimuove SOLO un token di categoria età (U21, U-21, M15, ecc.) da un testo,
// lasciando intatto tutto il resto — comprese sigle come "1893" che fanno
// parte del nome ufficiale del club (es. "FC Basel 1893"). Confronta
// l'INTERO token separato da spazi, non una sottostringa: così un testo
// come "SFV/ASF u/m-15 - StüPu" (dove "u/m-15" non è un token isolato, ma
// parte di una sigla più larga da sistemare a mano) resta intoccato invece
// di venire rovinato da un taglio a metà.
function rimuoviCategoriaDaTesto(raw) {
  const testo = String(raw || "");
  if (!testo.trim()) return { pulito: testo, categoria: null };
  let categoria = null;
  const parole = testo.split(/\s+/).filter(tk => {
    if (categoria) return true;
    const m = tk.match(/^[UuMm]-?(\d{2})$/);
    if (m && CATEGORIA_NUMERO_A_LABEL[m[1]]) { categoria = m[1]; return false; }
    return true;
  });
  return { pulito: parole.join(" ").trim(), categoria };
}

// Migrazione una tantum, per-giocatore e idempotente (grazie al flag
// squadraCategorieMigrata: una volta fatta non viene rifatta, anche se poi
// modifichi a mano il campo Squadra): scompone lo storico campo "Squadra" —
// che finora conteneva club+categoria insieme, es. "FC Lugano U-21" — nei
// due campi separati "squadra" (solo il club, es. "FC Lugano") e
// "categorie" (elenco fisso, es. ["U21"]). Recupera anche le eventuali
// "squadreAggiuntive" di una versione precedente dell'app: se indicano solo
// un'altra categoria per lo stesso club la aggiunge alle categorie; se
// sembrano indicare un club diverso, non la perde silenziosamente ma la
// segnala in nota per una verifica manuale.
function migraSquadraCategorie(p) {
  if (!p || p.squadraCategorieMigrata) return;
  const categorie = new Set(p.categorie || []);
  let squadraPulita = p.squadra || "";
  const noteExtra = [];

  if (p.squadra) {
    const r = rimuoviCategoriaDaTesto(p.squadra);
    squadraPulita = r.pulito || p.squadra;
    if (r.categoria) categorie.add(CATEGORIA_NUMERO_A_LABEL[r.categoria]);
  }

  (p.squadreAggiuntive || []).forEach(testo => {
    const r = rimuoviCategoriaDaTesto(testo);
    if (r.categoria) {
      categorie.add(CATEGORIA_NUMERO_A_LABEL[r.categoria]);
    } else if (r.pulito && r.pulito.toLowerCase() !== squadraPulita.toLowerCase()) {
      noteExtra.push(`Squadra aggiuntiva da rivedere (migrazione automatica campo Categorie): ${testo}`);
    }
  });

  p.squadra = squadraPulita;
  p.categorie = [...categorie];
  delete p.squadreAggiuntive;
  if (noteExtra.length) p.note = (p.note ? p.note + "\n\n" : "") + noteExtra.join("\n");
  p.squadraCategorieMigrata = true;
}

function migraTuttiSquadraCategorie(playersArr) {
  (playersArr || []).forEach(migraSquadraCategorie);
  return playersArr;
}
let currentTab = "elenco";

let filtroTesto = "";
let filtroAnno = "tutti";
let filtroSquadra = "tutte";
let filtroCategoria = "tutte";
let filtroRuolo = "tutti";
let filtroParametro = "tutti";
let filtroValoreMin = "";
let ordinamento = "cognome";
let vistaElenco = "schede";
let giocatoriFiltratiCorrente = [];
let filtroEtichette = new Set();
let filtroScouts = new Set();

/* ===================== Utility ===================== */
function esc(str) {
  if (str === null || str === undefined) return "";
  return String(str).replace(/[&<>"']/g, c => ({
    "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;"
  }[c]));
}

function uid() {
  return "p_" + Date.now() + "_" + Math.random().toString(36).slice(2, 9);
}

// Data di oggi nel fuso orario LOCALE (non UTC). toISOString() converte in
// UTC e vicino alla mezzanotte può restituire il giorno sbagliato — es. la
// sera in Svizzera è già UTC del giorno dopo, il mattino presto è ancora UTC
// del giorno prima.
function dataOggiLocale() {
  const d = new Date();
  const mm = String(d.getMonth() + 1).padStart(2, "0");
  const gg = String(d.getDate()).padStart(2, "0");
  return `${d.getFullYear()}-${mm}-${gg}`;
}

// Somma (o sottrae, con giorni negativo) un numero di giorni a una data
// ISO "AAAA-MM-GG" restando sempre in tempo LOCALE, mai passando da
// toISOString(): new Date(anno, mese, giorno) e i metodi getFullYear/
// getMonth/getDate lavorano tutti in locale, quindi non c'è mai una
// conversione UTC che possa far scivolare il risultato di un giorno
// (il bug che ha causato le date di fine "prima" della data di inizio
// negli eventi sincronizzati da Google Calendar, vedi eventoAGoogleBody
// e googleAEventoApp più sotto).
function sommaGiorniISO(dataISO, giorni) {
  const [y, m, d] = dataISO.split("-").map(Number);
  const dt = new Date(y, m - 1, d);
  dt.setDate(dt.getDate() + giorni);
  const mm = String(dt.getMonth() + 1).padStart(2, "0");
  const gg = String(dt.getDate()).padStart(2, "0");
  return `${dt.getFullYear()}-${mm}-${gg}`;
}

// Data (ISO) dell'ultima partita registrata per il giocatore, o null se non
// ne ha nessuna. Usata sia per l'ordinamento "Ultima partita giocata" sia
// per l'indicazione testuale mostrata nella card.
function dataUltimaPartita(p) {
  const partite = p.partiteUfficiali || [];
  if (!partite.length) return null;
  const conData = partite.filter(m => m.data);
  if (!conData.length) return null;
  return conData.slice().sort((a, b) => (b.data || "").localeCompare(a.data || ""))[0].data;
}

// Giorni trascorsi tra la data indicata (ISO) e oggi (calcolato in locale,
// coerente col resto dell'app). Positivo se la data è nel passato.
function giorniDaOggi(dataISO) {
  if (!dataISO) return null;
  const oggi = new Date(dataOggiLocale() + "T00:00:00");
  const d = new Date(dataISO + "T00:00:00");
  if (isNaN(d.getTime())) return null;
  return Math.round((oggi - d) / (1000 * 60 * 60 * 24));
}

// Testo da mostrare nella card ("Ha giocato 2 giorni fa", ecc.)
function testoUltimaPartita(p) {
  const ultima = dataUltimaPartita(p);
  const giorni = giorniDaOggi(ultima);
  if (giorni === null) return "Nessuna partita recente";
  if (giorni < 0) return "Prossima partita in programma";
  if (giorni === 0) return "Ha giocato oggi";
  if (giorni === 1) return "Ha giocato ieri";
  return `Ha giocato ${giorni} giorni fa`;
}

function calcolaEta(dataNascita) {
  if (!dataNascita) return null;
  const d = new Date(dataNascita);
  if (isNaN(d.getTime())) return null;
  const now = new Date();
  let age = now.getFullYear() - d.getFullYear();
  const m = now.getMonth() - d.getMonth();
  if (m < 0 || (m === 0 && now.getDate() < d.getDate())) age--;
  return age;
}

function categoriaNazionale(dataNascita) {
  if (!dataNascita) return "";
  const d = new Date(dataNascita);
  if (isNaN(d.getTime())) return "";
  const categoria = ANNO_RIFERIMENTO_STAGIONE - d.getFullYear();
  if (categoria < 15 || categoria > 21) return ""; // fuori dal range U15-U21, non mostriamo nulla
  return `U${categoria}`;
}

// Tabella Grenzwerte (SFV/ASF, dalla stagione 2024/2025): età biologica minima
// per NON essere considerato "tardivo", per categoria e mese della stagione.
// Ogni categoria parte da un valore base ad agosto e sale di 0.1 al mese.
const GRENZWERTE_BASE = { "FE-13": 12.0, "FE-14": 13.0, "U-15": 14.0, "U-16": 15.0 };
// Anno di fine stagione a cui appartiene una data (agosto-luglio): una
// misurazione di marzo 2026 è nella stagione 2025/2026 (che "finisce" nel
// 2026), una di settembre 2026 è già nella 2026/2027 (finisce nel 2027).
// Fondamentale per non giudicare le misurazioni vecchie con la categoria
// di QUEST'anno: un ragazzo misurato a marzo 2026 andava confrontato con i
// limiti U-15 di quella stagione, non con quelli U-16 di quella attuale.
function annoStagioneDa(dataISO) {
  const d = new Date(dataISO);
  if (isNaN(d.getTime())) return null;
  const mese = d.getMonth(); // 0=gen...11=dic
  return mese >= 7 ? d.getFullYear() + 1 : d.getFullYear();
}
function categoriaGrenzwerte(dataNascita, annoStagione) {
  if (!dataNascita || !annoStagione) return null;
  const eta = annoStagione - new Date(dataNascita).getFullYear();
  if (eta === 13) return "FE-13";
  if (eta === 14) return "FE-14";
  if (eta === 15) return "U-15";
  if (eta === 16) return "U-16";
  return null;
}
// Indice del mese nella stagione sportiva: 0 = agosto ... 11 = luglio.
function meseStagione(dataISO) {
  const d = new Date(dataISO);
  if (isNaN(d.getTime())) return null;
  return (d.getMonth() - 7 + 12) % 12;
}
function sogliaGrenzwerte(dataNascita, dataMisuraISO) {
  const annoStagione = annoStagioneDa(dataMisuraISO);
  const cat = categoriaGrenzwerte(dataNascita, annoStagione);
  const idx = meseStagione(dataMisuraISO);
  if (cat === null || idx === null || !GRENZWERTE_BASE.hasOwnProperty(cat)) return null;
  return Math.round((GRENZWERTE_BASE[cat] + idx * 0.1) * 100) / 100;
}

// Vero se il giocatore fa parte di uno dei pool Nazionale (qualsiasi
// categoria/annata, non solo U16) — usato per decidere se mostrare la
// sezione "Mirwald" nella scheda. Non richiede che abbia già misurazioni:
// la sezione compare comunque, pronta per essere compilata, e resta valida
// anche quando il giocatore passa a un'annata successiva (U17, U18...),
// perché guarda il testo dell'etichetta in generale, non "U16" in particolare.
function inPoolNazionaleU16(p) {
  return (p.etichette || []).some(e => e.includes("Kader A") || e.includes("TYT") || e.includes("FOOTURO"));
}

// Vero se il giocatore ha l'etichetta Nazionale U16 A / Nazionale U16 TYT
// riferita ALL'ANNATA U16 IN CORSO (non a tag di annate passate tipo "(2010)").
// Il controllo sull'annata (categoriaNazionale === "U16") è quello che decide,
// non il testo esatto del tag, così funziona anche quando il tag include l'anno.
function isNazionaleU16Corrente(p) {
  if (categoriaNazionale(p.dataNascita) !== "U16") return false;
  const etichette = p.etichette || [];
  return etichette.some(e => e.includes("U16 TYT") || e.includes("U16 A"));
}

// Squadre proprie U15 con lo sfondo azzurrino nell'anteprima — aggiungi qui
// il nome esatto dell'etichetta se in futuro se ne aggiungono altre.
const SQUADRE_EVIDENZIATE_AZZURRO = ["FC Lugano U15", "FC Giubiasco U15"];
function isFCLuganoU15(p) {
  return (p.etichette || []).some(e => SQUADRE_EVIDENZIATE_AZZURRO.includes(e));
}

function isFOOTURO(p) {
  return (p.etichette || []).includes("FOOTURO");
}

function valutazioneMedia(player, scoutFilter) {
  if (!player.valutazioni || !player.valutazioni.length) return null;
  let voci = player.valutazioni;
  if (scoutFilter && scoutFilter.size > 0) {
    voci = voci.filter(v => v.scout && scoutFilter.has(v.scout));
  }
  const nums = voci
    .map(v => parseFloat(v.valoreNumerico))
    .filter(n => !isNaN(n));
  if (!nums.length) return null;
  return (nums.reduce((a, b) => a + b, 0) / nums.length);
}

const PARAM_CANONICI_TIPS = ["Tecnica", "Intelligenza", "Personalità", "Speed"];

function medieTips(player, scoutFilter) {
  let voci = player.valutazioni || [];
  if (scoutFilter && scoutFilter.size > 0) voci = voci.filter(v => v.scout && scoutFilter.has(v.scout));
  const medie = {};
  PARAM_CANONICI_TIPS.forEach(p => {
    const vals = voci.filter(v => v.parametro === p).map(v => parseFloat(v.valoreNumerico)).filter(n => !isNaN(n));
    medie[p] = vals.length ? vals.reduce((a, b) => a + b, 0) / vals.length : null;
  });
  const validi = PARAM_CANONICI_TIPS.map(p => medie[p]).filter(v => v !== null);
  medie.Media = validi.length ? validi.reduce((a, b) => a + b, 0) / validi.length : null;
  return medie;
}

const RADAR_ABBREV = { "Tecnica": "T", "Intelligenza": "I", "Personalità": "P", "Speed": "S" };
const RADAR_SCALE_MAX = 5;

function radarChartSVG(medie, { size = 110, showLabels = true, className = "" } = {}) {
  const assi = PARAM_CANONICI_TIPS;
  const n = assi.length;
  const cx = size / 2, cy = size / 2;
  const maxR = size / 2 - (showLabels ? 22 : 3);
  const angleFor = i => -Math.PI / 2 + i * (2 * Math.PI / n);

  let griglia = "";
  for (let liv = 1; liv <= RADAR_SCALE_MAX; liv++) {
    const r = maxR * (liv / RADAR_SCALE_MAX);
    const pts = assi.map((_, i) => { const a = angleFor(i); return `${(cx + r * Math.cos(a)).toFixed(1)},${(cy + r * Math.sin(a)).toFixed(1)}`; }).join(" ");
    griglia += `<polygon points="${pts}" fill="none" stroke="var(--line)" stroke-width="1" opacity="${liv === RADAR_SCALE_MAX ? 0.9 : 0.3}" />`;
  }
  let assiSVG = "";
  assi.forEach((_, i) => {
    const a = angleFor(i);
    assiSVG += `<line x1="${cx}" y1="${cy}" x2="${(cx + maxR * Math.cos(a)).toFixed(1)}" y2="${(cy + maxR * Math.sin(a)).toFixed(1)}" stroke="var(--line)" stroke-width="1" opacity="0.35" />`;
  });

  const valori = assi.map(k => medie[k]);
  const haDati = valori.some(v => v !== null && v !== undefined);
  const puntiDati = assi.map((k, i) => {
    const v = medie[k];
    const r = (v === null || v === undefined) ? 0 : maxR * (Math.max(0, Math.min(RADAR_SCALE_MAX, v)) / RADAR_SCALE_MAX);
    const a = angleFor(i);
    return `${(cx + r * Math.cos(a)).toFixed(1)},${(cy + r * Math.sin(a)).toFixed(1)}`;
  }).join(" ");

  let labels = "";
  if (showLabels) {
    assi.forEach((k, i) => {
      const a = angleFor(i);
      const lr = maxR + 12;
      const lx = cx + lr * Math.cos(a);
      const ly = cy + lr * Math.sin(a);
      labels += `<text x="${lx.toFixed(1)}" y="${ly.toFixed(1)}" text-anchor="middle" dominant-baseline="middle" font-family="var(--font-mono)" font-size="10" fill="var(--muted)">${RADAR_ABBREV[k]}</text>`;
    });
  }

  return `<svg viewBox="0 0 ${size} ${size}" width="${size}" height="${size}" class="radar-chart ${className}">
    ${griglia}
    ${assiSVG}
    ${haDati ? `<polygon points="${puntiDati}" fill="var(--gold)" fill-opacity="0.28" stroke="var(--gold)" stroke-width="1.5" />` : ""}
    ${labels}
  </svg>`;
}

// Grafico di crescita: età biologica misurata nel tempo, con la soglia
// Grenzwerte (linea rossa) calcolata mese per mese per la categoria del
// giocatore. Sotto la linea rossa = "tardivo" secondo le tabelle SFV/ASF.
function graficoMirwaldSVG(player, { width = 560, height = 240 } = {}) {
  const misurazioni = (player.misurazioni || [])
    .filter(m => m.data && m.etaBiologica !== null && m.etaBiologica !== undefined)
    .slice().sort((a, b) => (a.data || "").localeCompare(b.data || ""));
  if (!misurazioni.length) return `<p class="muted">Nessuna misurazione con età biologica disponibile.</p>`;

  const padL = 46, padR = 18, padT = 16, padB = 32;
  const plotW = width - padL - padR, plotH = height - padT - padB;

  const date = misurazioni.map(m => new Date(m.data).getTime());
  const minData = Math.min(...date), maxData = Math.max(...date);
  const rangeData = Math.max(maxData - minData, 1); // evita divisione per zero con un solo punto

  const soglie = misurazioni.map(m => sogliaGrenzwerte(player.dataNascita, m.data));
  const valoriEta = misurazioni.map(m => m.etaBiologica);
  const tuttiValori = valoriEta.concat(soglie.filter(v => v !== null));
  const minY = Math.floor(Math.min(...tuttiValori) - 0.5);
  const maxY = Math.ceil(Math.max(...tuttiValori) + 0.5);
  const rangeY = Math.max(maxY - minY, 1);

  const xFor = t => padL + (misurazioni.length === 1 ? plotW / 2 : ((t - minData) / rangeData) * plotW);
  const yFor = v => padT + plotH - ((v - minY) / rangeY) * plotH;

  // griglia orizzontale + etichette asse Y
  let griglia = "";
  const step = rangeY > 4 ? 1 : 0.5;
  for (let v = Math.ceil(minY / step) * step; v <= maxY; v += step) {
    const y = yFor(v);
    griglia += `<line x1="${padL}" y1="${y.toFixed(1)}" x2="${width - padR}" y2="${y.toFixed(1)}" stroke="var(--line)" stroke-width="1" opacity="0.35" />`;
    griglia += `<text x="${padL - 8}" y="${y.toFixed(1)}" text-anchor="end" dominant-baseline="middle" font-family="var(--font-mono)" font-size="10" fill="var(--muted)">${v.toFixed(1)}</text>`;
  }

  // etichette asse X (mese/anno di ogni misurazione)
  let etichetteX = "";
  misurazioni.forEach(m => {
    const x = xFor(new Date(m.data).getTime());
    etichetteX += `<text x="${x.toFixed(1)}" y="${height - padB + 16}" text-anchor="middle" font-family="var(--font-mono)" font-size="10" fill="var(--muted)">${formatDataIt(m.data).slice(0, 5)}</text>`;
  });

  // linea rossa di soglia (Grenzwerte)
  let lineaSoglia = "", puntiSoglia = "";
  const puntiSogliaValidi = misurazioni.map((m, i) => ({ x: xFor(date[i]), y: soglie[i] !== null ? yFor(soglie[i]) : null })).filter(p => p.y !== null);
  if (puntiSogliaValidi.length >= 2) {
    lineaSoglia = `<polyline points="${puntiSogliaValidi.map(p => `${p.x.toFixed(1)},${p.y.toFixed(1)}`).join(" ")}" fill="none" stroke="var(--low)" stroke-width="2" stroke-dasharray="5,3" />`;
  }
  puntiSogliaValidi.forEach(p => {
    puntiSoglia += `<circle cx="${p.x.toFixed(1)}" cy="${p.y.toFixed(1)}" r="3" fill="var(--low)" />`;
  });

  // linea gialla/oro: età biologica reale misurata
  const puntiEta = misurazioni.map((m, i) => ({ x: xFor(date[i]), y: yFor(m.etaBiologica) }));
  let lineaEta = "", cerchiEta = "";
  if (puntiEta.length >= 2) {
    lineaEta = `<polyline points="${puntiEta.map(p => `${p.x.toFixed(1)},${p.y.toFixed(1)}`).join(" ")}" fill="none" stroke="var(--gold)" stroke-width="2.5" />`;
  }
  puntiEta.forEach(p => {
    cerchiEta += `<circle cx="${p.x.toFixed(1)}" cy="${p.y.toFixed(1)}" r="4" fill="var(--gold)" stroke="var(--bg)" stroke-width="1.5" />`;
  });

  return `
    <svg viewBox="0 0 ${width} ${height}" width="100%" style="max-width:${width}px;">
      ${griglia}
      <line x1="${padL}" y1="${padT}" x2="${padL}" y2="${padT + plotH}" stroke="var(--line)" stroke-width="1" />
      <line x1="${padL}" y1="${padT + plotH}" x2="${width - padR}" y2="${padT + plotH}" stroke="var(--line)" stroke-width="1" />
      ${etichetteX}
      ${lineaSoglia}
      ${puntiSoglia}
      ${lineaEta}
      ${cerchiEta}
    </svg>
    <div style="display:flex; gap:16px; font-size:11px; color: var(--muted); margin-top:4px;">
      <span><span style="display:inline-block; width:10px; height:10px; border-radius:50%; background: var(--gold); margin-right:5px;"></span>BioAlter misurato</span>
      <span><span style="display:inline-block; width:10px; height:2px; background: var(--low); margin-right:5px; vertical-align:middle;"></span>Soglia "tardivo" (Grenzwerte SFV/ASF)</span>
    </div>`;
}

function ultimaVisionatura(player) {
  if (!player.visionature || !player.visionature.length) return null;
  const dates = player.visionature.map(v => v.data).filter(Boolean).sort();

function formatDataIt(iso) {
  if (!iso) return "-";
  const d = new Date(iso);
  if (isNaN(d.getTime())) return iso;
  return d.toLocaleDateString("it-IT", { day: "2-digit", month: "2-digit", year: "numeric" });
}

function formatDataFile(iso) {
  return formatDataIt(iso).replace(/\//g, ".");
}

function sanitizeNomeFile(str) {
  return (str || "Report giocatori").replace(/[\\/:*?"<>|]/g, "-").replace(/\s+/g, " ").trim();
}

function normalizzaData(str) {
  const m = str.match(/(\d{1,2})[\/\.\-](\d{1,2})[\/\.\-](\d{2,4})/);
  if (!m) return "";
  let [, d, mo, y] = m;
  if (y.length === 2) y = (parseInt(y, 10) > 50 ? "19" : "20") + y;
  d = d.padStart(2, "0");
  mo = mo.padStart(2, "0");
  return `${y}-${mo}-${d}`;
}

function ratingClass(v) {
  if (v === null || v === undefined || isNaN(v)) return "rating-na";
  if (v >= 4) return "rating-good";
  if (v >= 3) return "rating-mid";
  return "rating-low";
}

/* ===================== Sincronizzazione con Dropbox ===================== */
/* Funziona da qualsiasi browser (PC o smartphone) perché usa solo
   chiamate HTTPS alle API di Dropbox, senza bisogno di accesso al
   filesystem. Usa il flusso OAuth PKCE senza redirect_uri: Dropbox
   mostra il codice di autorizzazione a schermo e l'utente lo incolla
   nell'app (nessun server necessario). */

let dropboxFilePath = "/scout-database.json";
let dbx = { appKey: "", accessToken: "", refreshToken: "", expiresAt: 0 };
let dropboxConnesso = false;
let anthropicApiKey = "";
let geminiApiKey = "";
let ultimoContenutoRemoto = null;

function idbOpen() {
  return new Promise((resolve, reject) => {
    const req = indexedDB.open("scout-manager-db", 2);
    req.onupgradeneeded = () => {
      const db = req.result;
      if (!db.objectStoreNames.contains("config")) db.createObjectStore("config");
    };
    req.onsuccess = () => resolve(req.result);
    req.onerror = () => reject(req.error);
  });
}
async function idbSet(key, val) {
  const db = await idbOpen();
  return new Promise((resolve, reject) => {
    const tx = db.transaction("config", "readwrite");
    tx.objectStore("config").put(val, key);
    tx.oncomplete = () => resolve();
    tx.onerror = () => reject(tx.error);
  });
}
async function idbGet(key) {
  const db = await idbOpen();
  return new Promise((resolve, reject) => {
    const tx = db.transaction("config", "readonly");
    const req = tx.objectStore("config").get(key);
    req.onsuccess = () => resolve(req.result);
    req.onerror = () => reject(req.error);
  });
}
async function idbDelete(key) {
  const db = await idbOpen();
  return new Promise((resolve, reject) => {
    const tx = db.transaction("config", "readwrite");
    tx.objectStore("config").delete(key);
    tx.oncomplete = () => resolve();
    tx.onerror = () => reject(tx.error);
  });
}

/* ---- PKCE ---- */
function base64UrlEncode(buffer) {
  let str = "";
  const bytes = new Uint8Array(buffer);
  for (let i = 0; i < bytes.length; i++) str += String.fromCharCode(bytes[i]);
  return btoa(str).replace(/\+/g, "-").replace(/\//g, "_").replace(/=+$/, "");
}
function generaCodeVerifier() {
  const arr = new Uint8Array(64);
  crypto.getRandomValues(arr);
  return base64UrlEncode(arr.buffer);
}
async function generaCodeChallenge(verifier) {
  const enc = new TextEncoder().encode(verifier);
  const digest = await crypto.subtle.digest("SHA-256", enc);
  return base64UrlEncode(digest);
}

/* ---- Flusso di autorizzazione ---- */
async function avviaConnessioneDropbox(appKey, percorsoFile) {
  appKey = appKey.trim();
  if (!appKey) { alert("Inserisci prima l'App Key del tuo Dropbox App."); return; }
  dropboxFilePath = (percorsoFile || "/scout-database.json").trim() || "/scout-database.json";
  if (!dropboxFilePath.startsWith("/")) dropboxFilePath = "/" + dropboxFilePath;
  const verifier = generaCodeVerifier();
  await idbSet("dropbox-appkey", appKey);
  await idbSet("dropbox-verifier", verifier);
  await idbSet("dropbox-path", dropboxFilePath);
  const challenge = await generaCodeChallenge(verifier);
  const scope = encodeURIComponent("files.content.write files.content.read");
  const authUrl = `https://www.dropbox.com/oauth2/authorize?client_id=${encodeURIComponent(appKey)}&response_type=code&code_challenge=${encodeURIComponent(challenge)}&code_challenge_method=S256&token_access_type=offline&scope=${scope}`;
  window.open(authUrl, "_blank", "noopener");
  renderDropboxStatusBar("attesa-codice");
}

async function completaConnessioneDropbox(code) {
  code = code.trim();
  if (!code) { alert("Incolla il codice mostrato da Dropbox."); return; }
  const appKey = await idbGet("dropbox-appkey").catch(() => null);
  const verifier = await idbGet("dropbox-verifier").catch(() => null);
  const percorsoSalvato = await idbGet("dropbox-path").catch(() => null);
  if (percorsoSalvato) dropboxFilePath = percorsoSalvato;
  if (!appKey || !verifier) {
    alert("Sessione di connessione scaduta: clicca di nuovo su \"Avvia connessione\".");
    renderDropboxStatusBar("non-configurato");
    return;
  }
  try {
    const resp = await fetch("https://api.dropboxapi.com/oauth2/token", {
      method: "POST",
      headers: { "Content-Type": "application/x-www-form-urlencoded" },
      body: new URLSearchParams({
        code, grant_type: "authorization_code", client_id: appKey, code_verifier: verifier
      })
    });
    if (!resp.ok) throw new Error("codice non valido o scaduto (" + resp.status + ")");
    const data = await resp.json();
    dbx.appKey = appKey;
    dbx.accessToken = data.access_token;
    dbx.refreshToken = data.refresh_token;
    dbx.expiresAt = Date.now() + data.expires_in * 1000 - 60000;
    await idbSet("dropbox-refresh-token", dbx.refreshToken);
    await idbDelete("dropbox-verifier");
    dropboxConnesso = true;
    const risultato = await scaricaDaDropbox();
    players = risultato.players;
    eventi = risultato.eventi || [];
    raduni = risultato.raduni || [];
    renderDropboxStatusBar("connesso");
    render();
    if (risultato.fileNonTrovato) avvisaSePercorsoNonTrovato();
  } catch (e) {
    console.error(e);
    alert("Connessione a Dropbox non riuscita: " + e.message);
    renderDropboxStatusBar("non-configurato");
  }
}

async function assicuraTokenValido() {
  if (dbx.accessToken && Date.now() < dbx.expiresAt) return dbx.accessToken;
  if (!dbx.refreshToken || !dbx.appKey) throw new Error("Non connesso a Dropbox.");
  const resp = await fetch("https://api.dropboxapi.com/oauth2/token", {
    method: "POST",
    headers: { "Content-Type": "application/x-www-form-urlencoded" },
    body: new URLSearchParams({
      grant_type: "refresh_token", refresh_token: dbx.refreshToken, client_id: dbx.appKey
    })
  });
  if (!resp.ok) throw new Error("Sessione Dropbox scaduta: riconnettiti dalla sezione in alto.");
  const data = await resp.json();
  dbx.accessToken = data.access_token;
  dbx.expiresAt = Date.now() + data.expires_in * 1000 - 60000;
  return dbx.accessToken;
}

async function scaricaDaDropbox() {
  const token = await assicuraTokenValido();
  const resp = await fetch("https://content.dropboxapi.com/2/files/download", {
    method: "POST",
    headers: {
      "Authorization": "Bearer " + token,
      "Dropbox-API-Arg": JSON.stringify({ path: dropboxFilePath })
    }
  });
  if (resp.status === 409) { ultimoContenutoRemoto = ""; return { players: [], eventi: [], fileNonTrovato: true }; } // nessun file a questo percorso
  if (!resp.ok) throw new Error("errore nel download da Dropbox (" + resp.status + ")");
  const text = await resp.text();
  ultimoContenutoRemoto = text;
  try { return { ...parseDatabaseJSON(text), fileNonTrovato: false }; }
  catch (e) { alert("Il file su Dropbox non contiene un JSON valido."); return { players: [], eventi: [], fileNonTrovato: false }; }
}

function avvisaSePercorsoNonTrovato() {
  alert(
    "Nessun file trovato su Dropbox a questo percorso esatto:\n\n" + dropboxFilePath + "\n\n" +
    "Se ti aspettavi di trovare i giocatori già inseriti su un altro dispositivo, il percorso scritto qui non corrisponde perfettamente a quello configurato là. Cose comuni da controllare:\n" +
    "• Dropbox vuole sempre la barra normale \"/\", mai la barra rovesciata \"\\\" di Windows\n" +
    "• Maiuscole/minuscole e spazi devono essere identici, lettera per lettera\n" +
    "• Confronta questo percorso con quello mostrato nella barra di stato dell'altro dispositivo\n\n" +
    "Se invece è la primissima volta che colleghi l'app, va tutto bene: il file verrà creato automaticamente al primo salvataggio."
  );
}

async function verificaConflittoPrimaDiSalvare() {
  try {
    const token = await assicuraTokenValido();
    const resp = await fetch("https://content.dropboxapi.com/2/files/download", {
      method: "POST",
      headers: { "Authorization": "Bearer " + token, "Dropbox-API-Arg": JSON.stringify({ path: dropboxFilePath }) }
    });
    if (resp.status === 409) return true; // il file non esiste ancora, nessun conflitto possibile
    if (!resp.ok) return true; // non blocchiamo il salvataggio per un errore nella sola verifica
    const testoRemoto = await resp.text();
    if (ultimoContenutoRemoto !== null && testoRemoto !== ultimoContenutoRemoto) {
      const sovrascrivere = confirm(
        "Il database su Dropbox è stato aggiornato da quando l'hai caricato l'ultima volta (probabilmente da un collega). " +
        "Vuoi sovrascrivere con le tue modifiche attuali?\n\nAnnulla per ricaricare prima la versione più recente (le modifiche non salvate in questa pagina andranno perse)."
      );
      if (!sovrascrivere) {
        const dati = parseDatabaseJSON(testoRemoto);
        players = dati.players;
        eventi = dati.eventi;
        raduni = dati.raduni;
        ultimoContenutoRemoto = testoRemoto;
        render();
        return false;
      }
    }
    return true;
  } catch (e) {
    console.error("Verifica conflitto fallita", e);
    return true;
  }
}

async function caricaSuDropbox() {
  const ok = await verificaConflittoPrimaDiSalvare();
  if (!ok) return;
  const token = await assicuraTokenValido();
  const testoNuovo = JSON.stringify({ players, eventi, raduni }, null, 2);
  const resp = await fetch("https://content.dropboxapi.com/2/files/upload", {
    method: "POST",
    headers: {
      "Authorization": "Bearer " + token,
      "Content-Type": "application/octet-stream",
      "Dropbox-API-Arg": JSON.stringify({ path: dropboxFilePath, mode: "overwrite", mute: true })
    },
    body: testoNuovo
  });
  if (!resp.ok) throw new Error("errore nel salvataggio su Dropbox (" + resp.status + ")");
  ultimoContenutoRemoto = testoNuovo;
}

// ===================== Backup automatico =====================
// Non esiste un vero "processo in background": questa app gira solo nel
// browser, quindi non può creare un backup ogni 2 giorni a orologio anche
// a pagina chiusa. Quello che FA: ogni volta che l'app si sincronizza con
// Dropbox (apertura, salvataggio), controlla se sono passati almeno 2
// giorni dall'ultimo backup automatico — se sì, ne crea uno subito. Con un
// uso quotidiano/quasi quotidiano dell'app il risultato pratico è molto
// vicino a "un backup ogni 2 giorni".
const BACKUP_INTERVALLO_GIORNI = 2;

function cartellaBackup() {
  const idx = dropboxFilePath.lastIndexOf("/");
  const cartella = idx > 0 ? dropboxFilePath.slice(0, idx) : "";
  return cartella + "/Backup";
}

async function eseguiBackupAutomaticoSeNecessario() {
  try {
    const ultimo = await idbGet("ultimo-backup-automatico").catch(() => null);
    const oggi = dataOggiLocale();
    if (ultimo) {
      const giorniPassati = (new Date(oggi) - new Date(ultimo)) / (1000 * 60 * 60 * 24);
      if (giorniPassati < BACKUP_INTERVALLO_GIORNI) return; // non è ancora ora
    }
    const token = await assicuraTokenValido();
    const contenuto = JSON.stringify({ players, eventi, raduni }, null, 2);
    const percorsoBackup = `${cartellaBackup()}/scout-backup-${oggi}.json`;
    const resp = await fetch("https://content.dropboxapi.com/2/files/upload", {
      method: "POST",
      headers: {
        "Authorization": "Bearer " + token,
        "Content-Type": "application/octet-stream",
        "Dropbox-API-Arg": JSON.stringify({ path: percorsoBackup, mode: "overwrite", mute: true, autorename: false })
      },
      body: contenuto
    });
    if (!resp.ok) { console.error("Backup automatico non riuscito (" + resp.status + ")"); return; }
    await idbSet("ultimo-backup-automatico", oggi);
    console.log("Backup automatico creato:", percorsoBackup);
    aggiornaNotaBackupAutomatico();
  } catch (e) {
    console.error("Backup automatico non riuscito:", e);
  }
}

function aggiornaNotaBackupAutomatico() {
  const el = document.getElementById("nota-backup-automatico");
  if (el) renderNotaBackupAutomatico(el);

async function renderNotaBackupAutomatico(el) {

/* ===================== Integrazione Google Calendar ===================== */
/* Flusso OAuth PKCE CON redirect_uri (Google, a differenza di Dropbox, non
   permette più il flusso "senza redirect": bisogna tornare a una pagina
   web vera, quindi l'app deve essere ospitata online, non aperta come
   file locale). Il redirect punta alla pagina stessa dell'app: al
   caricamento controlliamo se nell'URL c'è un "code" e completiamo lì il
   collegamento. */

let googleCal = {
  clientId: "", proxyUrl: "", accessToken: "", tokenExpiry: 0, refreshToken: "",
  email: "", calendarId: "", calendarName: "",
  connesso: false, statoSync: "inattivo", ultimaSync: null, ultimoErrore: null,
  syncToken: null,
};

function googleRedirectUri() {
  return window.location.origin + window.location.pathname;
}

async function avviaConnessioneGoogle(clientId, proxyUrl) {
  clientId = clientId.trim();
  proxyUrl = proxyUrl.trim().replace(/\/$/, "");
  if (!clientId) { alert("Incolla prima il Client ID ottenuto da Google Cloud Console."); return; }
  if (!proxyUrl) { alert("Incolla prima l'indirizzo del Worker Cloudflare (il \"ponte\" verso Google)."); return; }
  await idbSet("google-client-id", clientId);
  await idbSet("google-proxy-url", proxyUrl);
  googleCal.proxyUrl = proxyUrl;
  const verifier = generaCodeVerifier();
  await idbSet("google-verifier", verifier);
  const stato = generaCodeVerifier(); // riusato solo come stringa casuale, per il parametro "state" anti-CSRF
  await idbSet("google-oauth-state", stato);
  const challenge = await generaCodeChallenge(verifier);
  const scope = encodeURIComponent("https://www.googleapis.com/auth/calendar https://www.googleapis.com/auth/userinfo.email");
  const authUrl = `https://accounts.google.com/o/oauth2/v2/auth?client_id=${encodeURIComponent(clientId)}` +
    `&redirect_uri=${encodeURIComponent(googleRedirectUri())}` +
    `&response_type=code&scope=${scope}` +
    `&code_challenge=${encodeURIComponent(challenge)}&code_challenge_method=S256` +
    `&access_type=offline&prompt=consent&include_granted_scopes=true` +
    `&state=${encodeURIComponent(stato)}`;
  window.location.href = authUrl;
}

// Da chiamare una volta all'avvio dell'app: controlla se siamo appena
// tornati da Google con un "code" nell'URL, e se sì completa il collegamento.
async function gestisciRitornoOAuthGoogle() {
  const params = new URLSearchParams(window.location.search);
  const code = params.get("code");
  const statoRicevuto = params.get("state");
  if (!code) return;
  // Pulisce subito l'URL (il codice non deve restare visibile/ricaricabile)
  window.history.replaceState({}, "", window.location.pathname);

  const statoSalvato = await idbGet("google-oauth-state").catch(() => null);
  if (!statoRicevuto || statoRicevuto !== statoSalvato) {
    alert("Collegamento a Google annullato: il controllo di sicurezza (state) non corrisponde. Riprova.");
    return;
  }
  const clientId = await idbGet("google-client-id").catch(() => null);
  const verifier = await idbGet("google-verifier").catch(() => null);
  const proxyUrl = await idbGet("google-proxy-url").catch(() => null);
  if (!clientId || !verifier || !proxyUrl) {
    alert("Sessione di collegamento Google scaduta, o manca l'indirizzo del Worker: riprova da Strumenti.");
    return;
  }
  try {
    const resp = await fetch(proxyUrl, {
      method: "POST",
      headers: { "Content-Type": "application/x-www-form-urlencoded" },
      body: new URLSearchParams({
        code, grant_type: "authorization_code", client_id: clientId,
        redirect_uri: googleRedirectUri(), code_verifier: verifier,
      }),
    });
    if (!resp.ok) {
      const dettaglio = await resp.json().catch(() => null);
      const messaggio = dettaglio ? `${dettaglio.error || ""}: ${dettaglio.error_description || ""}` : "";
      throw new Error("scambio codice non riuscito (" + resp.status + ") " + messaggio);
    }
    const data = await resp.json();
    googleCal.clientId = clientId;
    googleCal.accessToken = data.access_token;
    googleCal.tokenExpiry = Date.now() + data.expires_in * 1000 - 60000;
    if (data.refresh_token) {
      googleCal.refreshToken = data.refresh_token;
      await idbSet("google-refresh-token", data.refresh_token);
    }
    await idbDelete("google-verifier");
    await idbDelete("google-oauth-state");

    const infoResp = await fetch("https://www.googleapis.com/oauth2/v2/userinfo", {
      headers: { Authorization: "Bearer " + googleCal.accessToken },
    });
    const info = await infoResp.json();
    googleCal.email = info.email || "";
    await idbSet("google-email", googleCal.email);

    googleCal.connesso = true;
    await mostraSceltaCalendarioGoogle();
  } catch (e) {
    console.error(e);
    alert("Collegamento a Google Calendar non riuscito: " + e.message);
  }
}

async function assicuraTokenGoogleValido() {
  if (googleCal.accessToken && Date.now() < googleCal.tokenExpiry) return googleCal.accessToken;
  if (!googleCal.refreshToken || !googleCal.clientId || !googleCal.proxyUrl) throw new Error("Non connesso a Google Calendar.");
  const resp = await fetch(googleCal.proxyUrl, {
    method: "POST",
    headers: { "Content-Type": "application/x-www-form-urlencoded" },
    body: new URLSearchParams({
      grant_type: "refresh_token", refresh_token: googleCal.refreshToken, client_id: googleCal.clientId,
    }),
  });
  if (!resp.ok) throw new Error("Sessione Google scaduta: riconnettiti da Strumenti.");
  const data = await resp.json();
  googleCal.accessToken = data.access_token;
  googleCal.tokenExpiry = Date.now() + data.expires_in * 1000 - 60000;
  return googleCal.accessToken;
}

async function caricaConfigGoogleSalvata() {
  const clientId = await idbGet("google-client-id").catch(() => null);

  const email = await idbGet("google-email").catch(() => null);

  const calendarName = await idbGet("google-calendar-name").catch(() => null);
  const syncToken = await idbGet("google-sync-token").catch(() => null);
  const ultimaSync = await idbGet("google-ultima-sync").catch(() => null);
  if (clientId) googleCal.clientId = clientId;
  if (proxyUrl) googleCal.proxyUrl = proxyUrl;
  if (refreshToken) googleCal.refreshToken = refreshToken;

      // completa: quella già unisce (pull + push) evitando duplicati.

/* ---- Corrispondenza campi app <-> Google ---- */
function eventoAGoogleBody(ev) {
  const titolo = `${ev.tipo || "Evento"}${ev.luogo ? " - " + ev.luogo : ""}`;
  const descrizioneParti = [];
  descrizioneParti.push(`Finalità: ${ev.categoria || "Scouting"}`);
  if (ev.note) descrizioneParti.push(ev.note);
  if ((ev.giocatoriIds || []).length) {
    const nomi = ev.giocatoriIds.map(id => { const p = players.find(pl => pl.id === id); return p ? `${p.cognome} ${p.nome}` : null; }).filter(Boolean);
    if (nomi.length) descrizioneParti.push("Giocatori convocati: " + nomi.join(", "));
  }
  const body = {
    summary: titolo,
    location: ev.luogo || "",
    description: descrizioneParti.join("\n\n"),
    extendedProperties: {
      private: {
        scoutManagerId: ev.id,
        tipo: ev.tipo || "",
        categoria: ev.categoria || "",
        giocatoriIds: JSON.stringify(ev.giocatoriIds || []),
        notaOriginale: ev.note || "",
      },
    },
  };
  if (ev.tuttoIlGiorno !== false) {
    body.start = { date: ev.data };
    // Google richiede per gli eventi "tutto il giorno" che la fine sia il
    // giorno DOPO (esclusivo) — sia per un evento di un solo giorno sia
    // per uno su più giorni (usiamo dataFine se presente, altrimenti data).
    body.end = { date: sommaGiorniISO(ev.dataFine || ev.data, 1) };
  } else {
    const tz = Intl.DateTimeFormat().resolvedOptions().timeZone || "Europe/Zurich";
    body.start = { dateTime: `${ev.data}T${ev.oraInizio || "09:00"}:00`, timeZone: tz };
    body.end = { dateTime: `${ev.dataFine || ev.data}T${ev.oraFine || ev.oraInizio || "10:00"}:00`, timeZone: tz };
  }
  return body;
}

function googleAEventoApp(g) {
  const priv = (g.extendedProperties && g.extendedProperties.private) || {};
  const creatoDallApp = !!priv.scoutManagerId;
  const tuttoIlGiorno = !!(g.start && g.start.date);
  let giocatoriIds = [];
  try { giocatoriIds = JSON.parse(priv.giocatoriIds || "[]"); } catch (e) { giocatoriIds = []; }

  // Se l'evento è stato creato direttamente su Google (non dall'app), non
  // abbiamo un titolo "strutturato" salvato a parte — recuperiamo almeno
  // il testo che la persona ha scritto come titolo dell'evento (g.summary),
  // altrimenti andrebbe perso e la card mostrerebbe solo "Altro" senza
  // nessuna informazione utile.
  let luogo = g.location || "";
  let note = priv.notaOriginale !== undefined ? priv.notaOriginale : (g.description || "");
  if (!creatoDallApp && g.summary) {
    if (!luogo) luogo = g.summary;
    else note = g.summary + (note ? "\n\n" + note : "");
  }

  // Estrae la data di fine reale, se l'evento dura più di un giorno.
  // Per gli eventi "tutto il giorno" Google usa una fine ESCLUSIVA (il
  // giorno dopo l'ultimo vero giorno), va quindi corretta di un giorno
  // indietro prima di confrontarla con la data di inizio.
  let dataFine = "";
  if (tuttoIlGiorno && g.end && g.end.date) {
    const fineReale = sommaGiorniISO(g.end.date, -1);
    if (fineReale !== g.start.date) dataFine = fineReale;
  } else if (!tuttoIlGiorno && g.end && g.end.dateTime) {
    const fineReale = g.end.dateTime.slice(0, 10);
    if (fineReale !== (g.start.dateTime || "").slice(0, 10)) dataFine = fineReale;
  }

  return {
    data: tuttoIlGiorno ? g.start.date : (g.start.dateTime || "").slice(0, 10),
    dataFine,
    tipo: priv.tipo || "Altro",
    categoria: priv.categoria || "Scouting",
    luogo,
    note,
    tuttoIlGiorno,
    oraInizio: tuttoIlGiorno ? "" : (g.start.dateTime || "").slice(11, 16),
    oraFine: tuttoIlGiorno ? "" : (g.end && g.end.dateTime ? g.end.dateTime.slice(11, 16) : ""),
    giocatoriIds,
    googleEventId: g.id,
    googleUpdated: g.updated,
  };
}

/* ---- Operazioni dirette (chiamate subito dopo salvataggio/eliminazione) ---- */
async function pushEventoAGoogleSeConnesso(ev) {
  if (!googleCal.connesso) return;
  try {
    await pushEventoAGoogle(ev);
    savePlayers();
  } catch (e) {
    console.error("Sincronizzazione Google (salvataggio) non riuscita:", e);
    googleCal.ultimoErrore = e.message;
  }
}
async function eliminaEventoDaGoogleSeConnesso(googleEventId) {
  if (!googleCal.connesso) return;
  try {
    const token = await assicuraTokenGoogleValido();
    await fetch(`https://www.googleapis.com/calendar/v3/calendars/${encodeURIComponent(googleCal.calendarId)}/events/${encodeURIComponent(googleEventId)}`, {
      method: "DELETE",
      headers: { Authorization: "Bearer " + token },
    });
  } catch (e) {
    console.error("Eliminazione su Google non riuscita:", e);
  }
}
async function pushEventoAGoogle(ev) {
  const token = await assicuraTokenGoogleValido();
  const body = eventoAGoogleBody(ev);
  const url = ev.googleEventId
    ? `https://www.googleapis.com/calendar/v3/calendars/${encodeURIComponent(googleCal.calendarId)}/events/${encodeURIComponent(ev.googleEventId)}`
    : `https://www.googleapis.com/calendar/v3/calendars/${encodeURIComponent(googleCal.calendarId)}/events`;
  const resp = await fetch(url, {
    method: ev.googleEventId ? "PATCH" : "POST",
    headers: { Authorization: "Bearer " + token, "Content-Type": "application/json" },
    body: JSON.stringify(body),
  });
  if (!resp.ok) throw new Error("Google ha rifiutato l'evento (" + resp.status + ")");
  const data = await resp.json();
  ev.googleEventId = data.id;
  ev.googleUpdated = data.updated;
}

/* ---- Sincronizzazione completa (pull + merge last-write-wins + push) ---- */
async function sincronizzaOra(opzioni) {
  opzioni = opzioni || {};
  if (!googleCal.connesso) { alert("Collega prima Google Calendar da Strumenti."); return; }
  googleCal.statoSync = "in corso";
  renderStrumenti(document.getElementById("content"));
  try {
    const token = await assicuraTokenGoogleValido();

    // 1) Scarica gli eventi Google (usa il syncToken se già presente, per
    // prendere solo le variazioni; altrimenti scarica tutto il periodo
    // utile: da 3 mesi fa a 12 mesi da oggi).
    let googleEventi = [];
    let url;
    if (googleCal.syncToken && !opzioni.primaVolta) {
      url = `https://www.googleapis.com/calendar/v3/calendars/${encodeURIComponent(googleCal.calendarId)}/events?syncToken=${encodeURIComponent(googleCal.syncToken)}&showDeleted=true`;
    } else {
      const min = new Date(); min.setMonth(min.getMonth() - 3);
      const max = new Date(); max.setMonth(max.getMonth() + 12);
      url = `https://www.googleapis.com/calendar/v3/calendars/${encodeURIComponent(googleCal.calendarId)}/events?timeMin=${min.toISOString()}&timeMax=${max.toISOString()}&singleEvents=true&showDeleted=true`;
    }
    let nextSyncToken = null;
    while (url) {
      const resp = await fetch(url, { headers: { Authorization: "Bearer " + token } });
      if (resp.status === 410) {
        // syncToken scaduto/non valido: si riparte da una sincronizzazione completa
        googleCal.syncToken = null;
        return sincronizzaOra({ ...opzioni, primaVolta: true });
      }
      if (!resp.ok) throw new Error("Lettura eventi Google non riuscita (" + resp.status + ")");
      const data = await resp.json();
      googleEventi = googleEventi.concat(data.items || []);
      if (data.nextSyncToken) nextSyncToken = data.nextSyncToken;
      url = data.nextPageToken
        ? `https://www.googleapis.com/calendar/v3/calendars/${encodeURIComponent(googleCal.calendarId)}/events?pageToken=${encodeURIComponent(data.nextPageToken)}`
        : null;
    }

    // 2) Applica le modifiche/cancellazioni Google all'elenco locale
    for (const g of googleEventi) {
      const priv = (g.extendedProperties && g.extendedProperties.private) || {};
      const locale = priv.scoutManagerId
        ? eventi.find(e => e.id === priv.scoutManagerId)
        : eventi.find(e => e.googleEventId === g.id);

      if (g.status === "cancelled") {
        if (locale) eventi = eventi.filter(e => e !== locale);
        continue;
      }
      if (locale) {
        const modificaLocalePiuRecente = locale.modificatoIl && new Date(locale.modificatoIl) > new Date(g.updated);
        if (!modificaLocalePiuRecente) {
          Object.assign(locale, googleAEventoApp(g), { modificatoIl: g.updated });
        }
        // se invece la modifica locale è più recente, la lasciamo stare:
        // verrà ripubblicata su Google nel passo 3 qui sotto.
      } else {
        eventi.push({ id: uid(), giocatoriIds: [], ...googleAEventoApp(g), modificatoIl: g.updated });
      }
    }

    // 3) Ripubblica su Google gli eventi locali nuovi o modificati più di
    // recente rispetto a quanto sappiamo essere stato aggiornato su Google
    // (compresi quelli appena creati, senza googleEventId).
    if (opzioni.ancheEsportazione !== false) {
      for (const ev of eventi) {
        const maiSincronizzato = !ev.googleEventId;
        const modificatoDopo = ev.googleEventId && ev.modificatoIl && (!ev.googleUpdated || new Date(ev.modificatoIl) > new Date(ev.googleUpdated));
        if (maiSincronizzato || modificatoDopo) {
          await pushEventoAGoogle(ev);
        }
      }
    }

    if (nextSyncToken) {
      googleCal.syncToken = nextSyncToken;
      await idbSet("google-sync-token", nextSyncToken);
    }
    googleCal.ultimaSync = new Date().toISOString();
    await idbSet("google-ultima-sync", googleCal.ultimaSync);
    googleCal.statoSync = "ok";
    googleCal.ultimoErrore = null;
  } catch (e) {
    console.error(e);
    googleCal.statoSync = "errore";
    googleCal.ultimoErrore = e.message;
  }
  savePlayers();
  render();
}

function contaOccorrenze(valori) {
  const conteggio = {};
  valori.forEach(v => { conteggio[v] = (conteggio[v] || 0) + 1; });
  return conteggio;
}
function ordinaPerFrequenza(valori, conteggio) {
  return valori.slice().sort((a, b) => (conteggio[b] || 0) - (conteggio[a] || 0) || a.localeCompare(b));
}

function renderRisultati() {
  const container = document.getElementById("risultati-container");
  const meta = document.getElementById("risultati-meta");
  if (!container) return;

  let filtered = players.filter(p => {
    if (filtroTesto) {
      const t = filtroTesto.toLowerCase();
      const hay = `${p.cognome || ""} ${p.nome || ""} ${p.squadra || ""} ${(p.categorie || []).join(" ")}`.toLowerCase();
      if (!hay.includes(t)) return false;
    }
    if (filtroAnno !== "tutti") {
      const anno = p.dataNascita ? new Date(p.dataNascita).getFullYear() : null;
      if (String(anno) !== filtroAnno) return false;
    }
    if (filtroSquadra !== "tutte" && p.squadra !== filtroSquadra) return false;
    if (filtroCategoria !== "tutte" && !(p.categorie || []).includes(filtroCategoria)) return false;
    if (filtroRuolo !== "tutti" && p.ruoloPrimario !== filtroRuolo && p.ruoloSecondario !== filtroRuolo) return false;
    if (filtroEtichette.size > 0) {
      const etichetteGiocatore = p.etichette || [];
      if (!etichetteGiocatore.some(e => filtroEtichette.has(e))) return false;
    }
    if (filtroScouts.size > 0) {
      const haValutazioneDiScout = (p.valutazioni || []).some(v => v.scout && filtroScouts.has(v.scout));
      if (!haValutazioneDiScout) return false;
    }
    if (filtroParametro !== "tutti") {
      let voci = p.valutazioni || [];
      if (filtroScouts.size > 0) voci = voci.filter(v => v.scout && filtroScouts.has(v.scout));
      const vals = voci
        .filter(v => v.parametro === filtroParametro)
        .map(v => parseFloat(v.valoreNumerico))
        .filter(n => !isNaN(n));
      if (!vals.length) return false;
      const min = filtroValoreMin !== "" ? parseFloat(filtroValoreMin) : 0;
      if (!vals.some(v => v >= min)) return false;
    }
    return true;
  });

  filtered.sort((a, b) => {
    if (ordinamento === "recenti") {
      return (b.creatoIl || 0) - (a.creatoIl || 0);
    }
    if (ordinamento === "modificati") {
      return (b.modificatoIl || b.creatoIl || 0) - (a.modificatoIl || a.creatoIl || 0);
    }
    if (ordinamento === "visionatura") {
      const da = ultimaVisionatura(a) || "";
      const db = ultimaVisionatura(b) || "";
      return db.localeCompare(da);
    }
    if (ordinamento === "valutazione") {
      const va = valutazioneMedia(a, filtroScouts);
      const vb = valutazioneMedia(b, filtroScouts);
      return (vb === null ? -1 : vb) - (va === null ? -1 : va);
    }
    if (ordinamento === "squadra") {
      const sa = (a.squadra || "").localeCompare(b.squadra || "");
      if (sa !== 0) return sa;
      return `${a.cognome || ""} ${a.nome || ""}`.localeCompare(`${b.cognome || ""} ${b.nome || ""}`);
    }
    if (ordinamento === "ruolo") {
      const ga = gruppoRuolo(a.ruoloPrimario);
      const gb = gruppoRuolo(b.ruoloPrimario);
      if (ga !== gb) return ga - gb;
      return `${a.cognome || ""} ${a.nome || ""}`.localeCompare(`${b.cognome || ""} ${b.nome || ""}`);
    }
    if (ordinamento === "ultimaPartita") {
      const giorniA = giorniDaOggi(dataUltimaPartita(a));
      const giorniB = giorniDaOggi(dataUltimaPartita(b));
      const recenteA = giorniA !== null && giorniA >= 0 && giorniA <= 6;
      const recenteB = giorniB !== null && giorniB >= 0 && giorniB <= 6;
      if (recenteA && recenteB) return giorniA - giorniB; // meno giorni fa = più recente = prima
      if (recenteA && !recenteB) return -1;
      if (!recenteA && recenteB) return 1;
      return `${a.cognome || ""} ${a.nome || ""}`.localeCompare(`${b.cognome || ""} ${b.nome || ""}`);
    }
    if (ordinamento === "annata") {
      const aa = a.dataNascita ? new Date(a.dataNascita).getFullYear() : 9999;
      const ab = b.dataNascita ? new Date(b.dataNascita).getFullYear() : 9999;
      if (aa !== ab) return aa - ab;
      return `${a.cognome || ""} ${a.nome || ""}`.localeCompare(`${b.cognome || ""} ${b.nome || ""}`);
    }
    return `${a.cognome || ""} ${a.nome || ""}`.localeCompare(`${b.cognome || ""} ${b.nome || ""}`);
  });

  // Reso disponibile globalmente per lo strumento "Report", che lavora
  // sempre sull'elenco così com'è filtrato/ordinato in questo momento.
  giocatoriFiltratiCorrente = filtered;

  const filtroScoutAttivo = filtroScouts.size > 0;
  meta.textContent = `${filtered.length} giocator${filtered.length === 1 ? "e" : "i"} su ${players.length}` + (filtroScoutAttivo ? " · media calcolata solo sugli scout selezionati" : "");

  if (!filtered.length) {
    container.className = "risultati-container";
    container.innerHTML = `<div class="empty-state">
      <p>Nessun giocatore trovato con questi filtri.</p>
      <p class="empty-sub">Prova ad azzerare i filtri o aggiungi una nuova scheda.</p>
    </div>`;
    return;
  }

  if (vistaElenco === "tabella") {
    container.className = "risultati-container risultati-tabella-wrap";
    container.innerHTML = `
      <table class="tabella-giocatori">
        <thead>
          <tr>
            <th>Foto</th><th>Media</th><th>Cognome</th><th>Nome</th><th>Data di nascita</th><th>Categoria</th><th>BioAlter</th><th>Ruolo</th><th>Club</th><th>Etichette</th>${ordinamento === "modificati" ? `<th>Modificato</th>` : ""}${ordinamento === "ultimaPartita" ? `<th>Ultima partita</th>` : ""}
          </tr>
        </thead>
        <tbody>
          ${filtered.map(p => tabellaRigaHTML(p, filtroScouts)).join("")}
        </tbody>
      </table>
    `;
    container.querySelectorAll("tr[data-id]").forEach(el => {
      el.onclick = e => {
        const fotoEl = e.target.closest("[data-foto-ingrandisci]");
        if (fotoEl) {
          e.stopPropagation();
          const p = players.find(pl => pl.id === fotoEl.dataset.fotoIngrandisci);
          if (p && p.foto) apriFotoIngrandita(p.foto);
          return;
        }
        apriDettaglio(el.dataset.id);
      };
    });
    return;
  }

  container.className = "risultati-container";
  container.innerHTML = filtered.map(p => cardHTML(p, filtroScouts)).join("");
  container.querySelectorAll(".player-card").forEach(el => {
    el.onclick = () => apriDettaglio(el.dataset.id);
  });
}

  const media = valutazioneMedia(p, scoutFilter);
  return `
    <tr data-id="${p.id}">
      <td>
        <div class="tabella-foto" data-foto-ingrandisci="${p.id}">
          ${p.foto ? `<img src="${esc(p.foto)}" alt="">` : `<span class="tabella-foto-placeholder">${SILHOUETTE_SVG}</span>`}
        </div>
      </td>
      <td><span class="card-badge tabella-badge ${ratingClass(media)}">${media !== null ? media.toFixed(1) : "-"}</span></td>
      <td>${esc(p.cognome)}</td>
      <td>${esc(p.nome)}</td>
      <td class="mono">${p.dataNascita ? formatDataIt(p.dataNascita) : "-"}</td>
      <td>${categoriaNazionale(p.dataNascita) || "-"}</td>
      <td class="mono">${(p.etaBiologica !== undefined && p.etaBiologica !== null && p.etaBiologica !== "") ? esc(p.etaBiologica) : "-"}</td>

      <td>${p.squadra || (p.categorie && p.categorie.length) ? squadraConCategorie(p) : "-"}</td>

      ${ordinamento === "modificati" ? `<td class="mono">${formatDataIt(p.modificatoIl || p.creatoIl)}${(p.ultimeSezioniModificate && p.ultimeSezioniModificate.length) ? `<br><span class="muted" style="font-size:11px;">${esc(p.ultimeSezioniModificate.join(", "))}</span>` : ""}</td>` : ""}
      ${ordinamento === "ultimaPartita" ? `<td class="${(() => { const g = giorniDaOggi(dataUltimaPartita(p)); return g !== null && g >= 0 && g <= 6 ? "ultima-partita-recente" : ""; })()}">${esc(testoUltimaPartita(p))}</td>` : ""}

function apriFotoIngrandita(url) {

  root.innerHTML = `
    <div class="modal-overlay" id="modal-overlay-foto">
      <div class="foto-ingrandita-box">
        <img src="${esc(url)}" alt="">
      </div>
    </div>`;
